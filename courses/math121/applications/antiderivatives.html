  <script>
    const hintBtn = document.getElementById('hint-btn');
    const hintArea = document.getElementById('hint-area');
    const startBtn = document.getElementById('start-btn');
    const questionText = document.getElementById('question-text');
    const checkBtn = document.getElementById('check-btn');
    const feedbackText = document.getElementById('feedbackText');
    const finalAnswerInput = document.getElementById('final-answer-input');
    const graphArea = document.getElementById('graph-area');

    let currentProblem = null;
    let currentStageIndex = 0;
    let hintStep = 0;
    let mathJaxTypesetPromise = Promise.resolve();
    let hintIsTypesetting = false;
    let activeMathEditor = null;

    function typesetElement(element) {
      if (!window.MathJax || !MathJax.typesetPromise) {
        if (window.MathJax && MathJax.typeset) MathJax.typeset([element]);
        return Promise.resolve();
      }
      mathJaxTypesetPromise = mathJaxTypesetPromise
        .then(() => MathJax.typesetPromise([element]))
        .catch(error => console.error('MathJax typesetting failed:', error));
      return mathJaxTypesetPromise;
    }

    function randomInteger(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function randomNonzeroInteger(min, max) { let n; do { n = randomInteger(min, max); } while (n === 0); return n; }
    function randomChoice(items) { return items[randomInteger(0, items.length - 1)]; }

    function gcd(a, b) {
      a = Math.abs(Math.round(a));
      b = Math.abs(Math.round(b));
      while (b !== 0) { const t = b; b = a % b; a = t; }
      return a || 1;
    }

    function frac(num, den = 1) {
      if (den < 0) { num = -num; den = -den; }
      if (num === 0) return { num: 0, den: 1 };
      const d = gcd(num, den);
      return { num: num / d, den: den / d };
    }


    function fractionTexFromIntegers(num, den = 1) {
      if (!Number.isFinite(num) || !Number.isFinite(den) || den === 0) return null;
      if (Math.abs(num - Math.round(num)) > 1e-10 || Math.abs(den - Math.round(den)) > 1e-10) return null;
      const f = frac(Math.round(num), Math.round(den));
      return f.den === 1 ? `${f.num}` : `\\frac{${f.num}}{${f.den}}`;
    }

    function signedSlopeInterceptTex(mTex, bTex, bValue) {
      if (Math.abs(bValue) < 1e-10) return `${mTex}x`;
      const cleanB = String(bTex).replace(/^-/,'');
      return `${mTex}x ${bValue < 0 ? '-' : '+'} ${cleanB}`;
    }

    function pointSlopeLeftSideTex(yValueTex, yValue) {
      const cleanY = String(yValueTex).replace(/^-/,'');
      if (Math.abs(yValue) < 1e-10) return 'y';
      return `y ${yValue < 0 ? '+' : '-'} ${cleanY}`;
    }

    function pointSlopeXFactorTex(xValue) {
      if (xValue === 0) return 'x';
      return `x ${xValue < 0 ? '+' : '-'} ${Math.abs(xValue)}`;
    }

    function rationalApproximation(value, maxDen = 10000000, tolerance = 1e-12) {
      if (!Number.isFinite(value)) return null;
      if (Object.is(value, -0)) value = 0;
      const sign = value < 0 ? -1 : 1;
      let x = Math.abs(value);
      if (Math.abs(x - Math.round(x)) < tolerance) return { num: sign * Math.round(x), den: 1 };

      let h0 = 0, h1 = 1, k0 = 1, k1 = 0;
      let b = x;
      for (let i = 0; i < 40; i++) {
        const a = Math.floor(b);
        const h2 = a * h1 + h0;
        const k2 = a * k1 + k0;
        if (k2 > maxDen) break;
        h0 = h1; h1 = h2;
        k0 = k1; k1 = k2;
        if (Math.abs(x - h1 / k1) <= tolerance * Math.max(1, x)) break;
        const fracPart = b - a;
        if (Math.abs(fracPart) < tolerance) break;
        b = 1 / fracPart;
      }

      if (k1 === 0) return null;
      const reduced = frac(sign * h1, k1);
      return reduced;
    }

    function rationalTex(value, maxDen = 10000000, tolerance = 1e-12) {
      const r = rationalApproximation(value, maxDen, tolerance);
      if (!r) return null;
      return r.den === 1 ? `${r.num}` : `\\frac{${r.num}}{${r.den}}`;
    }

    function denominatorTerminatesInBaseTen(den) {
      den = Math.abs(Math.round(den));
      if (den === 0) return false;
      while (den % 2 === 0) den /= 2;
      while (den % 5 === 0) den /= 5;
      return den === 1;
    }

    function terminatingDecimalPlaces(den) {
      den = Math.abs(Math.round(den));
      let twos = 0, fives = 0;
      while (den % 2 === 0) { den /= 2; twos++; }
      while (den % 5 === 0) { den /= 5; fives++; }
      return Math.max(twos, fives);
    }

    function exactValueTex(value, preferTerminatingDecimals = false) {
      if (Object.is(value, -0)) value = 0;
      if (!Number.isFinite(value)) return value > 0 ? '\\infty' : '-\\infty';
      const rounded = Math.round(value);
      if (Math.abs(value - rounded) < 1e-10) return `${rounded}`;

      const r = rationalApproximation(value);
      if (r && Math.abs(value - r.num / r.den) <= 1e-10 * Math.max(1, Math.abs(value))) {
        if (preferTerminatingDecimals && denominatorTerminatesInBaseTen(r.den)) {
          const places = Math.min(8, terminatingDecimalPlaces(r.den));
          return formatDecimal(value, places);
        }
        return r.den === 1 ? `${r.num}` : `\\frac{${r.num}}{${r.den}}`;
      }

      return Number(value).toPrecision(8).replace(/\.?0+$/,'');
    }

    function numberTex(value) {
      return exactValueTex(value, false);
    }

    function approximationValueTex(value) {
      return exactValueTex(value, true);
    }

    function decimalIfNeeded(value) {
      if (!Number.isFinite(value)) return '\\text{undefined}';
      if (Math.abs(value - Math.round(value)) < 1e-10) return `${Math.round(value)}`;
      return numberTex(value);
    }


    function exactRootSlopeTex(numerator, radicand) {
      if (!Number.isFinite(numerator) || !Number.isFinite(radicand) || radicand <= 0) return null;
      if (Math.abs(numerator - Math.round(numerator)) > 1e-10 || Math.abs(radicand - Math.round(radicand)) > 1e-10) return null;
      numerator = Math.round(numerator);
      radicand = Math.round(radicand);
      if (numerator === 0) return '0';
      const denominatorCoeff = 2;
      const sign = numerator < 0 ? '-' : '';
      const absNum = Math.abs(numerator);
      const numTex = absNum === 1 ? '' : `${absNum}`;
      const numeratorTex = `${sign}${numTex}`;
      const denominatorTex = denominatorCoeff === 1 ? `\\sqrt{${radicand}}` : `${denominatorCoeff}\\sqrt{${radicand}}`;
      return `${numeratorTex}\\frac{1}{${denominatorTex}}`;
    }

    function exactRootSlopeFractionTex(numerator, radicand) {
      if (!Number.isFinite(numerator) || !Number.isFinite(radicand) || radicand <= 0) return null;
      if (Math.abs(numerator - Math.round(numerator)) > 1e-10 || Math.abs(radicand - Math.round(radicand)) > 1e-10) return null;
      numerator = Math.round(numerator);
      radicand = Math.round(radicand);
      if (numerator === 0) return '0';
      const sign = numerator < 0 ? '-' : '';
      const absNum = Math.abs(numerator);
      const topTex = absNum === 1 ? '1' : `${absNum}`;
      return `${sign}\\frac{${topTex}}{2\\sqrt{${radicand}}}`;
    }

    
    function exactRootValueTex(radicand) {
      if (!Number.isFinite(radicand) || radicand < 0) return null;
      if (Math.abs(radicand - Math.round(radicand)) > 1e-10) return null;
      radicand = Math.round(radicand);
      const root = Math.round(Math.sqrt(radicand));
      if (root * root === radicand) return `${root}`;
      return `\\sqrt{${radicand}}`;
    }

    function exactRootInterceptTex(numerator, radicand) {
      if (!Number.isFinite(numerator) || !Number.isFinite(radicand) || radicand <= 0) return null;
      if (Math.abs(numerator - Math.round(numerator)) > 1e-10 || Math.abs(radicand - Math.round(radicand)) > 1e-10) return null;
      numerator = Math.round(numerator);
      radicand = Math.round(radicand);
      if (numerator === 0) return '0';
      const root = Math.round(Math.sqrt(radicand));
      if (root * root === radicand) return fractionTexFromIntegers(numerator, 2 * root);
      const g = gcd(Math.abs(numerator), 2);
      const reducedNum = numerator / g;
      const reducedDenCoeff = 2 / g;
      const sign = reducedNum < 0 ? '-' : '';
      const absNum = Math.abs(reducedNum);
      const topTex = absNum === 1 ? '1' : `${absNum}`;
      const denTex = reducedDenCoeff === 1 ? `\\sqrt{${radicand}}` : `${reducedDenCoeff}\\sqrt{${radicand}}`;
      return `${sign}\\frac{${topTex}}{${denTex}}`;
    }

    function coefficientTermTex(coeff, body, isFirst = false) {
      if (coeff === 0) return '';
      const sign = coeff < 0 ? '-' : (isFirst ? '' : '+');
      const abs = Math.abs(coeff);
      const term = abs === 1 && body ? body : `${abs}${body}`;
      if (sign === '-') return isFirst ? `-${term}` : `- ${term}`;
      if (sign === '+') return `+ ${term}`;
      return term;
    }

    function polynomialTex(a, b, c) {
      const parts = [];
      if (a) parts.push(coefficientTermTex(a, 'x^{2}', true));
      if (b) parts.push(coefficientTermTex(b, 'x', parts.length === 0));
      if (c) parts.push(coefficientTermTex(c, '', parts.length === 0));
      return parts.length ? parts.join(' ') : '0';
    }

    function linearTex(a, b) {
      const parts = [];
      if (a) parts.push(coefficientTermTex(a, 'x', true));
      if (b) parts.push(coefficientTermTex(b, '', parts.length === 0));
      return parts.length ? parts.join(' ') : '0';
    }

    function substituteQuadraticTex(a, b, c, xTex) {
      const pieces = [];
      if (a) pieces.push(`${a}(${xTex})^{2}`);
      if (b) pieces.push(`${b < 0 ? '- ' + Math.abs(b) : (pieces.length ? '+ ' : '') + b}(${xTex})`);
      if (c) pieces.push(`${c < 0 ? '- ' + Math.abs(c) : (pieces.length ? '+ ' : '') + c}`);
      return pieces.join(' ') || '0';
    }

    function evaluateQuadratic(a, b, c, x) { return a * x * x + b * x + c; }
    function evaluateLinear(a, b, x) { return a * x + b; }


    function parensTex(tex) {
      return `\\left(${tex}\\right)`;
    }

    function signedCoeffTex(n) {
      if (n === 0) return '';
      return n > 0 ? `+${n}` : `${n}`;
    }

    function linearSubTex(a, b, xTex) {
      return `${a}${parensTex(xTex)}${b ? signedCoeffTex(b) : ''}`;
    }

    function quadraticSubTex(a, b, c, xTex) {
      const pieces = [];
      if (a) pieces.push(`${a}${parensTex(xTex)}^{2}`);
      if (b) pieces.push(`${b > 0 && pieces.length ? '+' : ''}${b}${parensTex(xTex)}`);
      if (c) pieces.push(`${c > 0 && pieces.length ? '+' : ''}${c}`);
      return pieces.join('') || '0';
    }

    function limitAligned(lines) {
      return `\\begin{aligned}${lines.join('\\\\')}\\end{aligned}`;
    }

    function quadraticDerivativeChainTex(a, b, c) {
      const fx = polynomialTex(a, b, c);
      const fxh = `${a}(x+h)^2${b ? signedCoeffTex(b) + '(x+h)' : ''}${c ? signedCoeffTex(c) : ''}`;
      const expanded = `${a}x^2${2*a >= 0 ? '+' : ''}${2*a}xh${a >= 0 ? '+' : ''}${a}h^2${b ? signedCoeffTex(b) + 'x' + signedCoeffTex(b) + 'h' : ''}${c ? signedCoeffTex(c) : ''}`;
      const afterSubtract = `${2*a}xh${a >= 0 ? '+' : ''}${a}h^2${b ? signedCoeffTex(b) + 'h' : ''}`;
      const factored = `h(${linearTex(2*a, b)}${a >= 0 ? '+' : ''}${a}h)`;
      return limitAligned([
        `f'(x)=\\lim_{h\\to 0}\\frac{f(x+h)-f(x)}{h}`,
        `=\\lim_{h\\to 0}\\frac{${fxh}-(${fx})}{h}`,
        `=\\lim_{h\\to 0}\\frac{${expanded}-(${fx})}{h}`,
        `=\\lim_{h\\to 0}\\frac{${afterSubtract}}{h}`,
        `=\\lim_{h\\to 0}\\frac{${factored}}{h}`,
        `=\\lim_{h\\to 0}(${linearTex(2*a, b)}${a >= 0 ? '+' : ''}${a}h)`,
        `=${linearTex(2*a, b)}`
      ]);
    }

    function quadraticSlopeChainTex(a, b, c, x0) {
      const fx0h = `${a}(${x0}+h)^2${b ? signedCoeffTex(b) + `(${x0}+h)` : ''}${c ? signedCoeffTex(c) : ''}`;
      const y0 = evaluateQuadratic(a, b, c, x0);
      const slope = 2*a*x0 + b;
      const h2 = a;
      const linearH = slope;
      const numerator = `${linearH}h${h2 >= 0 ? '+' : ''}${h2}h^2`;
      return limitAligned([
        `m=f'(${x0})=\\lim_{h\\to 0}\\frac{f(${x0}+h)-f(${x0})}{h}`,
        `=\\lim_{h\\to 0}\\frac{${fx0h}-(${numberTex(y0)})}{h}`,
        `=\\lim_{h\\to 0}\\frac{${numberTex(y0)}${linearH >= 0 ? '+' : ''}${linearH}h${h2 >= 0 ? '+' : ''}${h2}h^2-(${numberTex(y0)})}{h}`,
        `=\\lim_{h\\to 0}\\frac{${numerator}}{h}`,
        `=\\lim_{h\\to 0}(${linearH}${h2 >= 0 ? '+' : ''}${h2}h)`,
        `=${numberTex(slope)}`
      ]);
    }

    function rootLinearDerivativeChainTex(a, b) {
      const rad = linearTex(a, b);
      const radH = `${a}(x+h)${b ? signedCoeffTex(b) : ''}`;
      return limitAligned([
        `f'(x)=\\lim_{h\\to 0}\\frac{\\sqrt{${radH}}-\\sqrt{${rad}}}{h}`,
        `=\\lim_{h\\to 0}\\frac{(\\sqrt{${radH}}-\\sqrt{${rad}})(\\sqrt{${radH}}+\\sqrt{${rad}})}{h(\\sqrt{${radH}}+\\sqrt{${rad}})}`,
        `=\\lim_{h\\to 0}\\frac{${radH}-(${rad})}{h(\\sqrt{${radH}}+\\sqrt{${rad}})}`,
        `=\\lim_{h\\to 0}\\frac{${a}h}{h(\\sqrt{${radH}}+\\sqrt{${rad}})}`,
        `=\\lim_{h\\to 0}\\frac{${a}}{\\sqrt{${radH}}+\\sqrt{${rad}}}`,

    const trigDefinitions = {

    // ---------- Antiderivatives activity ----------
    function multiplyFractions(a, b) { return frac(a.num * b.num, a.den * b.den); }
    function divideFractionByInteger(a, n) { return frac(a.num, a.den * n); }
    function negateFraction(a) { return { num: -a.num, den: a.den }; }
    function fractionValue(f) { return f.num / f.den; }
    function fractionIsOne(f) { return f.num === f.den; }
    function fractionIsMinusOne(f) { return f.num === -f.den; }
    function fractionIsZero(f) { return f.num === 0; }
    function fractionAbsTex(f) { return fractionTexFromIntegers(Math.abs(f.num), f.den); }
    function fractionSign(f) { return f.num < 0 ? -1 : (f.num > 0 ? 1 : 0); }

    function coefficientTimesTex(coef, body, isFirst = false) {
      if (fractionIsZero(coef)) return '';
      const sign = fractionSign(coef);
      const absCoef = { num: Math.abs(coef.num), den: coef.den };
      let term;
      if (body && fractionIsOne(absCoef)) term = body;
      else if (body && absCoef.den !== 1) term = `\\frac{${absCoef.num === 1 ? body : (/^[0-9]/.test(body) ? absCoef.num + '\\cdot ' + body : absCoef.num + body)}}{${absCoef.den}}`;
      else if (body) term = /^[0-9]/.test(body) ? `${fractionAbsTex(absCoef)}\\cdot ${body}` : `${fractionAbsTex(absCoef)}${body}`;
      else term = fractionAbsTex(absCoef);
      if (isFirst) return sign < 0 ? `-${term}` : term;
      return `${sign < 0 ? '-' : '+'} ${term}`;
    }

    function termLikeTex(t, isFirst = false) {
      if (t.extraDen) {
        const sign = fractionSign(t.coef);
        const absCoef = { num: Math.abs(t.coef.num), den: t.coef.den };
        const top = absCoef.num === 1 ? t.body : (/^[0-9]/.test(t.body) ? `${absCoef.num}\\cdot ${t.body}` : `${absCoef.num}${t.body}`);
        const denPrefix = absCoef.den === 1 ? '' : `${absCoef.den}`;
        const term = `\\frac{${top}}{${denPrefix}${t.extraDen}}`;
        if (isFirst) return sign < 0 ? `-${term}` : term;
        return `${sign < 0 ? '-' : '+'} ${term}`;
      }
      return coefficientTimesTex(t.coef, t.body, isFirst);
    }

    function joinTermTex(terms) {
      const filtered = terms.filter(t => t && !fractionIsZero(t.coef));
      if (!filtered.length) return '0';
      return filtered.map((t, i) => termLikeTex(t, i === 0)).filter(Boolean).join(' ') || '0';
    }

    function randomSmallNonzero() { return randomNonzeroInteger(-6, 6); }
    function randomPositiveBase() { return randomChoice([2,3,4,5,6,7,8,9]); }
    function randomPositiveK() { return randomNonzeroInteger(-5, 5); }

    function randomCoefficient() {
      const r = Math.random();
      if (r < 0.50) return { coef: frac(randomSmallNonzero(), 1), mode: 'integer' };
      if (r < 0.70) return { coef: frac(randomSmallNonzero(), randomChoice([2,3,4,5,6,7,8,9])), mode: 'rational' };
      return { coef: frac(1, randomChoice([2,3,4,5,6,7,8,9])), mode: 'denominator' };
    }

    function makeBaseTerm(type) {
      if (type === 'power') return { type, n: randomNonzeroInteger(-9, 9) };
      if (type === 'reciprocal') return { type };
      if (type === 'exp') return { type, k: randomPositiveK() };
      if (type === 'aexp') return { type, a: randomPositiveBase(), k: randomPositiveK() };
      if (['sin','cos','sec2'].includes(type)) return { type, k: randomPositiveK() };
      return { type: 'power', n: 1 };
    }

    function makeTerm(type) {
      const base = makeBaseTerm(type);
      const c = randomCoefficient();
      return { ...base, coef: c.coef, coeffMode: c.mode };
    }

    function linearKxTex(k) {
      if (k === 1) return 'x';
      if (k === -1) return '-x';
      return `${k}x`;
    }

    function termBodyTex(term) {
      if (term.type === 'power') {
        if (term.n === 1) return 'x';
        return `x^{${term.n}}`;
      }
      if (term.type === 'reciprocal') return '\\frac{1}{x}';
      if (term.type === 'exp') return `e^{${linearKxTex(term.k)}}`;
      if (term.type === 'aexp') return `${term.a}^{${linearKxTex(term.k)}}`;
      if (term.type === 'sin') return `\\sin(${linearKxTex(term.k)})`;
      if (term.type === 'cos') return `\\cos(${linearKxTex(term.k)})`;
      if (term.type === 'sec2') return `\\sec^{2}(${linearKxTex(term.k)})`;
      if (term.type === 'lnabs') return '\\ln|x|';
      if (term.type === 'tan') return `\\tan(${linearKxTex(term.k)})`;
      return 'x';
    }

    function termTex(term, isFirst = false) {
      if (term.type === 'aexp' && term.extraDen) {
        return termLikeTex({ coef: term.coef, body: termBodyTex(term), extraDen: term.extraDen }, isFirst);
      }
      if (term.type === 'xlnxminusx') {
        return coefficientTimesTex(term.coef, '(x\\ln|x|-x)', isFirst);
      }
      if (term.type === 'reciprocal') {
        const c = term.coef;
        if (term.coeffMode === 'denominator') return isFirst ? `\\frac{1}{${c.den}x}` : `+ \\frac{1}{${c.den}x}`;
        if (c.den === 1) return isFirst ? `${c.num < 0 ? '-' : ''}\\frac{${Math.abs(c.num)}}{x}` : `${c.num < 0 ? '-' : '+'} \\frac{${Math.abs(c.num)}}{x}`;
        const sign = c.num < 0 ? '-' : '+';
        return `${isFirst && sign === '+' ? '' : sign + ' '}\\frac{${Math.abs(c.num)}}{${c.den}x}`;
      }
      if (term.coeffMode === 'denominator' && term.coef.num === 1 && term.coef.den !== 1) {
        const body = termBodyTex(term);
        return `${isFirst ? '' : '+ '}\\frac{${body}}{${term.coef.den}}`;
      }
      return coefficientTimesTex(term.coef, termBodyTex(term), isFirst);
    }

    function termsTex(terms) { return terms.map((t, i) => termTex(t, i === 0)).join(' ') || '0'; }

    function termExpression(term) {
      const c = `(${term.coef.num}/${term.coef.den})`;
      if (term.type === 'aexp' && term.extraDen) return `${c}*(${term.a}**(${term.k}*x))/(${term.k}*Math.log(${term.a}))`;
      if (term.type === 'xlnxminusx') return `${c}*(x*Math.log(Math.abs(x))-x)`;
      if (term.type === 'power') return `${c}*x**(${term.n})`;
      if (term.type === 'reciprocal') return `${c}/x`;
      if (term.type === 'exp') return `${c}*Math.exp(${term.k}*x)`;
      if (term.type === 'aexp') return `${c}*(${term.a}**(${term.k}*x))`;
      if (term.type === 'sin') return `${c}*Math.sin(${term.k}*x)`;
      if (term.type === 'cos') return `${c}*Math.cos(${term.k}*x)`;
      if (term.type === 'sec2') return `${c}*(1/(Math.cos(${term.k}*x)**2))`;
      if (term.type === 'lnabs') return `${c}*Math.log(Math.abs(x))`;
      if (term.type === 'tan') return `${c}*Math.tan(${term.k}*x)`;
      return '0';
    }

    function termsExpression(terms) { return terms.map(termExpression).join('+') || '0'; }

    function antiderivativeTerm(term) {
      const c = term.coef;
      if (term.type === 'power') {
        if (term.n === -1) return { type: 'lnabs', coef: c };
        return { type: 'power', n: term.n + 1, coef: divideFractionByInteger(c, term.n + 1) };
      }
      if (term.type === 'reciprocal') return { type: 'lnabs', coef: c };
      if (term.type === 'exp') return { type: 'exp', k: term.k, coef: divideFractionByInteger(c, term.k) };
      if (term.type === 'aexp') return { type: 'aexp', a: term.a, k: term.k, coef: c, extraDen: term.extraDen ? `${term.extraDen}${term.k}\\ln(${term.a})` : `${term.k}\\ln(${term.a})` };
      if (term.type === 'sin') return { type: 'cos', k: term.k, coef: divideFractionByInteger(negateFraction(c), term.k) };
      if (term.type === 'cos') return { type: 'sin', k: term.k, coef: divideFractionByInteger(c, term.k) };
      if (term.type === 'sec2') return { type: 'tan', k: term.k, coef: divideFractionByInteger(c, term.k) };
      if (term.type === 'lnabs') return { type: 'xlnxminusx', coef: c };
      if (term.type === 'tan') return { type: 'unsupported', coef: c };
      return { type: 'power', n: 1, coef: frac(0,1) };
    }

    function antiderivativeTerms(terms) {
      return terms.map(antiderivativeTerm).filter(t => t.type !== 'unsupported');
    }

    function termBodyTexForIntegral(term) {
      if (term.type === 'aexp' && term.extraDen) {
        const body = `${term.a}^{${linearKxTex(term.k)}}`;
        const c = term.coef;
        const sign = c.num < 0 ? '-' : '';
        const absNum = Math.abs(c.num);
        const top = absNum === 1 ? body : (/^[0-9]/.test(body) ? `${absNum}\\cdot ${body}` : `${absNum}${body}`);
        const denPrefix = c.den === 1 ? '' : `${c.den}`;
        return { custom: `${sign}\\frac{${top}}{${denPrefix}${term.extraDen}}` };
      }
      if (term.type === 'xlnxminusx') {
        return { custom: coefficientTimesTex(term.coef, '(x\\ln|x|-x)', true) };
      }
      return { body: termBodyTex(term) };
    }

    function antiderivativeTex(terms, constantName = 'C') {
      const parts = [];
      terms.forEach(t => {
        const info = termBodyTexForIntegral(t);
        if (info.custom) parts.push(info.custom);
        else parts.push({ coef: t.coef, body: info.body });
      });
      const regular = parts.filter(p => typeof p !== 'string');
      const custom = parts.filter(p => typeof p === 'string');
      let tex = joinTermTex(regular);
      if (custom.length) tex = (tex === '0' ? '' : tex + ' + ') + custom.join(' + ');
      if (!tex) tex = '0';
      return `${tex} + ${constantName}`;
    }

    function antiderivativeExpression(terms, constantName = '0') {
      return terms.map(t => {
        if (t.type === 'aexp' && t.extraDen) return `(${t.coef.num}/${t.coef.den})*(${t.a}**(${t.k}*x))/(${t.k}*Math.log(${t.a}))`;
        if (t.type === 'xlnxminusx') return `(${t.coef.num}/${t.coef.den})*(x*Math.log(Math.abs(x))-x)`;
        return termExpression(t);
      }).join('+') + `+(${constantName})`;
    }

    function chooseTermTypes(typeNumber) {
      // Weighted without-replacement selection.  The messier antiderivatives
      // (1/x, e^(kx), and a^(kx)) are kept possible, but less frequent.
      let weightedPool = [
        { type: 'power', weight: 7 },
        { type: 'sin', weight: 5 },
        { type: 'cos', weight: 5 },
        { type: 'sec2', weight: 4 },
        { type: 'exp', weight: 2 },
        { type: 'aexp', weight: 1 },
        { type: 'reciprocal', weight: 1 }
      ];
      if (typeNumber === 3) {
        weightedPool = [
          { type: 'power', weight: 7 },
          { type: 'sin', weight: 5 },
          { type: 'cos', weight: 5 },
          { type: 'exp', weight: 2 }
        ];
      }
      const count = randomInteger(2,4);
      const chosen = [];
      const available = weightedPool.slice();
      while (chosen.length < count && available.length) {
        const totalWeight = available.reduce((sum, item) => sum + item.weight, 0);
        let r = Math.random() * totalWeight;
        let idx = 0;
        while (idx < available.length - 1 && r >= available[idx].weight) {
          r -= available[idx].weight;
          idx++;
        }
        chosen.push(available.splice(idx, 1)[0].type);
      }
      return chosen;
    }

    function generateInitialTerms(typeNumber) {
      for (let attempt = 0; attempt < 100; attempt++) {
        const terms = chooseTermTypes(typeNumber).map(makeTerm);
        if (typeNumber === 3 && terms.some(t => (t.type === 'power' && t.n === -1) || t.type === 'reciprocal' || t.type === 'sec2')) continue;
        return terms;
      }
      return [makeTerm('power'), makeTerm('exp')];
    }

    function hasTrigTerm(terms) { return terms.some(t => ['sin','cos','sec2','tan'].includes(t.type)); }
    function pointArgTex(k, xTex) {
      if (k === 1) return xTex;
      if (xTex === 'x') return `${k}x`;
      return `${k}\\left(${xTex}\\right)`;
    }

    function chooseConditionPoint(terms) {
      const hasLogLike = terms.some(t => t.type === 'lnabs' || t.type === 'xlnxminusx' || t.type === 'aexp');
      const hasExp = terms.some(t => t.type === 'exp');

      if (hasTrigTerm(terms)) {
        // Keep trig evaluation points calculator-free, with extra preference for 0
        // when exponentials are present.  Avoid 0 if a logarithmic term would be undefined.
        const choices = hasLogLike
          ? [Math.PI/6, Math.PI/4, Math.PI/3, Math.PI/2, Math.PI]
          : [0, Math.PI/6, Math.PI/4, Math.PI/3, Math.PI/2, Math.PI];
        if (!hasLogLike && (hasExp || Math.random() < 0.60)) return { value: 0, tex: '0' };
        const v = randomChoice(choices.filter(x => Math.abs(x) > 1e-10));
        return { value: v, tex: piMultipleTex(v) };
      }

      if (hasLogLike && Math.random() < 0.70) return { value: 1, tex: '1' };
      if (hasExp && Math.random() < 0.70) return { value: 0, tex: '0' };

      let v;
      do { v = randomInteger(-5, 5); } while (hasLogLike && v === 0);
      return { value: v, tex: `${v}` };
    }

    function exactTrigPiece(kind, k, point) {
      const value = kind === 'sin' ? Math.sin(k * point.value) : kind === 'cos' ? Math.cos(k * point.value) : Math.tan(k * point.value);
      const table = [
        { v: 0, coef: frac(0,1), body: '' },
        { v: 1, coef: frac(1,1), body: '' },
        { v: -1, coef: frac(-1,1), body: '' },
        { v: 0.5, coef: frac(1,2), body: '' },
        { v: -0.5, coef: frac(-1,2), body: '' },
        { v: Math.sqrt(2)/2, coef: frac(1,2), body: '\\sqrt{2}' },
        { v: -Math.sqrt(2)/2, coef: frac(-1,2), body: '\\sqrt{2}' },
        { v: Math.sqrt(3)/2, coef: frac(1,2), body: '\\sqrt{3}' },
        { v: -Math.sqrt(3)/2, coef: frac(-1,2), body: '\\sqrt{3}' },
        { v: Math.sqrt(3), coef: frac(1,1), body: '\\sqrt{3}' },
        { v: -Math.sqrt(3), coef: frac(-1,1), body: '\\sqrt{3}' },
        { v: 1/Math.sqrt(3), coef: frac(1,3), body: '\\sqrt{3}' },
        { v: -1/Math.sqrt(3), coef: frac(-1,3), body: '\\sqrt{3}' }
      ];
      const hit = table.find(item => Math.abs(value - item.v) < 1e-9);
      if (hit) return hit;
      return { coef: frac(1,1), body: `${kind === 'sin' ? '\\sin' : kind === 'cos' ? '\\cos' : '\\tan'}(${pointArgTex(k, point.tex)})` };
    }

    function exactTrigTex(kind, k, point) {
      const value = point.value * k;
      const candidates = [0, Math.PI/6, Math.PI/4, Math.PI/3, Math.PI/2, 2*Math.PI/3, 3*Math.PI/4, 5*Math.PI/6, Math.PI, 3*Math.PI/2, 2*Math.PI, -Math.PI/6, -Math.PI/4, -Math.PI/3, -Math.PI/2, -Math.PI];
      const m = candidates.find(a => Math.abs(Math.sin(value - a)) < 1e-10 && Math.abs(Math.cos(value - a) - 1) < 1e-10);
      const v = kind === 'sin' ? Math.sin(value) : kind === 'cos' ? Math.cos(value) : Math.tan(value);
      const table = [
        [0, '0'], [1, '1'], [-1, '-1'], [0.5, '\\frac{1}{2}'], [-0.5, '-\\frac{1}{2}'],
        [Math.sqrt(2)/2, '\\frac{\\sqrt{2}}{2}'], [-Math.sqrt(2)/2, '-\\frac{\\sqrt{2}}{2}'],
        [Math.sqrt(3)/2, '\\frac{\\sqrt{3}}{2}'], [-Math.sqrt(3)/2, '-\\frac{\\sqrt{3}}{2}'],
        [Math.sqrt(3), '\\sqrt{3}'], [-Math.sqrt(3), '-\\sqrt{3}'],
        [1/Math.sqrt(3), '\\frac{\\sqrt{3}}{3}'], [-1/Math.sqrt(3), '-\\frac{\\sqrt{3}}{3}']
      ];
      const hit = table.find(([num]) => Math.abs(v - num) < 1e-9);
      return hit ? hit[1] : `${kind === 'sin' ? '\\sin' : kind === 'cos' ? '\\cos' : '\\tan'}(${k === 1 ? point.tex : k + point.tex})`;
    }

    function evalTermAtTex(term, point) {
      const xTex = point.tex;
      if (term.type === 'power') {
        if (point.value === 0 && term.n < 0) return null;
        const val = Math.pow(point.value, term.n);
        if (Number.isFinite(val) && Math.abs(val - Math.round(val)) < 1e-10) return { coef: frac(term.coef.num * Math.round(val), term.coef.den), body: '' };
        return { coef: term.coef, body: `(${xTex})^{${term.n}}` };
      }
      if (term.type === 'reciprocal') {
        if (point.value === 0) return null;
        if (Math.abs(point.value - Math.round(point.value)) < 1e-10) return { coef: divideFractionByInteger(term.coef, Math.round(point.value)), body: '' };
        return { coef: term.coef, body: `\\frac{1}{${xTex}}` };
      }
      if (term.type === 'exp') {
        if (Math.abs(term.k * point.value) < 1e-10) return { coef: term.coef, body: '' };
        const arg = pointArgTex(term.k, xTex);
        return { coef: term.coef, body: `e^{${arg}}` };
      }
      if (term.type === 'aexp') {
        if (Math.abs(term.k * point.value) < 1e-10) {
          if (term.extraDen) return { coef: term.coef, body: '1', extraDen: term.extraDen };
          return { coef: term.coef, body: '' };
        }
        if (Math.abs(point.value - Math.round(point.value)) < 1e-10) {
          const val = Math.pow(term.a, term.k * Math.round(point.value));
          if (Number.isFinite(val) && Math.abs(val - Math.round(val)) < 1e-10) {
            if (term.extraDen) return { coef: frac(term.coef.num * Math.round(val), term.coef.den), body: '1', extraDen: term.extraDen };
            return { coef: frac(term.coef.num * Math.round(val), term.coef.den), body: '' };
          }
        }
        const arg = pointArgTex(term.k, xTex);
        return { coef: term.coef, body: `${term.a}^{${arg}}`, extraDen: term.extraDen || null };
      }
      if (['sin','cos','tan'].includes(term.type)) {
        if (term.type === 'tan' && Math.abs(Math.cos(term.k * point.value)) < 1e-10) return null;
        const piece = exactTrigPiece(term.type, term.k, point);
        return { coef: multiplyFractions(term.coef, piece.coef), body: piece.body };
      }
      if (term.type === 'sec2') {
        const cos = Math.cos(term.k * point.value);
        if (Math.abs(cos) < 1e-10) return null;
        const val = 1/(cos*cos);
        if (Math.abs(val - Math.round(val)) < 1e-8) return { coef: frac(term.coef.num * Math.round(val), term.coef.den), body: '' };
        return { coef: term.coef, body: `\\sec^{2}(${term.k === 1 ? xTex : term.k + xTex})` };
      }
      if (term.type === 'lnabs') {
        if (Math.abs(point.value) < 1e-10) return null;
        if (Math.abs(Math.abs(point.value) - 1) < 1e-10) return { coef: frac(0,1), body: '' };
        return { coef: term.coef, body: `\\ln|${xTex}|` };
      }
      if (term.type === 'xlnxminusx') {
        if (point.value === 0) return null;
        if (Math.abs(Math.abs(point.value) - 1) < 1e-10) return { coef: frac(term.coef.num * Math.round(-point.value), term.coef.den), body: '' };
        return { coef: term.coef, body: `(${xTex}\\ln|${xTex}|-${xTex})` };
      }
      return { coef: frac(0,1), body: '' };
    }

    function exactEvaluateTermsTex(terms, point) {
      const pieces = [];
      let numeric = frac(0,1);
      for (const t of terms) {
        const piece = evalTermAtTex(t, point);
        if (!piece) return '\\text{undefined}';
        if (fractionIsZero(piece.coef)) continue;
        if (!piece.body) numeric = frac(numeric.num * piece.coef.den + piece.coef.num * numeric.den, numeric.den * piece.coef.den);
        else pieces.push(piece);
      }
      if (!fractionIsZero(numeric)) pieces.unshift({ coef: numeric, body: '' });
      return joinTermTex(pieces);
    }

    function exactEvaluateTermsTexPlusInteger(terms, point, integerConstant) {
      const pieces = [];
      let numeric = frac(integerConstant, 1);
      for (const t of terms) {
        const piece = evalTermAtTex(t, point);
        if (!piece) return '\\text{undefined}';
        if (fractionIsZero(piece.coef)) continue;
        if (!piece.body) numeric = frac(numeric.num * piece.coef.den + piece.coef.num * numeric.den, numeric.den * piece.coef.den);
        else pieces.push(piece);
      }
      if (!fractionIsZero(numeric)) pieces.unshift({ coef: numeric, body: '' });
      return joinTermTex(pieces);
    }

    function computeConstantNumerically(terms, point, givenValueNumeric) {
      const fn = Function('x', `"use strict"; return (${termsExpression(terms)});`);
      return givenValueNumeric - fn(point.value);
    }

    function randomGivenValue() { return randomInteger(-8, 8); }

    function texPlusConstant(tex, k) {
      if (k === 0) return tex;
      if (tex === '0') return `${k}`;
      return `${tex} ${k < 0 ? '- ' + Math.abs(k) : '+ ' + k}`;
    }

    function makeType1AntiderivativeProblem() {
      const given = generateInitialTerms(1);
      const anti = antiderivativeTerms(given);
      const givenTex = termsTex(given);
      const ansTex = antiderivativeTex(anti, 'C');
      return {
        questionTex: `\\text{Find the general antiderivative of }${givenTex}.`,
        stages: [{
          kind: 'antiderivative-general',
          promptTex: `\\text{Find the general antiderivative.}`,
          labelTex: `F(x)=`,
          targetDerivativeExpression: termsExpression(given),
          expectedTex: ansTex,
          hints: [
            `\\text{Take the antiderivative term-by-term.}`,
            `F(x)=${ansTex}`
          ]
        }]
      };
    }

    function makeType2AntiderivativeProblem() {
      for (let attempt = 0; attempt < 100; attempt++) {
        const derivativeTerms = generateInitialTerms(2);
        const fNoC = antiderivativeTerms(derivativeTerms);
        const point = chooseConditionPoint(fNoC);
        const valueTexNoC = exactEvaluateTermsTex(fNoC, point);
        if (valueTexNoC === '\\text{undefined}') continue;
        const cValue = randomInteger(-8, 8);
        const givenTex = exactEvaluateTermsTexPlusInteger(fNoC, point, cValue);
        const finalExpression = antiderivativeExpression(fNoC, String(cValue));
        const cTex = `${cValue}`;
        const finalTex = `${termsTex(fNoC)} ${cValue < 0 ? '- ' + Math.abs(cValue) : '+ ' + cValue}`;
        return {
          questionTex: `\\text{Find }f(x)\\text{ if }f'(x)=${termsTex(derivativeTerms)}\\text{ and }f(${point.tex})=${givenTex}.`,
          stages: [{
            kind: 'antiderivative-specific',
            promptTex: `\\text{Find }f(x).`,
            labelTex: `f(x)=`,
            expectedExpression: finalExpression,
            hints: [
              `f(x)=${antiderivativeTex(fNoC, 'C')}`,
              `\\begin{aligned}f(${point.tex})&=${valueTexNoC}+C\\\\${givenTex}&=${valueTexNoC}+C\\end{aligned}`,
              `C=${cTex}`,
              `f(x)=${finalTex}`
            ]
          }]
        };
      }
      return makeType1AntiderivativeProblem();
    }

    function makeType3AntiderivativeProblem() {
      for (let attempt = 0; attempt < 100; attempt++) {
        const secondTerms = generateInitialTerms(3);
        const fpNoC = antiderivativeTerms(secondTerms);
        const cPoint = chooseConditionPoint(fpNoC);
        const fpValueTexNoC = exactEvaluateTermsTex(fpNoC, cPoint);
        if (fpValueTexNoC === '\\text{undefined}') continue;
        const c1 = randomInteger(-8, 8);
        const fpGivenTex = exactEvaluateTermsTexPlusInteger(fpNoC, cPoint, c1);
        const fNoC2Base = antiderivativeTerms(fpNoC);
        if (c1 !== 0) fNoC2Base.push({ type: 'power', n: 1, coef: frac(c1, 1) });
        const dPoint = chooseConditionPoint(fNoC2Base);
        const fValueTexNoC2 = exactEvaluateTermsTex(fNoC2Base, dPoint);
        if (fValueTexNoC2 === '\\text{undefined}') continue;
        const c2 = randomInteger(-8, 8);
        const fGivenTex = exactEvaluateTermsTexPlusInteger(fNoC2Base, dPoint, c2);
        const finalExpression = antiderivativeExpression(fNoC2Base, String(c2));
        const finalTex = `${termsTex(fNoC2Base)} ${c2 < 0 ? '- ' + Math.abs(c2) : '+ ' + c2}`;
        return {
          questionTex: `\\text{Find }f(x)\\text{ if }f''(x)=${termsTex(secondTerms)}\\text{, }f'(${cPoint.tex})=${fpGivenTex}\\text{, and }f(${dPoint.tex})=${fGivenTex}.`,
          stages: [{
            kind: 'antiderivative-specific',
            promptTex: `\\text{Find }f(x).`,
            labelTex: `f(x)=`,
            expectedExpression: finalExpression,
            hints: [
              `f'(x)=${antiderivativeTex(fpNoC, 'C_1')}`,
              `\\begin{aligned}f'(${cPoint.tex})&=${fpValueTexNoC}+C_1\\\\${fpGivenTex}&=${fpValueTexNoC}+C_1\\end{aligned}`,
              `C_1=${c1}`,
              `f'(x)=${termsTex(fpNoC)} ${c1 < 0 ? '- ' + Math.abs(c1) : '+ ' + c1}`,
              `f(x)=${termsTex(fNoC2Base)} + C_2`,
              `\\begin{aligned}f(${dPoint.tex})&=${fValueTexNoC2}+C_2\\\\${fGivenTex}&=${fValueTexNoC2}+C_2\\end{aligned}`,
              `C_2=${c2}`,
              `f(x)=${finalTex}`
            ]
          }]
        };
      }
      return makeType2AntiderivativeProblem();
    }

    function generateAntiderivativeProblem() {
      const r = Math.random();
      if (r < 1/3) return makeType1AntiderivativeProblem();
      if (r < 2/3) return makeType2AntiderivativeProblem();
      return makeType3AntiderivativeProblem();
    }

    function normalizeAnswerText(raw) {
      return String(raw || '')
        .replace(/−/g, '-')
        .replace(/π/g, 'pi')
        .replace(/\s+/g, '')
        .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, '(($1)/($2))')
        .replace(/\\sqrt\{([^{}]+)\}/g, 'sqrt($1)')
        .replace(/√\(/g, 'sqrt(')
        .replace(/√([0-9.]+|x)/g, 'sqrt($1)')
        .replace(/\^/g, '**')
        .toLowerCase();
    }

    function expressionToJs(raw) {
      let s = normalizeAnswerText(raw);
      if (s.startsWith('y=')) s = s.slice(2);
      if (s.startsWith('f(x)=')) s = s.slice(5);
      if (s.startsWith('f=')) s = s.slice(2);
      if (s.startsWith('F(x)=')) s = s.slice(5);
      s = s.replace(/\ln\|([^|]+)\|/g, 'ln(abs($1))')
           .replace(/ln\|([^|]+)\|/g, 'ln(abs($1))')
           .replace(/\left\|([^|]+)\right\|/g, 'abs($1)')
           .replace(/\ln/g, 'ln')
           .replace(/\tan/g, 'tan')
           .replace(/\sin/g, 'sin')
           .replace(/\cos/g, 'cos')
           .replace(/\sec/g, 'sec')
           .replace(/\csc/g, 'csc')
           .replace(/\cot/g, 'cot')
           .replace(/\cdot/g, '*')
           .replace(/\left/g, '')
           .replace(/\right/g, '')
           .replace(/\,/g, '')
           .replace(/\mathrm\{e\}/g, 'e')
           .replace(/\operatorname\{ln\}/g, 'ln')
           .replace(/\abs/g, 'abs');
      s = s.replace(/\bC_?\d*\b/g, '0').replace(/\bc_?\d*\b/g, '0');
      const trigNames = '(sin|cos|tan|sec|csc|cot)';
      s = s
        .replace(new RegExp(`${trigNames}\\*\\*\\(([^()]+)\\)\\(([^()]+)\\)`, 'g'), '($1($3))**($2)')
        .replace(new RegExp(`${trigNames}\\*\\*([0-9]+)\\(([^()]+)\\)`, 'g'), '($1($3))**($2)')
        .replace(/ln/g, 'Math.log')
        .replace(/abs/g, 'Math.abs')
        .replace(/sqrt/g, 'Math.sqrt')
        .replace(/sin/g, 'Math.sin')
        .replace(/cos/g, 'Math.cos')
        .replace(/tan/g, 'Math.tan')
        .replace(/sec\(([^()]+)\)/g, '(1/Math.cos($1))')
        .replace(/csc\(([^()]+)\)/g, '(1/Math.sin($1))')
        .replace(/cot\(([^()]+)\)/g, '(1/Math.tan($1))')
        .replace(/pi/g, 'Math.PI')
        .replace(/\be\b/g, 'Math.E');
      s = s.replace(/(\d|x|\)|Math\.E|Math\.PI)(?=(x|Math\.sqrt|Math\.log|Math\.abs|Math\.sin|Math\.cos|Math\.tan|Math\.PI|Math\.E|\())/g, '$1*');
      s = s.replace(/(x|\))(?=\d)/g, '$1*');
      return s;
    }

    function evaluateUserExpression(raw, x) {
      const js = expressionToJs(raw);
      if (!js || /[^0-9x+\-*/().,A-Za-z_]/.test(js)) return NaN;
      try {
        const value = Function('x', `"use strict"; return (${js});`)(x);
        return Number.isFinite(value) ? value : NaN;
      } catch (error) {
        return NaN;
      }
    }

    function expressionMatches(raw, expectedRaw) {
      const points = [-7, -3, -1, 0, 2, 5, 8];
      let checked = 0;
      for (const x of points) {
        const user = evaluateUserExpression(raw, x);
        const expected = evaluateUserExpression(expectedRaw, x);
        if (Number.isFinite(user) && Number.isFinite(expected)) {
          checked++;
          if (Math.abs(user - expected) > 1e-6 * Math.max(1, Math.abs(expected))) return false;
        }
      }
      return checked >= 3;
    }

    function numericAnswerMatches(raw, expected) {
      const user = evaluateUserExpression(raw, 0);
      return Number.isFinite(user) && Math.abs(user - expected) < 1e-6 * Math.max(1, Math.abs(expected));
    }

    function lineAnswerMatches(raw, m, b) {
      const points = [-5, -1, 0, 3, 7];
      return points.every(x => {
        const user = evaluateUserExpression(raw, x);
        const expected = m * x + b;
        return Number.isFinite(user) && Math.abs(user - expected) < 1e-6 * Math.max(1, Math.abs(expected));
      });
    }

    function answerToolbarHtml() {
      return `
        <div class="answer-toolbar">
          <button type="button" class="math-symbol-button" data-insert-text="x">x</button>
          <button type="button" class="math-symbol-button" data-insert-text="π">π</button>
          <button type="button" class="math-symbol-button" data-insert-text="e">e</button>
          <button type="button" class="math-symbol-button" data-insert-text="ln(">ln</button>
          <button type="button" class="math-symbol-button" data-insert-text="C">C</button>
          <button type="button" class="math-symbol-button" data-insert-text="sin(">sin</button>
          <button type="button" class="math-symbol-button" data-insert-text="cos(">cos</button>
          <button type="button" class="math-symbol-button" data-insert-text="tan(">tan</button>
          <button type="button" class="math-symbol-button" data-insert-text="sec(">sec</button>
          <button type="button" class="math-symbol-button" data-insert-text="csc(">csc</button>
          <button type="button" class="math-symbol-button" data-insert-text="cot(">cot</button>
          <button type="button" class="math-symbol-button" data-insert-exponent="true">x<sup>□</sup></button>
          <button type="button" class="math-symbol-button" data-insert-radical="true">√</button>
          <button type="button" class="math-symbol-button" data-insert-fraction="true"><span class="fraction-button-display"><span class="fraction-button-top">a</span><span class="fraction-button-bottom">b</span></span></button>
          <button type="button" class="math-symbol-button" data-insert-text="/">/</button>
          <button type="button" class="math-symbol-button" data-insert-text="(">(</button>
          <button type="button" class="math-symbol-button" data-insert-text=")">)</button>
        </div>`;
    }

    function getActiveEditor() {
      return document.getElementById(`answer-editor-${currentStageIndex}`);
    }

    function getInsertionEditor() {
      const outer = getActiveEditor();
      if (!outer) return null;
      if (activeMathEditor && outer.contains(activeMathEditor) && activeMathEditor.isContentEditable) return activeMathEditor;
      return outer;
    }

    function getEditorRange(editor) {
      const selection = window.getSelection();
      if (selection.rangeCount) {
        const range = selection.getRangeAt(0);
        const container = range.commonAncestorContainer.nodeType === Node.TEXT_NODE
          ? range.commonAncestorContainer.parentElement
          : range.commonAncestorContainer;
        if (editor.contains(container) || editor === container) return range;
      }
      const range = document.createRange();
      range.selectNodeContents(editor);
      range.collapse(false);
      return range;
    }

    function placeCaretInside(element) {
      const range = document.createRange();
      range.selectNodeContents(element);
      range.collapse(false);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      activeMathEditor = element;
      element.focus();
    }

    function placeCaretInTextNode(node, offset) {
      const range = document.createRange();
      range.setStart(node, offset);
      range.collapse(true);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      const outer = getActiveEditor();
      if (outer) outer.focus();
    }

    function makeCaretSpacer() {
      return document.createTextNode('\u200b');
    }

    function insertTextAtSelection(text, editor = getInsertionEditor()) {
      if (!editor) return;
      const range = getEditorRange(editor);
      range.deleteContents();
      const node = document.createTextNode(text);
      range.insertNode(node);
      placeCaretInTextNode(node, node.textContent.length);
    }

    function insertExponentAtSelection(editor = getInsertionEditor()) {
      if (!editor) return;
      const range = getEditorRange(editor);
      range.deleteContents();
      const exponent = document.createElement('span');
      exponent.className = 'exponent-entry special-wrapper special-entry';
      exponent.setAttribute('data-special-wrapper', 'exponent');
      exponent.setAttribute('data-special-entry', 'exponent');
      exponent.contentEditable = 'true';
      range.insertNode(exponent);
      placeCaretInside(exponent);
    }

    function insertFractionAtSelection(editor = getInsertionEditor()) {
      if (!editor) return;
      const range = getEditorRange(editor);
      range.deleteContents();
      const wrapper = document.createElement('span');
      wrapper.className = 'fraction-entry special-wrapper';
      wrapper.setAttribute('data-special-wrapper', 'fraction');
      wrapper.innerHTML = '<span class="fraction-numerator special-entry" contenteditable="true" data-special-entry="fraction-numerator"></span><span class="fraction-denominator special-entry" contenteditable="true" data-special-entry="fraction-denominator"></span>';
      range.insertNode(wrapper);
      placeCaretInside(wrapper.querySelector('.fraction-numerator'));
    }

    function insertRadicalAtSelection(editor = getInsertionEditor()) {
      if (!editor) return;
      const range = getEditorRange(editor);
      range.deleteContents();
      const wrapper = document.createElement('span');
      wrapper.className = 'math-radical special-wrapper';
      wrapper.setAttribute('data-special-wrapper', 'radical');
      wrapper.innerHTML = '<span class="radical-symbol">√</span><span class="radical-entry special-entry" contenteditable="true" data-special-entry="radical"></span>';
      range.insertNode(wrapper);
      placeCaretInside(wrapper.querySelector('.radical-entry'));
    }

    function editorToPlainText(editor) {
      function walk(node) {
        if (!node) return '';
        if (node.nodeType === Node.TEXT_NODE) return node.textContent.replace(/\u200b/g, '').replace(/​/g, '');
        if (node.nodeType !== Node.ELEMENT_NODE) return '';
        if (node.matches && node.matches('.fraction-entry')) {
          return `((${walk(node.querySelector('.fraction-numerator'))})/(${walk(node.querySelector('.fraction-denominator'))}))`;
        }
        if (node.matches && node.matches('.math-radical')) {
          return `sqrt(${walk(node.querySelector('.radical-entry'))})`;
        }
        if (node.matches && node.matches('.exponent-entry')) {
          return `**(${Array.from(node.childNodes).map(walk).join('')})`;
        }
        return Array.from(node.childNodes).map(walk).join('');
      }
      return Array.from(editor.childNodes).map(walk).join('').replace(/\u200b/g, '').replace(/​/g, '').trim();
    }

    function closestMathWidget(node) {
      if (!node) return null;
      const element = node.nodeType === Node.ELEMENT_NODE ? node : node.parentElement;
      return element ? element.closest('.fraction-entry, .math-radical, .exponent-entry') : null;
    }

    function visibleTextAfterCaretInside(element) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return '';
      const range = selection.getRangeAt(0);
      if (!range.collapsed) return 'not-collapsed';
      const testRange = document.createRange();
      testRange.selectNodeContents(element);
      try {
        testRange.setStart(range.startContainer, range.startOffset);
      } catch (e) {
        return 'outside';
      }
      return testRange.toString().replace(/\u200b/g, '').replace(/​/g, '');
    }

    function visibleTextBeforeCaretInside(element) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return '';
      const range = selection.getRangeAt(0);
      if (!range.collapsed) return 'not-collapsed';
      const testRange = document.createRange();
      testRange.selectNodeContents(element);
      try {
        testRange.setEnd(range.startContainer, range.startOffset);
      } catch (e) {
        return 'outside';
      }
      return testRange.toString().replace(/\u200b/g, '').replace(/​/g, '');
    }

    function moveCursorAfterElement(element) {
      let next = element.nextSibling;
      if (!next || next.nodeType !== Node.TEXT_NODE) {
        next = makeCaretSpacer();
        element.parentNode.insertBefore(next, element.nextSibling);
      }
      placeCaretInTextNode(next, next.textContent.length);
      const outer = getActiveEditor();
      activeMathEditor = outer && outer.contains(next) ? outer : null;
    }

    function moveCursorBeforeElement(element) {
      let previous = element.previousSibling;
      if (!previous || previous.nodeType !== Node.TEXT_NODE) {
        previous = makeCaretSpacer();
        element.parentNode.insertBefore(previous, element);
      }
      placeCaretInTextNode(previous, 0);
      const outer = getActiveEditor();
      activeMathEditor = outer && outer.contains(previous) ? outer : null;
    }

    function previousNodeBeforeCaret(range) {
      const container = range.startContainer;
      const offset = range.startOffset;
      if (container.nodeType === Node.TEXT_NODE) {
        if (offset > 0 && container.textContent.slice(0, offset).replace(/\u200b/g, '').replace(/​/g, '').length > 0) return null;
        return container.previousSibling;
      }
      if (offset > 0) return container.childNodes[offset - 1];
      return container.previousSibling;
    }

    function handleBackspaceDeleteWidget(event) {
      const selection = window.getSelection();
      if (!selection.rangeCount || !selection.getRangeAt(0).collapsed) return false;
      const range = selection.getRangeAt(0);
      let previous = previousNodeBeforeCaret(range);
      while (previous && previous.nodeType === Node.TEXT_NODE && previous.textContent.replace(/\u200b/g, '').replace(/​/g, '') === '') {
        previous = previous.previousSibling;
      }
      if (previous && previous.nodeType === Node.ELEMENT_NODE && previous.matches('.fraction-entry, .math-radical, .exponent-entry')) {
        event.preventDefault();
        previous.remove();
        return true;
      }
      return false;
    }

    function handleMathEditorKeydown(event) {
      const target = event.target.closest && event.target.closest('.polynomial-answer-editor, .special-entry');
      if (target && target.isContentEditable) activeMathEditor = target;

      if (event.key === '^') {
        event.preventDefault();
        insertExponentAtSelection(getInsertionEditor());
        return;
      }

      if (event.key === 'ArrowRight') {
        const selection = window.getSelection();
        if (selection.rangeCount) {
          const widget = closestMathWidget(selection.getRangeAt(0).startContainer);
          if (widget && visibleTextAfterCaretInside(widget) === '') {
            event.preventDefault();
            moveCursorAfterElement(widget);
            return;
          }
        }
      }

      if (event.key === 'ArrowLeft') {
        const selection = window.getSelection();
        if (selection.rangeCount) {
          const widget = closestMathWidget(selection.getRangeAt(0).startContainer);
          if (widget && visibleTextBeforeCaretInside(widget) === '') {
            event.preventDefault();
            moveCursorBeforeElement(widget);
            return;
          }
        }
      }

      if (event.key === 'Backspace' && handleBackspaceDeleteWidget(event)) return;
      if (event.key === 'Enter') event.preventDefault();
    }

    function renderStages() {
      finalAnswerInput.innerHTML = currentProblem.stages.map((stage, index) => {
        const locked = index < currentStageIndex;
        const active = index === currentStageIndex;
        const hidden = index > currentStageIndex;
        if (hidden) return '';
        return `
          <div class="derivative-stage-row" data-stage-index="${index}" style="margin: 0.85em auto; text-align: center;">
            <div style="margin-bottom: 0.35em;">\\[${stage.promptTex}\\]</div>
            <span>\\(${stage.labelTex}\\)</span>
            <span id="answer-editor-${index}" class="polynomial-answer-editor" contenteditable="${locked ? 'false' : 'true'}" role="textbox" aria-label="Derivative answer" style="min-width: 320px;"></span>
            ${locked ? '<span style="color: green; margin-left: 0.5em; font-weight: bold;">Correct!</span>' : ''}
            ${active ? answerToolbarHtml() : ''}
          </div>`;
      }).join('');

      currentProblem.stages.forEach((stage, index) => {
        const editor = document.getElementById(`answer-editor-${index}`);
        if (editor && stage.savedAnswerHtml !== undefined) editor.innerHTML = stage.savedAnswerHtml;
      });

      const activeInput = getActiveEditor();
      activeMathEditor = activeInput;

      finalAnswerInput.onfocusin = event => {
        const editable = event.target.closest && event.target.closest('.special-entry, .polynomial-answer-editor');
        const outer = getActiveEditor();
        if (editable && outer && outer.contains(editable) && editable.isContentEditable) activeMathEditor = editable;
      };
      finalAnswerInput.onmousedown = event => {
        const editable = event.target.closest && event.target.closest('.special-entry, .polynomial-answer-editor');
        const outer = getActiveEditor();
        if (editable && outer && outer.contains(editable) && editable.isContentEditable) activeMathEditor = editable;
      };
      finalAnswerInput.onkeydown = event => {
        if (event.target.closest && event.target.closest('.polynomial-answer-editor, .special-entry')) {
          handleMathEditorKeydown(event);
        }
      };

      finalAnswerInput.querySelectorAll('.math-symbol-button').forEach(button => {
        button.addEventListener('mousedown', event => event.preventDefault());
        button.addEventListener('click', () => {
          const editor = getInsertionEditor();
          if (!editor) return;
          if (button.dataset.insertExponent) insertExponentAtSelection(editor);
          else if (button.dataset.insertFraction) insertFractionAtSelection(editor);
          else if (button.dataset.insertRadical) insertRadicalAtSelection(editor);
          else insertTextAtSelection(button.dataset.insertText || '', editor);
        });
      });

      typesetElement(finalAnswerInput);
      if (activeInput) activeInput.focus();
    }

    function derivativeMatches(raw, targetExpression) {
      const points = [-4, -2, -1, 1, 2, 4, 6];
      const h = 1e-5;
      let checked = 0;
      for (const x of points) {
        const up = evaluateUserExpression(raw, x + h);
        const down = evaluateUserExpression(raw, x - h);
        const target = Function('x', `"use strict"; return (${targetExpression});`)(x);
        if (Number.isFinite(up) && Number.isFinite(down) && Number.isFinite(target)) {
          checked++;
          const userDer = (up - down) / (2 * h);
          if (Math.abs(userDer - target) > 1e-4 * Math.max(1, Math.abs(target))) return false;
        }
      }
      return checked >= 4;
    }

    function expressionMatchesJs(raw, expectedJs) {
      const points = [-5, -3, -2, -1, 1, 2, 4, 6];
      let checked = 0;
      let expectedFn;
      try { expectedFn = Function('x', `"use strict"; return (${expectedJs});`); }
      catch (e) { return false; }
      for (const x of points) {
        const user = evaluateUserExpression(raw, x);
        let expected = NaN;
        try { expected = expectedFn(x); } catch (e) { expected = NaN; }
        if (Number.isFinite(user) && Number.isFinite(expected)) {
          checked++;
          if (Math.abs(user - expected) > 1e-6 * Math.max(1, Math.abs(expected))) return false;
        }
      }
      return checked >= 4;
    }

    function currentStageIsCorrect(stage, raw) {
      if (stage.kind === 'antiderivative-general') {
        const hasC = /(^|[^a-zA-Z])C(_?\d*)?([^a-zA-Z]|$)/.test(String(raw || '')) || /\bc\b/.test(String(raw || ''));
        return hasC && derivativeMatches(raw, stage.targetDerivativeExpression);
      }
      if (stage.kind === 'antiderivative-specific') return expressionMatchesJs(raw, stage.expectedExpression);
      if (stage.kind === 'function') return expressionMatches(raw, stage.expectedExpression);
      if (stage.kind === 'a') return numericAnswerMatches(raw, stage.expectedValue);
      if (stage.kind === 'linearization') return lineAnswerMatches(raw, stage.expectedM, stage.expectedB);
      if (stage.kind === 'approximation') return numericAnswerMatches(raw, stage.expectedValue);
      return false;
    }

    function checkUserAnswer() {
      if (!currentProblem) return;
      const stage = currentProblem.stages[currentStageIndex];
      const input = document.getElementById(`answer-editor-${currentStageIndex}`);
      if (!stage || !input) return;
      const rawAnswer = editorToPlainText(input);
      if (!currentStageIsCorrect(stage, rawAnswer)) {
        feedbackText.textContent = 'Incorrect, try again.';
        feedbackText.style.color = 'red';
        return;
      }
      stage.savedAnswerHtml = input.innerHTML;
      feedbackText.textContent = 'Correct!';
      feedbackText.style.color = 'green';
      currentStageIndex++;
      hintStep = 0;
      hintArea.innerHTML = '';
      if (currentStageIndex >= currentProblem.stages.length) {
        renderStages();
        checkBtn.style.display = 'none';
        hintBtn.disabled = true;
        return;
      }
      renderStages();
      hintBtn.disabled = false;
    }

    function appendMathHint(tex) {
      const block = document.createElement('div');
      block.style.textAlign = 'center';
      block.style.margin = '0.55em auto';
      block.innerHTML = `\\[${tex}\\]`;
      hintArea.appendChild(block);
      return typesetElement(block);
    }

    async function advanceHint() {
      if (!currentProblem || hintIsTypesetting) return;
      const stage = currentProblem.stages[currentStageIndex];
      if (!stage || hintStep >= stage.hints.length) return;
      const sound = document.getElementById('click-sound');
      if (sound) { sound.currentTime = 0; sound.play(); }
      hintIsTypesetting = true;
      hintBtn.disabled = true;
      await appendMathHint(stage.hints[hintStep]);
      hintStep++;
      hintIsTypesetting = false;
      hintBtn.disabled = hintStep >= stage.hints.length;
    }

    function clearOldActivityState() {
      feedbackText.textContent = '';
      finalAnswerInput.innerHTML = '';
      hintArea.innerHTML = '';
      if (graphArea) { graphArea.innerHTML = ''; graphArea.style.display = 'none'; }
      questionText.innerHTML = '';
      hintStep = 0;
      currentStageIndex = 0;
      hintBtn.disabled = true;
      checkBtn.style.display = 'none';
      hintIsTypesetting = false;
    }

    startBtn.addEventListener('click', () => {
      clearOldActivityState();
      const sound = document.getElementById('click-sound');
      if (sound) { sound.currentTime = 0; sound.play(); }
      currentProblem = generateAntiderivativeProblem();
      questionText.innerHTML = `\\[${currentProblem.questionTex}\\]`;
      renderStages();
      checkBtn.style.display = 'inline-block';
      hintBtn.disabled = false;
      typesetElement(questionText);
    });

    hintBtn.addEventListener('click', advanceHint);
    checkBtn.addEventListener('click', checkUserAnswer);
  
  </script>

  <audio id="click-sound" src="button.mp3" preload="auto"></audio>
  <audio id="set-sound" src="set2.mp3" preload="auto"></audio>
