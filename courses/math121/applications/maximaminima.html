  <script>
    const hintBtn = document.getElementById('hint-btn');
    const hintArea = document.getElementById('hint-area');
    const startBtn = document.getElementById('start-btn');
    const questionText = document.getElementById('question-text');
    const checkBtn = document.getElementById('check-btn');
    const feedbackText = document.getElementById('feedbackText');
    const finalAnswerInput = document.getElementById('final-answer-input');

    let currentProblem = null;
    let hintStep = 0;
    let mathJaxTypesetPromise = Promise.resolve();

    function typesetElement(element) {
      if (!window.MathJax || !MathJax.typesetPromise) {
        if (window.MathJax && MathJax.typeset) MathJax.typeset([element]);
        return Promise.resolve();
      }
      mathJaxTypesetPromise = mathJaxTypesetPromise
        .then(() => MathJax.typesetPromise([element]))
        .catch(error => console.error('MathJax typesetting failed:', error));
      return mathJaxTypesetPromise;
    }

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomNonzeroInteger(min, max) {
      let n;
      do { n = randomInteger(min, max); } while (n === 0);
      return n;
    }

    function randomChoice(items) {
      return items[randomInteger(0, items.length - 1)];
    }

    function gcd(a, b) {
      a = Math.abs(Math.round(a));
      b = Math.abs(Math.round(b));
      while (b !== 0) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a || 1;
    }

    function exactFraction(num, den = 1) {
      if (den < 0) { num = -num; den = -den; }
      if (num === 0) return { num: 0, den: 1 };
      const d = gcd(num, den);
      return { num: num / d, den: den / d };
    }

    function numberTex(value) {
      if (Object.is(value, -0)) value = 0;
      const rounded = Math.round(value);
      if (Math.abs(value - rounded) < 1e-10) return `${rounded}`;
      const sign = value < 0 ? -1 : 1;
      const abs = Math.abs(value);
      let bestNum = 0, bestDen = 1, bestErr = Infinity;
      for (let den = 1; den <= 144; den++) {
        const num = Math.round(abs * den);
        const err = Math.abs(abs - num / den);
        if (err < bestErr) { bestNum = num; bestDen = den; bestErr = err; }
      }
      const f = exactFraction(sign * bestNum, bestDen);
      return f.den === 1 ? `${f.num}` : `\\frac{${f.num}}{${f.den}}`;
    }

    function fractionToTex(frac) {
      const f = exactFraction(frac.num, frac.den);
      if (f.den === 1) return `${f.num}`;
      return `\\frac{${f.num}}{${f.den}}`;
    }

    function piMultipleToTex(k) {
      const f = exactFraction(k, 12);
      if (f.num === 0) return '0';
      const sign = f.num < 0 ? '-' : '';
      const absNum = Math.abs(f.num);
      if (f.den === 1) return `${sign}${absNum === 1 ? '' : absNum}\\pi`;
      return `${sign}\\frac{${absNum === 1 ? '' : absNum}\\pi}{${f.den}}`;
    }

    function simplePolynomialTex(terms) {
      const cleaned = terms.filter(t => Math.abs(t.c) > 1e-12).sort((a, b) => b.p - a.p);
      if (!cleaned.length) return '0';
      return cleaned.map((t, i) => {
        const sign = t.c < 0 ? '-' : (i === 0 ? '' : '+');
        const abs = Math.abs(t.c);
        let body;
        if (t.p === 0) body = numberTex(abs);
        else {
          const xpart = t.p === 1 ? 'x' : `x^{${t.p}}`;
          body = Math.abs(abs - 1) < 1e-12 ? xpart : `${numberTex(abs)}${xpart}`;
        }
        return i === 0 ? `${sign}${body}` : `${sign} ${body}`;
      }).join(' ');
    }

    function linearFactorTex(h) {
      if (h === 0) return 'x';
      return `(x ${h < 0 ? '+ ' + Math.abs(h) : '- ' + h})`;
    }

    function signedTex(n) {
      return n < 0 ? `- ${Math.abs(n)}` : `+ ${n}`;
    }

    function valueObj(decimal, tex = null) {
      return { decimal: Math.abs(decimal) < 1e-12 ? 0 : decimal, tex: tex || numberTex(decimal) };
    }

    function fracValue(num, den = 1) {
      const f = exactFraction(num, den);
      return { decimal: f.num / f.den, tex: fractionToTex(f) };
    }

    function specialTrigValue(n, d) {
      const angle = Math.PI * n / d;
      const v = Math.round(Math.sin(angle) * 1e12) / 1e12;
      const values = [
        [-1, '-1'], [-Math.sqrt(3)/2, '-\\frac{\\sqrt{3}}{2}'], [-Math.SQRT1_2, '-\\frac{\\sqrt{2}}{2}'], [-0.5, '-\\frac{1}{2}'],
        [0, '0'], [0.5, '\\frac{1}{2}'], [Math.SQRT1_2, '\\frac{\\sqrt{2}}{2}'], [Math.sqrt(3)/2, '\\frac{\\sqrt{3}}{2}'], [1, '1']
      ];
      const match = values.find(([x]) => Math.abs(v - x) < 1e-9);
      return valueObj(v, match ? match[1] : numberTex(v));
    }

    function cosSpecial(k) { return specialTrigValue(6 - k, 12); }
    function sinSpecial(k) { return specialTrigValue(k, 12); }

    function multiplyValueTex(v, c) {
      return valueObj(c * v.decimal, c === 1 ? v.tex : `${c < 0 ? '-' : ''}${Math.abs(c)}${v.tex === '1' ? '' : v.tex === '-1' ? '(-1)' : `\\left(${v.tex}\\right)`}`);
    }

    function integerIntervalContaining(points, minWidth = 4) {
      const lowPoint = Math.min(...points);
      const highPoint = Math.max(...points);
      let left = Math.max(-10, Math.floor(lowPoint) - randomInteger(1, 3));
      let right = Math.min(10, Math.ceil(highPoint) + randomInteger(1, 3));
      while (right - left < minWidth) {
        if (left > -10) left--;
        if (right - left >= minWidth) break;
        if (right < 10) right++;
        if (left === -10 && right === 10) break;
      }
      return { a: left, b: right, aTex: numberTex(left), bTex: numberTex(right) };
    }

    function trigIntervalContaining(criticalK) {
      const all = Array.from(new Set([...Array.from({length:25}, (_,i)=>i), ...criticalK])).sort((a,b)=>a-b);
      const k = randomChoice(criticalK.filter(x => x > 0 && x < 24));
      const possibleLeft = all.filter(x => x < k && x >= 0);
      const possibleRight = all.filter(x => x > k && x <= 24);
      const left = randomChoice(possibleLeft.slice(Math.max(0, possibleLeft.length - 6)));
      const right = randomChoice(possibleRight.slice(0, 6));
      return { a: left, b: right, aTex: piMultipleToTex(left), bTex: piMultipleToTex(right) };
    }

    function buildProblem({ family, tex, continuity, derivativeTex, criticalTex, criticals, interval, evalAt }) {
      const candidates = [interval.a, interval.b, ...criticals.filter(x => x > interval.a + 1e-10 && x < interval.b - 1e-10)];
      const evaluations = candidates.map(x => ({ x, value: evalAt(x) }));
      const maxVal = evaluations.reduce((best, item) => item.value.decimal > best.value.decimal ? item : best, evaluations[0]);
      const minVal = evaluations.reduce((best, item) => item.value.decimal < best.value.decimal ? item : best, evaluations[0]);
      const evalTex = evaluations.map(item => `f(${item.xTex || numberTex(item.x)})=${item.value.tex}`).join(',\\quad ');
      return {
        family,
        questionTex: `\\text{Find the absolute maximum and absolute minimum values of } f(x)=${tex} \\text{ on } [${interval.aTex},${interval.bTex}].`,
        maxValue: maxVal.value,
        minValue: minVal.value,
        hints: [
          `f(x)=${tex}\\text{ is continuous on }[${interval.aTex},${interval.bTex}]\\text{ because }${continuity}\\text{, so the Extreme Value Theorem applies.}`,
          `${derivativeTex}\\quad ${criticalTex}`,
          `\\text{Evaluate }f\\text{ at the endpoints and at the critical points in the interval: }${evalTex}.`,
          `\\text{The absolute maximum value is }${maxVal.value.tex}\\text{ and the absolute minimum value is }${minVal.value.tex}.`
        ]
      };
    }

    function generateQuadraticProblem() {
      let r = randomInteger(-7, 7);
      let s;
      do { s = randomInteger(-7, 7); } while (s === r || ((r + s) % 2 !== 0));
      const a = randomChoice([-3, -2, -1, 1, 2, 3]);
      const h = (r + s) / 2;
      const tex = `${a === 1 ? '' : a === -1 ? '-' : a}${linearFactorTex(r)}${linearFactorTex(s)}`;
      const interval = integerIntervalContaining([r, s, h]);
      const evalAt = x => valueObj(a * (x - r) * (x - s));
      return buildProblem({
        family: 'quadratic', tex, interval, evalAt,
        continuity: '\\text{it is a polynomial}',
        derivativeTex: `f'(x)=${a}(2x ${signedTex(-(r+s))})`,
        criticalTex: `f'(x)=0\\text{ gives }x=${numberTex(h)}.`,
        criticals: [h]
      });
    }

    function generateCubicProblem() {
      let p = randomInteger(-5, 4), q;
      do { q = randomInteger(p + 1, 6); } while (q === p);
      const A = randomChoice([-12, -6, 6, 12]);
      const C = randomInteger(-10, 10);
      const terms = [{ c: A/3, p: 3 }, { c: -A*(p+q)/2, p: 2 }, { c: A*p*q, p: 1 }, { c: C, p: 0 }];
      const tex = simplePolynomialTex(terms);
      const interval = integerIntervalContaining([p, q]);
      const evalAt = x => valueObj(A/3*x*x*x - A*(p+q)/2*x*x + A*p*q*x + C);
      return buildProblem({
        family: 'cubic', tex, interval, evalAt,
        continuity: '\\text{it is a polynomial}',
        derivativeTex: `f'(x)=${A}${linearFactorTex(p)}${linearFactorTex(q)}`,
        criticalTex: `f'(x)=0\\text{ gives }x=${p},${q}.`,
        criticals: [p, q]
      });
    }

    function generateQuarticProblem() {
      let p = randomInteger(-5, 4), q;
      do { q = randomInteger(p + 1, 6); } while ((p + q) % 2 !== 0);
      const a = randomChoice([-2, -1, 1, 2]);
      const C = randomInteger(-10, 10);
      const mid = (p + q) / 2;
      const tex = `${a === 1 ? '' : a === -1 ? '-' : a}${linearFactorTex(p)}^2${linearFactorTex(q)}^2${C ? ` ${signedTex(C)}` : ''}`;
      const interval = integerIntervalContaining([p, q, mid]);
      const evalAt = x => valueObj(a * Math.pow(x - p, 2) * Math.pow(x - q, 2) + C);
      return buildProblem({
        family: 'quartic', tex, interval, evalAt,
        continuity: '\\text{it is a polynomial}',
        derivativeTex: `f'(x)=${4*a}${linearFactorTex(p)}${linearFactorTex(q)}\\left(x-${numberTex(mid)}\\right)`,
        criticalTex: `f'(x)=0\\text{ gives }x=${p},${numberTex(mid)},${q}.`,
        criticals: [p, mid, q]
      });
    }

    function generateLinearPowerProblem() {
      const m = randomChoice([-3, -2, -1, 1, 2, 3]);
      const h = randomInteger(-6, 6);
      const n = randomInteger(2, 5);
      const tex = `(${m === 1 ? '' : m === -1 ? '-' : m}${linearFactorTex(h)})^{${n}}`;
      const interval = integerIntervalContaining([h]);
      const evalAt = x => valueObj(Math.pow(m * (x - h), n));
      return buildProblem({
        family: 'linear power', tex, interval, evalAt,
        continuity: '\\text{it is a power of a polynomial}',
        derivativeTex: `f'(x)=${n*m}(${m === 1 ? '' : m === -1 ? '-' : m}${linearFactorTex(h)})^{${n-1}}`,
        criticalTex: `f'(x)=0\\text{ gives }x=${h}.`,
        criticals: [h]
      });
    }

    function generateAbsoluteValueProblem() {
      const m = randomChoice([-4, -3, -2, -1, 1, 2, 3, 4]);
      const h = randomInteger(-6, 6);
      const tex = `\\left|${m === 1 ? '' : m === -1 ? '-' : m}${linearFactorTex(h)}\\right|`;
      const interval = integerIntervalContaining([h]);
      const evalAt = x => valueObj(Math.abs(m * (x - h)));
      return buildProblem({
        family: 'absolute value', tex, interval, evalAt,
        continuity: '\\text{absolute value functions are continuous}',
        derivativeTex: `f'(x)\\text{ is undefined at }x=${h}\\text{ and nonzero elsewhere on each side of }${h}.`,
        criticalTex: `\\text{Thus the only critical point is }x=${h}.`,
        criticals: [h]
      });
    }

    function generateReciprocalQuadraticProblem() {
      const h = randomInteger(-6, 6);
      const k = randomInteger(1, 9);
      const tex = `\\frac{1}{${linearFactorTex(h)}^2+${k}}`;
      const interval = integerIntervalContaining([h]);
      const evalAt = x => fracValue(1, (x-h)*(x-h)+k);
      return buildProblem({
        family: 'reciprocal quadratic', tex, interval, evalAt,
        continuity: `\\text{the denominator }${linearFactorTex(h)}^2+${k}\\text{ is always positive}`,
        derivativeTex: `f'(x)=\\frac{-2${linearFactorTex(h)}}{(${linearFactorTex(h)}^2+${k})^2}`,
        criticalTex: `f'(x)=0\\text{ gives }x=${h}.`,
        criticals: [h]
      });
    }

    function trigXTex(k) { return piMultipleToTex(k); }

    function generateTrigProblem() {
      const kind = randomChoice(['sin', 'cos', 'sinPower', 'cosPower', 'sincos', 'sinpluscos']);
      let tex, derivativeTex, criticalTex, criticalKs, evalAt, continuity;
      continuity = '\\text{sine and cosine are continuous everywhere}';
      if (kind === 'sin') {
        tex = '\\sin x'; derivativeTex = `f'(x)=\\cos x`; criticalTex = `\\cos x=0\\text{ gives }x=\\frac{\\pi}{2},\\frac{3\\pi}{2}.`; criticalKs = [6,18]; evalAt = k => sinSpecial(k);
      } else if (kind === 'cos') {
        tex = '\\cos x'; derivativeTex = `f'(x)=-\\sin x`; criticalTex = `\\sin x=0\\text{ gives }x=0,\\pi,2\\pi.`; criticalKs = [0,12,24]; evalAt = k => cosSpecial(k);
      } else if (kind === 'sinPower') {
        const n = randomInteger(2, 5); tex = `\\sin^{${n}}x`; derivativeTex = `f'(x)=${n}\\sin^{${n-1}}x\\cos x`; criticalTex = `f'(x)=0\\text{ gives }x=0,\\frac{\\pi}{2},\\pi,\\frac{3\\pi}{2},2\\pi.`; criticalKs = [0,6,12,18,24]; evalAt = k => { const v=sinSpecial(k); return valueObj(Math.pow(v.decimal,n), n===2 && Math.abs(v.decimal)===Math.SQRT1_2 ? '\\frac{1}{2}' : numberTex(Math.pow(v.decimal,n))); };
      } else if (kind === 'cosPower') {
        const n = randomInteger(2, 5); tex = `\\cos^{${n}}x`; derivativeTex = `f'(x)=-${n}\\cos^{${n-1}}x\\sin x`; criticalTex = `f'(x)=0\\text{ gives }x=0,\\frac{\\pi}{2},\\pi,\\frac{3\\pi}{2},2\\pi.`; criticalKs = [0,6,12,18,24]; evalAt = k => { const v=cosSpecial(k); return valueObj(Math.pow(v.decimal,n), n===2 && Math.abs(v.decimal)===Math.SQRT1_2 ? '\\frac{1}{2}' : numberTex(Math.pow(v.decimal,n))); };
      } else if (kind === 'sincos') {
        tex = '\\sin x\\cos x'; derivativeTex = `f'(x)=\\cos^2x-\\sin^2x`; criticalTex = `f'(x)=0\\text{ gives }x=\\frac{\\pi}{4},\\frac{3\\pi}{4},\\frac{5\\pi}{4},\\frac{7\\pi}{4}.`; criticalKs = [3,9,15,21]; evalAt = k => valueObj(sinSpecial(k).decimal * cosSpecial(k).decimal, numberTex(sinSpecial(k).decimal * cosSpecial(k).decimal));
      } else {
        tex = '\\sin x+\\cos x'; derivativeTex = `f'(x)=\\cos x-\\sin x`; criticalTex = `f'(x)=0\\text{ gives }x=\\frac{\\pi}{4},\\frac{5\\pi}{4}.`; criticalKs = [3,15]; evalAt = k => { const v = sinSpecial(k).decimal + cosSpecial(k).decimal; const tex = Math.abs(v - Math.sqrt(2)) < 1e-9 ? '\\sqrt{2}' : Math.abs(v + Math.sqrt(2)) < 1e-9 ? '-\\sqrt{2}' : numberTex(v); return valueObj(v, tex); };
      }
      const interval = trigIntervalContaining(criticalKs);
      const crits = criticalKs.map(k => k / 12 * Math.PI);
      const wrappedEvalAt = x => {
        const k = Math.round(x / Math.PI * 12);
        return evalAt(k);
      };
      const problem = buildProblem({ tex, interval: { a: interval.a/12*Math.PI, b: interval.b/12*Math.PI, aTex: interval.aTex, bTex: interval.bTex }, evalAt: wrappedEvalAt, continuity, derivativeTex, criticalTex, criticals: crits });
      problem.hints[2] = `\\text{Evaluate }f\\text{ at the endpoints and at the critical points in the interval: }` +
        [interval.a, interval.b, ...criticalKs.filter(k => k > interval.a && k < interval.b)]
        .map(k => `f(${trigXTex(k)})=${evalAt(k).tex}`).join(',\\quad ') + '.';
      return problem;
    }

    function generateEVTProblem() {
      const generators = [
        generateQuadraticProblem,
        generateCubicProblem,
        generateQuarticProblem,
        generateLinearPowerProblem,
        generateAbsoluteValueProblem,
        generateReciprocalQuadraticProblem,
        generateTrigProblem,
        generateTrigProblem
      ];
      return randomChoice(generators)();
    }

    function evaluateFlexibleNumericAnswer(input) {
      if (!input) return NaN;
      let expr = input.trim().toLowerCase();
      expr = expr.replace(/−/g, '-');
      expr = expr.replace(/π/g, 'pi');
      expr = expr.replace(/\\pi/g, 'pi');
      expr = expr.replace(/sqrt/g, 'Math.sqrt');
      expr = expr.replace(/\\sqrt\s*\{([^{}]+)\}/g, 'Math.sqrt($1)');
      expr = expr.replace(/\\frac\s*\{([^{}]+)\}\s*\{([^{}]+)\}/g, '($1)/($2)');
      expr = expr.replace(/\^/g, '**');
      expr = expr.replace(/pi/g, 'Math.PI');
      expr = expr.replace(/[^0-9+\-*/(). MathPIsqrt]/g, '');
      try {
        const value = Function(`"use strict"; return (${expr});`)();
        return Number.isFinite(value) ? value : NaN;
      } catch (e) {
        return NaN;
      }
    }

    function setupAnswerEditor() {
      finalAnswerInput.innerHTML = `
        <div class="answer-group-grid">
          <div class="answer-group-card">
            <div class="answer-group-card-title">Absolute maximum value</div>
            <input id="max-answer" class="asymptote-value-input" style="width: 170px;" autocomplete="off">
          </div>
          <div class="answer-group-card">
            <div class="answer-group-card-title">Absolute minimum value</div>
            <input id="min-answer" class="asymptote-value-input" style="width: 170px;" autocomplete="off">
          </div>
        </div>`;
    }

    function checkUserAnswer() {
      if (!currentProblem) return;
      const maxInput = document.getElementById('max-answer');
      const minInput = document.getElementById('min-answer');
      const userMax = evaluateFlexibleNumericAnswer(maxInput ? maxInput.value : '');
      const userMin = evaluateFlexibleNumericAnswer(minInput ? minInput.value : '');
      const maxCorrect = Number.isFinite(userMax) && Math.abs(userMax - currentProblem.maxValue.decimal) < 1e-8;
      const minCorrect = Number.isFinite(userMin) && Math.abs(userMin - currentProblem.minValue.decimal) < 1e-8;
      feedbackText.textContent = maxCorrect && minCorrect ? 'Correct!' : 'Incorrect, try again.';
      feedbackText.style.color = maxCorrect && minCorrect ? 'green' : 'red';
    }

    function clearOldActivityState() {
      feedbackText.textContent = '';
      finalAnswerInput.innerHTML = '';
      hintArea.innerHTML = '';
      hintStep = 0;
      hintBtn.disabled = true;
      checkBtn.style.display = 'none';
    }

    function advanceHint() {
      if (!currentProblem || hintStep >= currentProblem.hints.length) return;
      const line = document.createElement('p');
      line.innerHTML = `\\[${currentProblem.hints[hintStep]}\\]`;
      hintArea.appendChild(line);
      hintStep++;
      if (hintStep >= currentProblem.hints.length) hintBtn.disabled = true;
      typesetElement(hintArea);
    }

    startBtn.addEventListener('click', () => {
      clearOldActivityState();
      const sound = document.getElementById('click-sound');
      if (sound) {
        sound.currentTime = 0;
        sound.play();
      }
      currentProblem = generateEVTProblem();
      questionText.innerHTML = `\\[${currentProblem.questionTex}\\]`;
      setupAnswerEditor();
      checkBtn.style.display = 'inline-block';
      hintBtn.disabled = false;
      typesetElement(questionText);
    });

    hintBtn.addEventListener('click', advanceHint);
    checkBtn.addEventListener('click', checkUserAnswer);
  </script>

  <audio id="click-sound" src="button.mp3" preload="auto"></audio>
  <audio id="set-sound" src="set2.mp3" preload="auto"></audio>

</body>
</html>
