<body>
  <header>
    <h1>(Rough) Derivative Sketching</h1>

    <script>
fetch("/nav.html")
  .then(response => response.text())
  .then(html => {

    const currentPath = window.location.pathname.replace(/\/index\.html$/, "/");

  <main>
    <p>In this activity, a function is shown on unlabeled axes.  Your task will eventually be to draw a rough sketch of its derivative on the same plane.</p>
    <p>For now, this first version only generates the original function.</p>

    <div class="button-container">
      <button id="start-btn" class="rubber-button">Start!</button>
    </div>

    <div id="question-text"></div>
    <div id="my-activity" style="display: none;"></div>

    <div id="debug-panel" class="rough-debug-panel"></div>
  </main>

  <script>
    const startBtn = document.getElementById('start-btn');
    const questionText = document.getElementById('question-text');
    const activityDiv = document.getElementById('my-activity');
    const debugPanel = document.getElementById('debug-panel');

    let currentProblem = null;
    let roughCanvas = null;
    let selectedDrawTool = 'closed';
    let pendingDerivativeStart = null;
    let placedDerivativePieces = [];

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomChoice(items) {
      return items[randomInteger(0, items.length - 1)];
    }

    function randomNonzeroInteger(min, max) {
      let n;
      do { n = randomInteger(min, max); } while (n === 0);
      return n;
    }

    function coinFlip() {
      return Math.random() < 0.5;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function shuffled(items) {
      const copy = items.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = randomInteger(0, i);
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function generatePartition() {
      const intervalCount = randomInteger(4, 6);
      const endpoints = [-10, 10];
      const candidates = [];
      for (let x = -9; x <= 9; x++) candidates.push(x);
      while (endpoints.length < intervalCount + 1) {
        const x = randomChoice(candidates);
        if (!endpoints.includes(x)) endpoints.push(x);
      }
      endpoints.sort((a, b) => a - b);
      return endpoints;
    }

    function chooseBreakTypes(breakCount) {
      const breakTypes = [];
      let hasAsymptote = false;

      for (let i = 0; i < breakCount; i++) {
        let r = Math.random();
        let kind;
        if (r < 0.10 && !hasAsymptote) {
          kind = 'asymptote';
          hasAsymptote = true;
        } else if (r < 0.20) {
          kind = 'holeDefinedElsewhere';
        } else if (r < 0.30) {
          kind = 'holeUndefined';
        } else if (r < 0.60) {
          kind = randomChoice(['jumpLeftClosed', 'jumpRightClosed', 'jumpOpenBoth']);
        } else {
          kind = 'continuous';
        }
        breakTypes.push({ kind });
      }
      return breakTypes;
    }

    function finiteIntegerY() {
      return randomInteger(-8, 8);
    }

    function possibleSlopesFromLeft(x0, x1, y0) {
      const dx = x1 - x0;
      const slopes = [];
      for (let m = -3; m <= 3; m++) {
        if (m === 0) continue;
        const y1 = y0 + m * dx;
        if (y1 >= -10 && y1 <= 10) slopes.push(m);
      }
      return slopes;
    }

    function makeLinearSegment(x0, x1, forcedLeftY = null) {
      if (forcedLeftY !== null) {
        const slopes = possibleSlopesFromLeft(x0, x1, forcedLeftY);
        if (!slopes.length) return null;
        const m = randomChoice(slopes);
        return { type: 'linear', x0, x1, y0: forcedLeftY, y1: forcedLeftY + m * (x1 - x0), m };
      }

      for (let attempt = 0; attempt < 80; attempt++) {
        const m = randomNonzeroInteger(-3, 3);
        const y0 = finiteIntegerY();
        const y1 = y0 + m * (x1 - x0);
        if (y1 >= -10 && y1 <= 10) return { type: 'linear', x0, x1, y0, y1, m };
      }
      return null;
    }

    function makeConstantSegment(x0, x1, forcedLeftY = null) {
      const y = forcedLeftY === null ? finiteIntegerY() : forcedLeftY;
      return { type: 'constant', x0, x1, y0: y, y1: y, y };
    }

    function makeQuadraticSegment(x0, x1, forcedLeftY = null) {
      if (x1 - x0 < 2) return null;
      const interiorXs = [];
      for (let x = x0 + 1; x <= x1 - 1; x++) interiorXs.push(x);
      const tries = shuffled(interiorXs).flatMap(vx => shuffled([1, -1]).map(a => ({ vx, a })));

      for (const candidate of tries) {
        const { vx, a } = candidate;
        let vertexY;
        if (forcedLeftY === null) {
          const minVertexY = -10 - a * Math.pow(x0 - vx, 2);
          const maxVertexY = 10 - a * Math.pow(x0 - vx, 2);
          const possible = [];
          for (let y = -10; y <= 10; y++) {
            const y0 = y + a * Math.pow(x0 - vx, 2);
            const y1 = y + a * Math.pow(x1 - vx, 2);
            if (y0 >= -10 && y0 <= 10 && y1 >= -10 && y1 <= 10) possible.push(y);
          }
          if (!possible.length) continue;
          vertexY = randomChoice(possible);
        } else {
          vertexY = forcedLeftY - a * Math.pow(x0 - vx, 2);
        }

        const y0 = vertexY + a * Math.pow(x0 - vx, 2);
        const y1 = vertexY + a * Math.pow(x1 - vx, 2);
        if (y0 >= -10 && y0 <= 10 && y1 >= -10 && y1 <= 10 && vertexY >= -10 && vertexY <= 10) {
          return { type: 'quadratic', x0, x1, y0, y1, a, vx, vertexY };
        }
      }
      return null;
    }

    function makeAsymptoteSegment(x0, x1, asymptoteSide, forcedFiniteY = null) {
      const finiteY = forcedFiniteY === null ? finiteIntegerY() : forcedFiniteY;
      const infinitySign = coinFlip() ? 1 : -1;
      return { type: 'asymptoteCurve', x0, x1, y0: asymptoteSide === 'left' ? infinitySign * Infinity : finiteY, y1: asymptoteSide === 'right' ? infinitySign * Infinity : finiteY, finiteY, infinitySign, asymptoteSide };
    }

    function makeRegularSegment(x0, x1, forcedLeftY = null) {
      const options = ['constant', 'linear'];
      if (x1 - x0 >= 2) options.push('quadratic');
      for (const type of shuffled(options)) {
        let segment = null;
        if (type === 'constant') segment = makeConstantSegment(x0, x1, forcedLeftY);
        if (type === 'linear') segment = makeLinearSegment(x0, x1, forcedLeftY);
        if (type === 'quadratic') segment = makeQuadraticSegment(x0, x1, forcedLeftY);
        if (segment) return segment;
      }
      return null;
    }

    function annotateBreaks(endpoints, segments, breakTypes) {
      const breaks = [];
      for (let i = 0; i < breakTypes.length; i++) {
        const x = endpoints[i + 1];
        const leftSeg = segments[i];
        const rightSeg = segments[i + 1];
        const kind = breakTypes[i].kind;
        const leftY = leftSeg.y1;
        const rightY = rightSeg.y0;
        const info = { x, kind, leftY, rightY, valueY: null };

        if (kind === 'holeDefinedElsewhere') {
          const L = leftY;
          const choices = [];
          for (let y = -10; y <= 10; y++) if (y !== L) choices.push(y);
          info.valueY = randomChoice(choices);
        }

        breaks.push(info);
      }
      return breaks;
    }

    function generatePiecewiseProblem() {
      for (let bigAttempt = 0; bigAttempt < 200; bigAttempt++) {
        const endpoints = generatePartition();
        const breakTypes = chooseBreakTypes(endpoints.length - 2);
        const segments = [];
        let forcedLeftY = null;
        let failed = false;

        for (let i = 0; i < endpoints.length - 1; i++) {
          const x0 = endpoints[i];
          const x1 = endpoints[i + 1];
          const leftBreak = i > 0 ? breakTypes[i - 1].kind : null;
          const rightBreak = i < breakTypes.length ? breakTypes[i].kind : null;
          const adjacentLeftAsymptote = leftBreak === 'asymptote';
          const adjacentRightAsymptote = rightBreak === 'asymptote';
          let segment = null;

          if (adjacentLeftAsymptote || adjacentRightAsymptote) {
            if (adjacentLeftAsymptote && adjacentRightAsymptote) { failed = true; break; }
            const side = adjacentLeftAsymptote ? 'left' : 'right';
            segment = makeAsymptoteSegment(x0, x1, side, forcedLeftY);
          } else {
            segment = makeRegularSegment(x0, x1, forcedLeftY);
          }

          if (!segment) { failed = true; break; }
          segments.push(segment);

          if (rightBreak === 'continuous' || rightBreak === 'holeDefinedElsewhere' || rightBreak === 'holeUndefined') {
            forcedLeftY = Number.isFinite(segment.y1) ? segment.y1 : null;
          } else if (rightBreak && rightBreak.startsWith('jump')) {
            forcedLeftY = null;
          } else {
            forcedLeftY = null;
          }
        }

        if (failed) continue;

        // Reject accidental equal left/right limits at jumps; they should visibly jump.
        let badJump = false;
        for (let i = 0; i < breakTypes.length; i++) {
          if (breakTypes[i].kind.startsWith('jump')) {
            const ly = segments[i].y1;
            const ry = segments[i + 1].y0;
            if (ly === ry) { badJump = true; break; }
          }
        }
        if (badJump) continue;

        return {
          endpoints,
          breakTypes,
          segments,
          breaks: annotateBreaks(endpoints, segments, breakTypes)
        };
      }

      throw new Error('Unable to generate a compatible piecewise function.');
    }

    function setupActivity() {
      currentProblem = generatePiecewiseProblem();
      selectedDrawTool = 'closed';
      pendingDerivativeStart = null;
      placedDerivativePieces = [];
      questionText.innerHTML = '<p><strong>Sketch the derivative of the function shown below.</strong></p>';
      activityDiv.innerHTML = `
        <div class="rough-tool-row">
          ${drawToolButtonHtml('closed', 'Closed interval')}
          ${drawToolButtonHtml('half-open', 'Half-open interval')}
          ${drawToolButtonHtml('open', 'Open interval')}
          <button id="clear-derivative-btn" type="button" class="rubber-button rough-clear-button">Clear Sketch</button>
        </div>
        <div class="rough-input-note">Click lattice points to draw line segments.  Near a vertical asymptote, hover near the top or bottom of the asymptote to start or end with an infinite branch.</div>
        <div class="rough-graph-wrap">
          <canvas id="rough-sketch-canvas" width="720" height="720" aria-label="Generated piecewise function graph with derivative sketch input"></canvas>
        </div>`;
      activityDiv.style.display = 'block';
      roughCanvas = document.getElementById('rough-sketch-canvas');
      setupDrawToolButtons();
      setupDerivativeCanvasEvents();
      redrawRoughCanvas();
      debugPanel.style.display = 'none';
      debugPanel.textContent = JSON.stringify(currentProblem, null, 2);
    }

    function drawPiecewiseGraph(canvas, problem) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width;
      const h = canvas.height;
      const pad = 58;
      const xmin = -10, xmax = 10, ymin = -10, ymax = 10;

      function sx(x) { return pad + (x - xmin) / (xmax - xmin) * (w - 2 * pad); }
      function sy(y) { return h - pad - (y - ymin) / (ymax - ymin) * (h - 2 * pad); }

      ctx.clearRect(0, 0, w, h);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Unlabeled grid and axes.
      ctx.strokeStyle = '#eeeeee';
      ctx.lineWidth = 1;
      for (let n = -10; n <= 10; n++) {
        ctx.beginPath();
        ctx.moveTo(sx(n), sy(-10));
        ctx.lineTo(sx(n), sy(10));
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(sx(-10), sy(n));
        ctx.lineTo(sx(10), sy(n));
        ctx.stroke();
      }

      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.moveTo(sx(-10), sy(0));
      ctx.lineTo(sx(10), sy(0));
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(sx(0), sy(-10));
      ctx.lineTo(sx(0), sy(10));
      ctx.stroke();

      ctx.strokeStyle = '#111';
      ctx.fillStyle = '#111';
      ctx.lineWidth = 4;

      problem.segments.forEach(segment => drawSegment(ctx, segment, sx, sy));
      drawBreakMarkers(ctx, problem, sx, sy);
      drawDomainEndpointMarkers(ctx, problem, sx, sy);
      drawDerivativeSketchLayer(ctx, sx, sy);
    }

    function drawSegment(ctx, segment, sx, sy) {
      const samples = 160;
      ctx.save();
      ctx.strokeStyle = '#0b5cab';
      ctx.lineWidth = 4;
      ctx.beginPath();
      let started = false;

      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        let x = segment.x0 + t * (segment.x1 - segment.x0);
        if (segment.type === 'asymptoteCurve') {
          const eps = 0.035;
          if (segment.asymptoteSide === 'left') x = segment.x0 + eps + t * (segment.x1 - segment.x0 - eps);
          else x = segment.x0 + t * (segment.x1 - segment.x0 - eps);
        }
        const y = evaluateSegment(segment, x);
        if (!Number.isFinite(y)) {
          started = false;
          continue;
        }

        if (segment.type === 'asymptoteCurve') {
          // Stop asymptote-adjacent pieces as soon as they leave the visible window.
          // Otherwise clamping makes the graph look horizontal along y = 10 or y = -10.
          if (y <= -10 || y >= 10) {
            started = false;
            continue;
          }
        } else if (y < -30 || y > 30) {
          started = false;
          continue;
        }

        const px = sx(x);
        const py = sy(clamp(y, -10, 10));
        if (!started) {
          ctx.moveTo(px, py);
          started = true;
        } else {
          ctx.lineTo(px, py);
        }
      }
      ctx.stroke();
      ctx.restore();
    }

    function evaluateSegment(segment, x) {
      if (segment.type === 'constant') return segment.y;
      if (segment.type === 'linear') return segment.y0 + segment.m * (x - segment.x0);
      if (segment.type === 'quadratic') return segment.vertexY + segment.a * Math.pow(x - segment.vx, 2);
      if (segment.type === 'asymptoteCurve') {
        if (segment.asymptoteSide === 'left') {
          const d = segment.x1 - segment.x0;
          return segment.finiteY + segment.infinitySign * (1 / (x - segment.x0) - 1 / d);
        }
        const d = segment.x1 - segment.x0;
        return segment.finiteY + segment.infinitySign * (1 / (segment.x1 - x) - 1 / d);
      }
      return NaN;
    }

    function drawBreakMarkers(ctx, problem, sx, sy) {
      problem.breaks.forEach(info => {
        if (info.kind === 'asymptote') {
          drawVerticalAsymptote(ctx, sx(info.x), sy(-10), sy(10));
          return;
        }

        if (info.kind === 'continuous') {
          drawPoint(ctx, sx(info.x), sy(info.leftY), true);
          return;
        }

        if (info.kind === 'holeDefinedElsewhere') {
          drawPoint(ctx, sx(info.x), sy(info.leftY), false);
          drawPoint(ctx, sx(info.x), sy(info.valueY), true);
          return;
        }

        if (info.kind === 'holeUndefined') {
          drawPoint(ctx, sx(info.x), sy(info.leftY), false);
          return;
        }

        if (info.kind === 'jumpLeftClosed') {
          drawPoint(ctx, sx(info.x), sy(info.leftY), true);
          drawPoint(ctx, sx(info.x), sy(info.rightY), false);
          return;
        }

        if (info.kind === 'jumpRightClosed') {
          drawPoint(ctx, sx(info.x), sy(info.leftY), false);
          drawPoint(ctx, sx(info.x), sy(info.rightY), true);
          return;
        }

        if (info.kind === 'jumpOpenBoth') {
          drawPoint(ctx, sx(info.x), sy(info.leftY), false);
          drawPoint(ctx, sx(info.x), sy(info.rightY), false);
        }
      });
    }

    function drawDomainEndpointMarkers(ctx, problem, sx, sy) {
      const first = problem.segments[0];
      const last = problem.segments[problem.segments.length - 1];
      if (Number.isFinite(first.y0)) drawPoint(ctx, sx(first.x0), sy(first.y0), true);
      if (Number.isFinite(last.y1)) drawPoint(ctx, sx(last.x1), sy(last.y1), true);
    }

    function drawPoint(ctx, x, y, closed) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, 6.5, 0, 2 * Math.PI);
      if (closed) {
        ctx.fillStyle = '#0b5cab';
        ctx.fill();
        ctx.strokeStyle = '#0b5cab';
        ctx.lineWidth = 2;
        ctx.stroke();
      } else {
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.strokeStyle = '#0b5cab';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawVerticalAsymptote(ctx, x, topY, bottomY) {
      ctx.save();
      ctx.strokeStyle = '#777';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([9, 7]);
      ctx.beginPath();
      ctx.moveTo(x, topY);
      ctx.lineTo(x, bottomY);
      ctx.stroke();
      ctx.restore();
    }

    function drawArrowHead(ctx, fromX, fromY, toX, toY, color) {
      const headLength = 13;
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.save();
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - headLength * Math.cos(angle - Math.PI / 6), toY - headLength * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI / 6), toY - headLength * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }


    function graphGeometry(canvas) {
      const w = canvas.width;
      const h = canvas.height;
      const pad = 58;
      const xmin = -10, xmax = 10, ymin = -10, ymax = 10;
      return { w, h, pad, xmin, xmax, ymin, ymax };
    }

    function graphSx(canvas, x) {
      const g = graphGeometry(canvas);
      return g.pad + (x - g.xmin) / (g.xmax - g.xmin) * (g.w - 2 * g.pad);
    }

    function graphSy(canvas, y) {
      const g = graphGeometry(canvas);
      return g.h - g.pad - (y - g.ymin) / (g.ymax - g.ymin) * (g.h - 2 * g.pad);
    }

    function drawToolLeftClosed(tool) {
      if (tool === 'closed') return true;
      if (tool === 'open') return false;
      return false;
    }

    function drawToolRightClosed(tool) {
      if (tool === 'closed') return true;
      if (tool === 'open') return false;
      return true;
    }

    function drawToolButtonHtml(tool, label) {
      const leftClosed = drawToolLeftClosed(tool);
      const rightClosed = drawToolRightClosed(tool);
      const leftDot = leftClosed
        ? '<circle cx="18" cy="20" r="6" fill="#198754" stroke="#198754" stroke-width="3"></circle>'
        : '<circle cx="18" cy="20" r="6" fill="white" stroke="#198754" stroke-width="3"></circle>';
      const rightDot = rightClosed
        ? '<circle cx="82" cy="20" r="6" fill="#198754" stroke="#198754" stroke-width="3"></circle>'
        : '<circle cx="82" cy="20" r="6" fill="white" stroke="#198754" stroke-width="3"></circle>';
      return `
        <button type="button" class="rough-tool-button${tool === selectedDrawTool ? ' selected' : ''}" data-draw-tool="${tool}" aria-label="${label}">
          <svg width="100" height="40" viewBox="0 0 100 40" aria-hidden="true">
            <line x1="18" y1="20" x2="82" y2="20" stroke="#198754" stroke-width="7" stroke-linecap="round"></line>
            ${leftDot}${rightDot}
          </svg>
        </button>`;
    }

    function setupDrawToolButtons() {
      document.querySelectorAll('.rough-tool-button').forEach(button => {
        button.classList.toggle('selected', button.dataset.drawTool === selectedDrawTool);
        button.addEventListener('click', () => {
          selectedDrawTool = button.dataset.drawTool;
          pendingDerivativeStart = null;
          document.querySelectorAll('.rough-tool-button').forEach(other => {
            other.classList.toggle('selected', other === button);
          });
          redrawRoughCanvas();
        });
      });

      const clearButton = document.getElementById('clear-derivative-btn');
      if (clearButton) {
        clearButton.addEventListener('click', () => {
          pendingDerivativeStart = null;
          placedDerivativePieces = [];
          redrawRoughCanvas();
        });
      }
    }

    function setupDerivativeCanvasEvents() {
      if (!roughCanvas) return;
      roughCanvas.addEventListener('mousemove', event => {
        roughCanvas.hoverTarget = snapPointerToGraphTarget(roughCanvas, event);
        redrawRoughCanvas();
      });
      roughCanvas.addEventListener('mouseleave', () => {
        roughCanvas.hoverTarget = null;
        redrawRoughCanvas();
      });
      roughCanvas.addEventListener('click', event => {
        const target = snapPointerToGraphTarget(roughCanvas, event);
        if (!target) return;

        if (!pendingDerivativeStart) {
          pendingDerivativeStart = target;
        } else if (isAllowedSecondTarget(pendingDerivativeStart, target)) {
          placeDerivativePiece(pendingDerivativeStart, target);
          pendingDerivativeStart = null;
        }

        roughCanvas.hoverTarget = target;
        redrawRoughCanvas();
      });
    }

    function asymptoteXs() {
      if (!currentProblem) return [];
      return currentProblem.breaks.filter(info => info.kind === 'asymptote').map(info => info.x);
    }

    function snapPointerToGraphTarget(canvas, event) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const px = (event.clientX - rect.left) * scaleX;
      const py = (event.clientY - rect.top) * scaleY;
      const g = graphGeometry(canvas);
      const rawX = g.xmin + (px - g.pad) / (canvas.width - 2 * g.pad) * (g.xmax - g.xmin);
      const rawY = g.ymin + (canvas.height - g.pad - py) / (canvas.height - 2 * g.pad) * (g.ymax - g.ymin);

      for (const a of asymptoteXs()) {
        const closeLeft = rawX > a - 0.5 && rawX < a;
        const closeRight = rawX < a + 0.5 && rawX > a;
        const nearTop = rawY >= 8.8;
        const nearBottom = rawY <= -8.8;
        if ((closeLeft || closeRight) && (nearTop || nearBottom)) {
          return {
            kind: 'infinity',
            x: a,
            side: closeLeft ? 'left' : 'right',
            sign: nearTop ? 1 : -1,
            y: nearTop ? Infinity : -Infinity
          };
        }
      }

      const x = clamp(Math.round(rawX), -10, 10);
      const y = clamp(Math.round(rawY), -10, 10);
      return { kind: 'point', x, y, onAsymptote: asymptoteXs().includes(x) };
    }

    function isAllowedSecondTarget(start, end) {
      if (!start || !end) return false;
      if (start.kind === 'point' && end.kind === 'point') {
        if (start.x === end.x) return start.y === end.y;
        return !crossesAsymptoteBarrier(start.x, end.x);
      }
      if (start.kind === 'infinity' && end.kind === 'infinity') return false;
      const inf = start.kind === 'infinity' ? start : end;
      const pt = start.kind === 'point' ? start : end;
      if (inf.side === 'left') return pt.x < inf.x;
      return pt.x > inf.x;
    }

    function crossesAsymptoteBarrier(x0, x1) {
      const left = Math.min(x0, x1);
      const right = Math.max(x0, x1);
      return asymptoteXs().some(a => left < a && a < right);
    }

    function endpointClosedForOrder(isFirstEndpoint) {
      return isFirstEndpoint ? drawToolLeftClosed(selectedDrawTool) : drawToolRightClosed(selectedDrawTool);
    }

    function placeDerivativePiece(start, end) {
      const startClosed = start.kind === 'point' && start.onAsymptote ? false : endpointClosedForOrder(true);
      const endClosed = end.kind === 'point' && end.onAsymptote ? false : endpointClosedForOrder(false);

      if (start.kind === 'point' && end.kind === 'point' && start.x === end.x && start.y === end.y) {
        const dotClosed = start.onAsymptote ? false : (selectedDrawTool === 'open' ? false : true);
        replaceDerivativeAtPoint({ kind: 'dot', x: start.x, y: start.y, closed: dotClosed });
        return;
      }

      const piece = makeDerivativePiece(start, end, startClosed, endClosed);
      if (!piece) return;
      replaceDerivativeOnInterval(piece);
    }

    function makeDerivativePiece(start, end, startClosed, endClosed) {
      if (start.kind === 'point' && end.kind === 'point') {
        const leftFirst = start.x < end.x;
        const left = leftFirst ? start : end;
        const right = leftFirst ? end : start;
        return {
          kind: 'line',
          x0: left.x,
          x1: right.x,
          y0: left.y,
          y1: right.y,
          leftClosed: leftFirst ? startClosed : endClosed,
          rightClosed: leftFirst ? endClosed : startClosed
        };
      }

      const inf = start.kind === 'infinity' ? start : end;
      const pt = start.kind === 'point' ? start : end;
      if (!inf || !pt) return null;
      if (inf.side === 'left') {
        return {
          kind: 'infiniteCurve',
          asymptoteX: inf.x,
          asymptoteSide: 'left',
          infinitySign: inf.sign,
          x0: pt.x,
          x1: inf.x,
          finiteX: pt.x,
          finiteY: pt.y,
          leftClosed: start.kind === 'point' ? startClosed : endClosed,
          rightClosed: false
        };
      }
      return {
        kind: 'infiniteCurve',
        asymptoteX: inf.x,
        asymptoteSide: 'right',
        infinitySign: inf.sign,
        x0: inf.x,
        x1: pt.x,
        finiteX: pt.x,
        finiteY: pt.y,
        leftClosed: false,
        rightClosed: start.kind === 'point' ? startClosed : endClosed
      };
    }

    function replaceDerivativeAtPoint(dot) {
      placedDerivativePieces = placedDerivativePieces.flatMap(piece => splitExistingPieceAroundPoint(piece, dot));
      placedDerivativePieces.push(dot);
      sortDerivativePieces();
    }

    function splitExistingPieceAroundPoint(piece, dot) {
      if (piece.kind === 'dot') return piece.x === dot.x ? [] : [piece];
      if (dot.x < piece.x0 || dot.x > piece.x1) return [piece];

      // Curved asymptote-adjacent sketches are intentionally coarse objects.
      // If a later placement hits one, delete the whole curved piece rather
      // than trying to trim it into smaller curved fragments.
      if (piece.kind === 'infiniteCurve') return [];

      const result = [];
      if (piece.x0 < dot.x) {
        const left = trimPiece(piece, piece.x0, dot.x);
        left.rightClosed = false;
        result.push(left);
      }
      if (dot.x < piece.x1) {
        const right = trimPiece(piece, dot.x, piece.x1);
        right.leftClosed = false;
        result.push(right);
      }
      return result;
    }

    function replaceDerivativeOnInterval(newPiece) {
      placedDerivativePieces = placedDerivativePieces.flatMap(piece => subtractIntervalFromPiece(piece, newPiece));
      placedDerivativePieces.push(newPiece);
      sortDerivativePieces();
    }

    function subtractIntervalFromPiece(piece, newPiece) {
      if (piece.kind === 'dot') {
        return piece.x >= newPiece.x0 && piece.x <= newPiece.x1 ? [] : [piece];
      }

      const overlapLeft = Math.max(piece.x0, newPiece.x0);
      const overlapRight = Math.min(piece.x1, newPiece.x1);
      if (overlapLeft > overlapRight || overlapLeft === overlapRight) return [piece];

      // Replacement around vertical-asymptote curve pieces is deliberately simple:
      // any overlap deletes the whole existing curve.  This avoids broken partial
      // curved pieces and keeps the user's sketch function-valued.
      if (piece.kind === 'infiniteCurve') return [];

      const result = [];
      if (piece.x0 < overlapLeft) {
        const left = trimPiece(piece, piece.x0, overlapLeft);
        left.rightClosed = !closedAtX(newPiece, overlapLeft);
        result.push(left);
      }
      if (overlapRight < piece.x1) {
        const right = trimPiece(piece, overlapRight, piece.x1);
        right.leftClosed = !closedAtX(newPiece, overlapRight);
        result.push(right);
      }
      return result;
    }

    function sortDerivativePieces() {
      placedDerivativePieces.sort((a, b) => {
        const ax = a.kind === 'dot' ? a.x : a.x0;
        const bx = b.kind === 'dot' ? b.x : b.x0;
        return ax - bx;
      });
    }

    function closedAtX(piece, x) {
      if (piece.kind === 'dot') return piece.x === x && piece.closed;
      if (Math.abs(x - piece.x0) < 1e-9) return piece.leftClosed;
      if (Math.abs(x - piece.x1) < 1e-9) return piece.rightClosed;
      return true;
    }

    function trimPiece(piece, newX0, newX1) {
      if (piece.kind === 'line') {
        return {
          ...piece,
          x0: newX0,
          x1: newX1,
          y0: evaluateDerivativePiece(piece, newX0),
          y1: evaluateDerivativePiece(piece, newX1),
          leftClosed: Math.abs(newX0 - piece.x0) < 1e-9 ? piece.leftClosed : true,
          rightClosed: Math.abs(newX1 - piece.x1) < 1e-9 ? piece.rightClosed : true
        };
      }

      if (piece.kind === 'infiniteCurve') {
        const trimmed = { ...piece, x0: newX0, x1: newX1 };
        if (piece.asymptoteSide === 'left') {
          trimmed.finiteX = newX0;
          trimmed.finiteY = evaluateDerivativePiece(piece, newX0);
          trimmed.leftClosed = Math.abs(newX0 - piece.x0) < 1e-9 ? piece.leftClosed : true;
          trimmed.rightClosed = false;
        } else {
          trimmed.finiteX = newX1;
          trimmed.finiteY = evaluateDerivativePiece(piece, newX1);
          trimmed.leftClosed = false;
          trimmed.rightClosed = Math.abs(newX1 - piece.x1) < 1e-9 ? piece.rightClosed : true;
        }
        return trimmed;
      }
      return { ...piece };
    }

    function evaluateDerivativePiece(piece, x) {
      if (piece.kind === 'line') {
        const t = (x - piece.x0) / (piece.x1 - piece.x0);
        return piece.y0 + t * (piece.y1 - piece.y0);
      }
      if (piece.kind === 'infiniteCurve') {
        if (piece.asymptoteSide === 'left') {
          const d = piece.asymptoteX - piece.finiteX;
          return piece.finiteY + piece.infinitySign * (1 / (piece.asymptoteX - x) - 1 / d);
        }
        const d = piece.finiteX - piece.asymptoteX;
        return piece.finiteY + piece.infinitySign * (1 / (x - piece.asymptoteX) - 1 / d);
      }
      return NaN;
    }

    function redrawRoughCanvas() {
      if (!roughCanvas || !currentProblem) return;
      drawPiecewiseGraph(roughCanvas, currentProblem);
    }

    function drawDerivativeSketchLayer(ctx, sx, sy) {
      if (!roughCanvas) return;
      placedDerivativePieces.forEach(piece => drawDerivativePiece(ctx, piece, sx, sy, 1));

      if (pendingDerivativeStart) {
        drawTargetMarker(ctx, pendingDerivativeStart, pendingDerivativeStart.kind === 'point' && pendingDerivativeStart.onAsymptote ? false : endpointClosedForOrder(true), sx, sy, 1);
        const hover = roughCanvas.hoverTarget;
        if (hover && isAllowedSecondTarget(pendingDerivativeStart, hover)) {
          const preview = makeDerivativePiece(pendingDerivativeStart, hover, endpointClosedForOrder(true), endpointClosedForOrder(false));
          if (preview) drawDerivativePiece(ctx, preview, sx, sy, 0.42);
        }
      } else if (roughCanvas.hoverTarget) {
        drawTargetMarker(ctx, roughCanvas.hoverTarget, roughCanvas.hoverTarget.kind === 'point' && roughCanvas.hoverTarget.onAsymptote ? false : endpointClosedForOrder(true), sx, sy, 0.42);
      }
    }

    function drawDerivativePiece(ctx, piece, sx, sy, alpha = 1) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#198754';
      ctx.fillStyle = '#198754';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      if (piece.kind === 'dot') {
        drawDerivativeDot(ctx, sx(piece.x), sy(piece.y), piece.closed);
        ctx.restore();
        return;
      }

      if (piece.kind === 'line') {
        ctx.beginPath();
        ctx.moveTo(sx(piece.x0), sy(piece.y0));
        ctx.lineTo(sx(piece.x1), sy(piece.y1));
        ctx.stroke();
        drawDerivativeDot(ctx, sx(piece.x0), sy(piece.y0), piece.leftClosed);
        drawDerivativeDot(ctx, sx(piece.x1), sy(piece.y1), piece.rightClosed);
        ctx.restore();
        return;
      }

      if (piece.kind === 'infiniteCurve') {
        drawDerivativeInfiniteCurve(ctx, piece, sx, sy);
        if (piece.asymptoteSide === 'left') {
          drawDerivativeDot(ctx, sx(piece.finiteX), sy(piece.finiteY), piece.leftClosed);
        } else {
          drawDerivativeDot(ctx, sx(piece.finiteX), sy(piece.finiteY), piece.rightClosed);
        }
      }
      ctx.restore();
    }

    function drawDerivativeInfiniteCurve(ctx, piece, sx, sy) {
      const samples = 700;
      const boundaryY = piece.infinitySign > 0 ? 9.85 : -9.85;
      ctx.beginPath();
      let started = false;
      let previousVisiblePoint = null;

      for (let i = 0; i <= samples; i++) {
        const t = i / samples;
        const eps = 0.012;
        let x;

        // Always draw from the finite endpoint toward the vertical asymptote.
        // Drawing right-side pieces from the asymptote outward starts off-screen,
        // which made the loop break before any visible portion was drawn.
        if (piece.asymptoteSide === 'left') {
          x = piece.finiteX + t * (piece.asymptoteX - piece.finiteX - eps);
        } else {
          x = piece.finiteX + t * (piece.asymptoteX - piece.finiteX + eps);
        }

        const y = evaluateDerivativePiece(piece, x);
        if (!Number.isFinite(y)) continue;

        const inWindow = y > -10 && y < 10;
        if (!inWindow) {
          if (previousVisiblePoint) {
            const y0 = previousVisiblePoint.y;
            const x0 = previousVisiblePoint.x;
            const ratio = (boundaryY - y0) / (y - y0);
            if (ratio >= 0 && ratio <= 1) {
              const xb = x0 + ratio * (x - x0);
              ctx.lineTo(sx(xb), sy(boundaryY));
            }
          }
          break;
        }

        if (!started) {
          ctx.moveTo(sx(x), sy(y));
          started = true;
        } else {
          ctx.lineTo(sx(x), sy(y));
        }
        previousVisiblePoint = { x, y };
      }
      ctx.stroke();
    }

    function drawDerivativeInfinityArrow(ctx, asymptoteX, side, sign, sx, sy) {
      const xOffset = side === 'left' ? -0.16 : 0.16;
      const fromY = sign > 0 ? 8.2 : -8.2;
      const toY = sign > 0 ? 9.75 : -9.75;
      drawDerivativeArrowHead(ctx, sx(asymptoteX + xOffset), sy(fromY), sx(asymptoteX + xOffset), sy(toY));
    }

    function drawDerivativeArrowHead(ctx, fromX, fromY, toX, toY) {
      const headLength = 13;
      const angle = Math.atan2(toY - fromY, toX - fromX);
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - headLength * Math.cos(angle - Math.PI / 6), toY - headLength * Math.sin(angle - Math.PI / 6));
      ctx.lineTo(toX - headLength * Math.cos(angle + Math.PI / 6), toY - headLength * Math.sin(angle + Math.PI / 6));
      ctx.closePath();
      ctx.fill();
    }

    function drawTargetMarker(ctx, target, closed, sx, sy, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = '#198754';
      ctx.fillStyle = '#198754';
      ctx.lineWidth = 4;
      if (target.kind === 'point') {
        drawDerivativeDot(ctx, sx(target.x), sy(target.y), closed);
      } else {
        // Do not draw a closed/open endpoint on the asymptote itself.  The marker
        // is just a short faint branch indicating the selected side/sign.
        const xOffset = target.side === 'left' ? -0.42 : 0.42;
        const nearX = target.x + xOffset;
        const farX = target.x + (target.side === 'left' ? -1.05 : 1.05);
        const y1 = target.sign > 0 ? 9.55 : -9.55;
        const y0 = target.sign > 0 ? 7.2 : -7.2;
        ctx.beginPath();
        ctx.moveTo(sx(farX), sy(y0));
        ctx.quadraticCurveTo(sx((farX + nearX) / 2), sy((y0 + y1) / 2), sx(nearX), sy(y1));
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawDerivativeDot(ctx, x, y, closed) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, 6.5, 0, 2 * Math.PI);
      if (closed) {
        ctx.fillStyle = '#198754';
        ctx.fill();
        ctx.strokeStyle = '#198754';
        ctx.lineWidth = 2;
        ctx.stroke();
      } else {
        ctx.fillStyle = 'white';
        ctx.fill();
        ctx.strokeStyle = '#198754';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      ctx.restore();
    }

    startBtn.addEventListener('click', setupActivity);
  </script>
</body>
</html>
