  <script>
    const hintBtn = document.getElementById('hint-btn');
    const hintArea = document.getElementById('hint-area');
    const startBtn = document.getElementById('start-btn');
    const questionText = document.getElementById('question-text');
    const checkBtn = document.getElementById('check-btn');
    const feedbackText = document.getElementById('feedbackText');
    const finalAnswerInput = document.getElementById('final-answer-input');

    let currentProblem = null;
    let hintStep = 0;
    let mathJaxTypesetPromise = Promise.resolve();
    let hintIsTypesetting = false;
    let activeMathEditor = null;

    function typesetElement(element) {
      if (!window.MathJax || !MathJax.typesetPromise) {
        if (window.MathJax && MathJax.typeset) MathJax.typeset([element]);
        return Promise.resolve();
      }
      mathJaxTypesetPromise = mathJaxTypesetPromise
        .then(() => MathJax.typesetPromise([element]))
        .catch(error => console.error('MathJax typesetting failed:', error));
      return mathJaxTypesetPromise;
    }

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function randomNonzeroInteger(min, max) {
      let n;
      do { n = randomInteger(min, max); } while (n === 0);
      return n;
    }

    function randomPositiveInteger(min, max) {
      return randomInteger(Math.max(1, min), max);
    }

    function randomChoice(items) {
      return items[randomInteger(0, items.length - 1)];
    }

    function gcd(a, b) {
      a = Math.abs(Math.round(a));
      b = Math.abs(Math.round(b));
      while (b !== 0) {
        const t = b;
        b = a % b;
        a = t;
      }
      return a || 1;
    }

    function numberTex(value) {
      if (Object.is(value, -0)) value = 0;
      if (!Number.isFinite(value)) return value > 0 ? '\\infty' : '-\\infty';
      const rounded = Math.round(value);
      if (Math.abs(value - rounded) < 1e-10) return `${rounded}`;

      const sign = value < 0 ? -1 : 1;
      let bestNum = 0;
      let bestDen = 1;
      let bestErr = Infinity;
      const abs = Math.abs(value);
      for (let den = 1; den <= 1000; den++) {
        const num = Math.round(abs * den);
        const err = Math.abs(abs - num / den);
        if (err < bestErr) {
          bestErr = err;
          bestNum = num;
          bestDen = den;
        }
      }
      const d = gcd(bestNum, bestDen);
      bestNum = sign * bestNum / d;
      bestDen = bestDen / d;
      return bestDen === 1 ? `${bestNum}` : `\\frac{${bestNum}}{${bestDen}}`;
    }

    function exactFraction(num, den = 1) {
      if (den < 0) { num = -num; den = -den; }
      if (num === 0) return { num: 0, den: 1 };
      const d = gcd(num, den);
      return { num: num / d, den: den / d };
    }

    function fractionToNumber(frac) {
      return frac.num / frac.den;
    }

    function fractionToTex(frac) {
      const f = exactFraction(frac.num, frac.den);
      if (f.den === 1) return `${f.num}`;
      return `\\frac{${f.num}}{${f.den}}`;
    }

    function makeTerm(coefficient, power = 0) {
      return { coefficient, power };
    }

    function combineLikeTerms(poly) {
      const byPower = new Map();
      poly.forEach(term => {
        if (term.coefficient === 0) return;
        byPower.set(term.power, (byPower.get(term.power) || 0) + term.coefficient);
      });
      return Array.from(byPower.entries())
        .map(([power, coefficient]) => ({ power: Number(power), coefficient }))
        .filter(term => term.coefficient !== 0)
        .sort((a, b) => b.power - a.power);
    }

    function addPolynomials(a, b) {
      return combineLikeTerms([...a, ...b]);
    }

    function scalePolynomial(poly, scalar) {
      return combineLikeTerms(poly.map(term => ({ coefficient: term.coefficient * scalar, power: term.power })));
    }

    function subtractPolynomials(a, b) {
      return addPolynomials(a, scalePolynomial(b, -1));
    }

    function multiplyPolynomials(a, b) {
      const terms = [];
      a.forEach(A => {
        b.forEach(B => {
          terms.push({ coefficient: A.coefficient * B.coefficient, power: A.power + B.power });
        });
      });
      return combineLikeTerms(terms);
    }

    function polynomialFromConstant(c) {
      return c === 0 ? [] : [makeTerm(c, 0)];
    }

    function polynomialFromAxPlusC(a, c) {
      return combineLikeTerms([makeTerm(a, 1), makeTerm(c, 0)]);
    }

    function polynomialFromRoot(root) {
      return combineLikeTerms([makeTerm(1, 1), makeTerm(-root, 0)]);
    }

    function polynomialFromPlusRoot(root) {
      return combineLikeTerms([makeTerm(1, 1), makeTerm(root, 0)]);
    }

    function evaluatePolynomial(poly, x) {
      return combineLikeTerms(poly).reduce((sum, term) => sum + term.coefficient * Math.pow(x, term.power), 0);
    }

    function termToTex(term, options = {}) {
      const { omitLeadingPlus = false, forceSign = false } = options;
      const coefficient = term.coefficient;
      const absCoefficient = Math.abs(coefficient);
      const power = term.power;

      let variablePart = '';
      if (power === 1) variablePart = 'x';
      else if (power !== 0) variablePart = `x^{${power}}`;

      let body;
      if (variablePart === '') body = `${absCoefficient}`;
      else if (absCoefficient === 1) body = variablePart;
      else body = `${absCoefficient}${variablePart}`;

      if (coefficient < 0) return `- ${body}`;
      if (forceSign || !omitLeadingPlus) return `+ ${body}`;
      return body;
    }

    function polynomialToTex(poly) {
      const combined = combineLikeTerms(poly);
      if (!combined.length) return '0';
      return combined.map((term, index) => termToTex(term, {
        omitLeadingPlus: index === 0,
        forceSign: index > 0
      })).join(' ');
    }

    function linearFactorTex(root) {
      if (root === 0) return 'x';
      return `(x ${root < 0 ? '+ ' + Math.abs(root) : '- ' + root})`;
    }

    function plusLinearFactorTex(root) {
      if (root === 0) return 'x';
      return `(x ${root < 0 ? '- ' + Math.abs(root) : '+ ' + root})`;
    }

    function rationalFunctionTex(num, den) {
      return `\\frac{${polynomialToTex(num)}}{${polynomialToTex(den)}}`;
    }

    function denominatorXPlusTex(n) {
      if (n === 0) return 'x';
      return `x ${n < 0 ? '- ' + Math.abs(n) : '+ ' + n}`;
    }

    function radicandLinearTex(a, c) {
      return polynomialToTex(polynomialFromAxPlusC(a, c));
    }

    function radicandQuadraticTex(c) {
      return polynomialToTex(combineLikeTerms([makeTerm(1, 2), makeTerm(c, 0)]));
    }

    function degreeOfPolynomial(poly) {
      const combined = combineLikeTerms(poly);
      return combined.length ? combined[0].power : -Infinity;
    }

    function leadingCoefficient(poly) {
      const combined = combineLikeTerms(poly);
      return combined.length ? combined[0].coefficient : 0;
    }

    function hasRoot(poly, root) {
      return Math.abs(evaluatePolynomial(poly, root)) < 1e-10;
    }

    function multiplyByScalarCoefficient(poly, scalarTex, scalarValue = 1) {
      return {
        poly,
        scalarTex,
        scalarValue
      };
    }

    function coefficientToTex(coefficient, isLeading, variablePart) {
      const sign = coefficient < 0 ? '-' : (isLeading ? '' : '+');
      const absCoefficient = Math.abs(coefficient);
      let body = '';
      if (!variablePart) body = `${absCoefficient}`;
      else if (absCoefficient === 1) body = variablePart;
      else body = `${absCoefficient}${variablePart}`;
      if (sign === '-') return isLeading ? `-${body}` : `- ${body}`;
      if (sign === '+') return `+ ${body}`;
      return body;
    }

    function polynomialToTexWithPi(poly, piScale) {
      const combined = combineLikeTerms(poly);
      if (!combined.length) return '0';
      return combined.map((term, index) => {
        const coeff = term.coefficient;
        const absCoeff = Math.abs(coeff);
        let variablePart = '';
        if (term.power === 1) variablePart = 'x';
        else if (term.power !== 0) variablePart = `x^{${term.power}}`;

        let body;
        if (index === 0 && piScale && term.power === degreeOfPolynomial(poly)) {
          const scale = exactFraction(piScale.num * absCoeff, piScale.den);
          const piCoeff = scale.num === scale.den ? '\\pi' : scale.den === 1 ? `${scale.num}\\pi` : `\\frac{${scale.num}\\pi}{${scale.den}}`;
          body = variablePart ? `${piCoeff}\\,${variablePart}` : piCoeff;
        } else if (!variablePart) body = `${absCoeff}`;
        else if (absCoeff === 1) body = variablePart;
        else body = `${absCoeff}${variablePart}`;

        if (coeff < 0) return index === 0 ? `-${body}` : `- ${body}`;
        return index === 0 ? body : `+ ${body}`;
      }).join(' ');
    }

    function randomPolynomialExactDegree(degree, minTerms = 1, maxTerms = Math.min(5, degree + 1)) {
      const possiblePowers = Array.from({ length: degree + 1 }, (_, i) => i);
      const chosenPowers = [degree];
      const remaining = possiblePowers.filter(power => power !== degree);
      const termCount = Math.min(randomInteger(minTerms, maxTerms), degree + 1);
      while (chosenPowers.length < termCount && remaining.length) {
        const index = randomInteger(0, remaining.length - 1);
        chosenPowers.push(remaining.splice(index, 1)[0]);
      }
      return combineLikeTerms(chosenPowers.map(power => makeTerm(randomNonzeroInteger(-10, 10), power)));
    }

    function randomPolynomialType2() {
      const degree = randomInteger(1, 10);
      return randomPolynomialExactDegree(degree, 1, Math.min(5, degree + 1));
    }

    function randomPolynomialForDegreeComparison(targetDegree) {
      return randomPolynomialExactDegree(targetDegree, 1, Math.min(5, targetDegree + 1));
    }

    function generateDegreeMatchedRational() {
      const relation = randomChoice(['greater', 'equal', 'less']);
      let numDegree, denDegree;
      if (relation === 'greater') {
        denDegree = randomInteger(1, 8);
        numDegree = randomInteger(denDegree + 1, 10);
      } else if (relation === 'less') {
        numDegree = randomInteger(1, 8);
        denDegree = randomInteger(numDegree + 1, 10);
      } else {
        numDegree = denDegree = randomInteger(1, 10);
      }
      return {
        relation,
        numerator: randomPolynomialForDegreeComparison(numDegree),
        denominator: randomPolynomialForDegreeComparison(denDegree)
      };
    }

    function polynomialEndBehaviour(poly, direction) {
      const degree = degreeOfPolynomial(poly);
      const lead = leadingCoefficient(poly);
      const signAtInfinity = direction === 'positive' ? 1 : (degree % 2 === 0 ? 1 : -1);
      const sign = Math.sign(lead) * signAtInfinity;
      return sign > 0 ? 'infinity' : 'negativeInfinity';
    }

    function rationalEndBehaviour(num, den, direction) {
      const numDegree = degreeOfPolynomial(num);
      const denDegree = degreeOfPolynomial(den);
      const numLead = leadingCoefficient(num);
      const denLead = leadingCoefficient(den);
      if (numDegree < denDegree) return { kind: 'finite', value: exactFraction(0, 1), tex: '0' };
      if (numDegree === denDegree) {
        const value = exactFraction(numLead, denLead);
        return { kind: 'finite', value, tex: fractionToTex(value) };
      }
      const degreeDifference = numDegree - denDegree;
      const signAtInfinity = direction === 'positive' ? 1 : (degreeDifference % 2 === 0 ? 1 : -1);
      const sign = Math.sign(numLead / denLead) * signAtInfinity;
      return { kind: sign > 0 ? 'infinity' : 'negativeInfinity', tex: sign > 0 ? '\\infty' : '-\\infty' };
    }

    function answerObjectToTex(answer) {
      if (answer.kind === 'infinity') return '\\infty';
      if (answer.kind === 'negativeInfinity') return '-\\infty';
      if (answer.kind === 'dne') return '\\text{DNE}';
      if (answer.kind === 'oscillates') return '\\text{DNE}';
      if (answer.kind === 'undefined') return '\\text{DNE}';
      if (answer.kind === 'finite') return answer.tex || fractionToTex(answer.value);
      return `${answer}`;
    }

    function numericAnswer(frac) {
      return frac.num / frac.den;
    }

    function piMultipleToTex(frac) {
      const f = exactFraction(frac.num, frac.den);
      if (f.num === 0) return '0';
      const sign = f.num < 0 ? '-' : '';
      const absNum = Math.abs(f.num);
      if (f.den === 1) return `${sign}${absNum === 1 ? '' : absNum}\\pi`;
      return `${sign}\\frac{${absNum === 1 ? '' : absNum}\\pi}{${f.den}}`;
    }

    function trigExactAnswer(trigName, piMultiple) {
      const f = exactFraction(piMultiple.num, piMultiple.den);
      const angle = Math.PI * f.num / f.den;
      let value = trigName === 'sin' ? Math.sin(angle) : trigName === 'cos' ? Math.cos(angle) : Math.tan(angle);
      if (Math.abs(value) > 1e12 || !Number.isFinite(value)) return { kind: 'dne', tex: '\\text{DNE}' };
      value = Math.round(value * 1e12) / 1e12;
      const special = [
        { v: -Math.sqrt(3), tex: '-\\sqrt{3}' },
        { v: -1, tex: '-1' },
        { v: -Math.sqrt(3) / 2, tex: '-\\frac{\\sqrt{3}}{2}' },
        { v: -Math.sqrt(2) / 2, tex: '-\\frac{\\sqrt{2}}{2}' },
        { v: -0.5, tex: '-\\frac{1}{2}' },
        { v: 0, tex: '0' },
        { v: 0.5, tex: '\\frac{1}{2}' },
        { v: Math.sqrt(2) / 2, tex: '\\frac{\\sqrt{2}}{2}' },
        { v: Math.sqrt(3) / 2, tex: '\\frac{\\sqrt{3}}{2}' },
        { v: 1, tex: '1' },
        { v: Math.sqrt(3), tex: '\\sqrt{3}' }
      ];
      const match = special.find(item => Math.abs(value - item.v) < 1e-9);
      if (match) return { kind: 'finite', value: { decimal: value }, tex: match.tex };
      return { kind: 'finite', value: { decimal: value }, tex: numberTex(value) };
    }

    function leadingTermTex(poly) {
      const combined = combineLikeTerms(poly);
      if (!combined.length) return '0';
      return termToTex(combined[0], { omitLeadingPlus: true });
    }

    function answerEquationTex(entry) {
      return `${entry.labelTex}=${answerObjectToTex(entry.answer)}`;
    }

    function answerListTex(entries) {
      return entries.map(answerEquationTex).join(',\\quad ');
    }

    function signTex(value) {
      return value > 0 ? '\\text{positive}' : value < 0 ? '\\text{negative}' : '0';
    }

    function signedInfinityTex(value) {
      return value > 0 ? '\\infty' : '-\\infty';
    }

    function reciprocalSideTex(coefficient, side) {
      if (side === 'right') return signedInfinityTex(coefficient);
      return signedInfinityTex(-coefficient);
    }

    function type1Hints(n, numerator, denominatorDegree, otherRoot, numeratorAtN, otherFactorAtN, answers) {
      const localDenominatorTex = denominatorDegree === 1
        ? linearFactorTex(n)
        : `${linearFactorTex(n)}${linearFactorTex(otherRoot)}`;
      const localFactorTex = denominatorDegree === 1 ? '1' : `${numberTex(otherFactorAtN)}`;
      const reducedLocalCoefficient = exactFraction(numeratorAtN, otherFactorAtN);
      return [
        `\\text{Near }x=${numberTex(n)}\\text{,}\\quad f(x)\\sim\\frac{${numberTex(numeratorAtN)}}{${localFactorTex}${linearFactorTex(n)}}=\\frac{${fractionToTex(reducedLocalCoefficient)}}{${linearFactorTex(n)}}.`,
        `\\text{As }x\\to ${numberTex(n)}^+\\text{, }${linearFactorTex(n)}\\to 0^+\\text{, so }f(x)\\to ${answerObjectToTex(answers[0].answer)}.`,
        `\\text{As }x\\to ${numberTex(n)}^-\\text{, }${linearFactorTex(n)}\\to 0^-\\text{, so }f(x)\\to ${answerObjectToTex(answers[1].answer)}.`,
        `${answerListTex(answers)}`
      ];
    }

    function type2Hints(poly, answers) {
      const degree = degreeOfPolynomial(poly);
      const lead = leadingCoefficient(poly);
      return [
        `\\text{For a polynomial, the end behaviour is determined by the leading term.}`,
        `\\text{The leading term is }${leadingTermTex(poly)}\\text{, so the degree is }${degree}\\text{ and the leading coefficient is }${lead}.`,
        degree % 2 === 0
          ? `\\text{The degree is even, so both ends have the same sign as the leading coefficient.}`
          : `\\text{The degree is odd, so the two ends go in opposite directions.}`,
        `${answerListTex(answers)}`
      ];
    }

    function xPowerTex(power) {
      if (power === 0) return '1';
      if (power === 1) return 'x';
      return `x^{${power}}`;
    }

    function exponentialPowerTex(baseTex, power) {
      if (power === 0) return '1';
      const exponentTex = power === 1 ? 'x' : `${power}x`;
      return `${baseTex}^{${exponentTex}}`;
    }

    function signedBodyTex(body, coefficient, index) {
      if (coefficient < 0) return index === 0 ? `-${body}` : `- ${body}`;
      return index === 0 ? body : `+ ${body}`;
    }

    function plainMonomialBody(absCoefficient, power) {
      const variablePart = xPowerTex(power);
      if (power === 0) return `${absCoefficient}`;
      if (absCoefficient === 1) return variablePart;
      return `${absCoefficient}${variablePart}`;
    }

    function piCoefficientTexForScale(absCoefficient, piScale) {
      const scale = exactFraction(piScale.num * absCoefficient, piScale.den);
      if (scale.num === scale.den) return '\\pi';
      if (scale.den === 1) return `${scale.num}\\pi`;
      return `\\frac{${scale.num}\\pi}{${scale.den}}`;
    }

    function termBodyPossiblyPi(term, poly, piScale) {
      const absCoefficient = Math.abs(term.coefficient);
      const isPiLead = piScale && term.power === degreeOfPolynomial(poly);
      if (!isPiLead) return plainMonomialBody(absCoefficient, term.power);
      const piCoeff = piCoefficientTexForScale(absCoefficient, piScale);
      if (term.power === 0) return piCoeff;
      return `${piCoeff}\\,${xPowerTex(term.power)}`;
    }

    function termOverXPowerTex(term, divisorPower, index, poly = null, piScale = null) {
      const body = termBodyPossiblyPi(term, poly || [term], piScale);
      const divisor = xPowerTex(divisorPower);
      return signedBodyTex(`\\frac{${body}}{${divisor}}`, term.coefficient, index);
    }

    function dividedTermBody(term, divisorPower, poly = null, piScale = null) {
      const newPower = term.power - divisorPower;
      const absCoefficient = Math.abs(term.coefficient);
      const isPiLead = piScale && poly && term.power === degreeOfPolynomial(poly);
      const coeffBody = isPiLead ? piCoefficientTexForScale(absCoefficient, piScale) : `${absCoefficient}`;

      if (newPower > 0) {
        if (!isPiLead) return plainMonomialBody(absCoefficient, newPower);
        return `${coeffBody}\\,${xPowerTex(newPower)}`;
      }
      if (newPower === 0) return coeffBody;
      const denominator = xPowerTex(-newPower);
      return `\\frac{${coeffBody}}{${denominator}}`;
    }

    function dividedTermTex(term, divisorPower, index, poly = null, piScale = null) {
      return signedBodyTex(dividedTermBody(term, divisorPower, poly, piScale), term.coefficient, index);
    }

    function dividedPolynomialUnsimplifiedTex(poly, divisorPower, piScale = null) {
      return combineLikeTerms(poly).map((term, index) => termOverXPowerTex(term, divisorPower, index, poly, piScale)).join(' ');
    }

    function dividedPolynomialSimplifiedTex(poly, divisorPower, piScale = null) {
      return combineLikeTerms(poly).map((term, index) => dividedTermTex(term, divisorPower, index, poly, piScale)).join(' ');
    }

    function polynomialToTexMaybePi(poly, piScale = null) {
      return piScale ? polynomialToTexWithPi(poly, piScale) : polynomialToTex(poly);
    }

    function rationalDivideEquationTex(numerator, denominator, divisorPower, piScale = null, functionName = 'f') {
      const original = `\\frac{${polynomialToTexMaybePi(numerator, piScale)}}{${polynomialToTex(denominator)}}`;
      const unsimplified = `\\frac{${dividedPolynomialUnsimplifiedTex(numerator, divisorPower, piScale)}}{${dividedPolynomialUnsimplifiedTex(denominator, divisorPower)}}`;
      const simplified = `\\frac{${dividedPolynomialSimplifiedTex(numerator, divisorPower, piScale)}}{${dividedPolynomialSimplifiedTex(denominator, divisorPower)}}`;
      return `\\lim_{x\\to\\pm\\infty}${functionName}(x)=\\lim_{x\\to\\pm\\infty}${original}=\\lim_{x\\to\\pm\\infty}${unsimplified}=\\lim_{x\\to\\pm\\infty}${simplified}`;
    }

    function answerObjectToTexExtended(answer) {
      if (answer.kind === 'piMultiple') return answer.tex || piMultipleToTex(answer.multiple);
      return answerObjectToTex(answer);
    }

    function answerEquationTexExtended(entry) {
      return `${entry.labelTex}=${answerObjectToTexExtended(entry.answer)}`;
    }

    function answerListTexExtended(entries) {
      return entries.map(answerEquationTexExtended).join(',\\quad ');
    }

    function rationalDivisionHints(numerator, denominator, answers, options = {}) {
      const { piScale = null, functionName = 'f', finalAnswers = true } = options;
      const numDegree = degreeOfPolynomial(numerator);
      const denDegree = degreeOfPolynomial(denominator);
      const divisorPower = Math.min(numDegree, denDegree);
      const numLead = leadingCoefficient(numerator);
      const denLead = leadingCoefficient(denominator);
      const hints = [];

      if (numDegree === denDegree) {
        hints.push(`\\text{The degree of both the numerator and denominator is }${numDegree}\\text{, so we divide every term by }${xPowerTex(divisorPower)}.`);
      } else {
        hints.push(`\\text{The lowest degree of the numerator/denominator is }${divisorPower}\\text{, so we divide every term by }${xPowerTex(divisorPower)}.`);
      }
      hints.push(rationalDivideEquationTex(numerator, denominator, divisorPower, piScale, functionName));

      if (numDegree > denDegree) {
        const dominantNumeratorTerm = dividedTermBody(combineLikeTerms(numerator)[0], divisorPower, numerator, piScale);
        hints.push(`\\text{The lead term in the higher degree numerator, }${dominantNumeratorTerm}\\text{, dominates and determines the end behaviour.}`);
        hints.push(`\\text{The dominant term in the denominator is }${denLead}\\text{, which is }${signTex(denLead)}.`);
        const diff = numDegree - denDegree;
        hints.push(diff % 2 === 0
          ? `\\text{Since the remaining exponent is even, the two ends go in the same direction.}`
          : `\\text{Since the remaining exponent is odd, the two ends go in opposite directions.}`);
      } else if (numDegree === denDegree) {
        const ratio = piScale ? piMultipleToTex(piScale) : fractionToTex(exactFraction(numLead, denLead));
        hints.push(`\\text{Every term in the above limit approaches zero except the constants, so we have a horizontal asymptote at their ratio.}`);
        hints.push(piScale
          ? `\\frac{${numLead < 0 ? '-' : ''}${piCoefficientTexForScale(Math.abs(numLead), piScale)}}{${denLead}}=${ratio}`
          : `\\frac{${numLead}}{${denLead}}=${ratio}`);
      } else {
        hints.push(`\\text{The numerator is finite and the denominator grows without bound, so we have a horizontal asymptote at }y=0.`);
      }
      if (finalAnswers) hints.push(`${answerListTexExtended(answers)}`);
      return hints;
    }

    function type3Hints(numerator, denominator, answers) {
      return rationalDivisionHints(numerator, denominator, answers);
    }

    function type4Hints(trigName, numerator, denominator, piScale, leftInner, rightInner, answers) {
      const innerAnswers = [
        { labelTex: '\\lim_{x \\to -\\infty}g(x)', answer: leftInner },
        { labelTex: '\\lim_{x \\to \\infty}g(x)', answer: rightInner }
      ];
      const hints = [
        `\\text{Work from the inside out.  Let }g(x)=\\frac{${polynomialToTexMaybePi(numerator, piScale)}}{${polynomialToTex(denominator)}}.`
      ];
      hints.push(...rationalDivisionHints(numerator, denominator, innerAnswers, { piScale, functionName: 'g', finalAnswers: false }));
      hints.push(`${answerListTexExtended(innerAnswers)}`);

      if ((leftInner.kind === 'finite' && leftInner.value && leftInner.value.num === 0) || (rightInner.kind === 'finite' && rightInner.value && rightInner.value.num === 0)) {
        hints.push(`\\text{Now apply the outer function: }\\${trigName}(0)=0.`);
      } else if (piScale) {
        if (answers.some(entry => entry.answer.kind === 'dne' || entry.answer.kind === 'undefined')) {
          hints.push(`\\text{Now apply the outer function: }\\${trigName}\\left(${piMultipleToTex(piScale)}\\right)\\text{ is undefined, so the limits do not exist.}`);
        } else {
          hints.push(`\\text{Now apply the outer function: }\\${trigName}\\left(${piMultipleToTex(piScale)}\\right)=${answerObjectToTexExtended(answers[0].answer)}.`);
        }
      } else {
        hints.push(`\\text{Since the inside grows without bound, the trigonometric function oscillates and the limit does not exist.}`);
      }
      hints.push(`${answerListTexExtended(answers)}`);
      return hints;
    }

    function exponentialDividedTermBody(term, divisorPower, baseTex) {
      const newPower = term.power - divisorPower;
      const coeff = Math.abs(term.coefficient);
      const coefficientTex = coeff === 1 ? '' : `${coeff}\\cdot `;
      if (newPower === 0) return `${coeff}`;
      return `${coefficientTex}${exponentialPowerTex(baseTex, newPower)}`;
    }

    function exponentialTermOverDivisorTex(term, divisorPower, baseTex, index) {
      const body = exponentialTermToTex({ ...term, coefficient: Math.abs(term.coefficient) }, baseTex);
      return signedBodyTex(`\\frac{${body}}{${exponentialPowerTex(baseTex, divisorPower)}}`, term.coefficient, index);
    }

    function exponentialDividedTermTex(term, divisorPower, baseTex, index) {
      return signedBodyTex(exponentialDividedTermBody(term, divisorPower, baseTex), term.coefficient, index);
    }

    function exponentialDividedExpressionUnsimplifiedTex(terms, divisorPower, baseTex) {
      return [...terms].sort((a, b) => b.power - a.power).map((term, index) => exponentialTermOverDivisorTex(term, divisorPower, baseTex, index)).join(' ');
    }

    function exponentialDividedExpressionSimplifiedTex(terms, divisorPower, baseTex) {
      return [...terms].sort((a, b) => b.power - a.power).map((term, index) => exponentialDividedTermTex(term, divisorPower, baseTex, index)).join(' ');
    }

    function exponentialDivideEquationTex(numerator, denominator, divisorPower, baseTex) {
      const original = `\\frac{${exponentialExpressionToTex(numerator, baseTex)}}{${exponentialExpressionToTex(denominator, baseTex)}}`;
      const unsimplified = `\\frac{${exponentialDividedExpressionUnsimplifiedTex(numerator, divisorPower, baseTex)}}{${exponentialDividedExpressionUnsimplifiedTex(denominator, divisorPower, baseTex)}}`;
      const simplified = `\\frac{${exponentialDividedExpressionSimplifiedTex(numerator, divisorPower, baseTex)}}{${exponentialDividedExpressionSimplifiedTex(denominator, divisorPower, baseTex)}}`;
      return `\\lim_{x\\to\\pm\\infty}f(x)=\\lim_{x\\to\\pm\\infty}${original}=\\lim_{x\\to\\pm\\infty}${unsimplified}=\\lim_{x\\to\\pm\\infty}${simplified}`;
    }

    function exponentialLeadTermByPower(terms, power) {
      return terms.find(term => term.power === power);
    }

    function exponentialDirectionComparisonHint(baseTex, numerator, denominator, divisorPower, direction) {
      const shiftedNumerator = numerator.map(term => ({ ...term, shiftedPower: term.power - divisorPower }));
      const shiftedDenominator = denominator.map(term => ({ ...term, shiftedPower: term.power - divisorPower }));
      if (direction === 'positive') {
        const numMax = Math.max(...shiftedNumerator.map(term => term.shiftedPower));
        const denMax = Math.max(...shiftedDenominator.map(term => term.shiftedPower));
        if (numMax > denMax) {
          const term = shiftedNumerator.find(item => item.shiftedPower === numMax);
          return `\\text{As }x\\to\\infty\\text{, the numerator has the growing dominant term }${exponentialDividedTermBody(term, divisorPower, baseTex)}\\text{, while the denominator is lower order.}`;
        }
        if (numMax === denMax) {
          return `\\text{As }x\\to\\infty\\text{, the dominant remaining exponential degree is the same in numerator and denominator, so their coefficients determine the limit.}`;
        }
        const term = shiftedDenominator.find(item => item.shiftedPower === denMax);
        return `\\text{As }x\\to\\infty\\text{, the denominator has the growing dominant term }${exponentialDividedTermBody(term, divisorPower, baseTex)}\\text{, while the numerator is lower order.}`;
      }

      const numMin = Math.min(...shiftedNumerator.map(term => term.shiftedPower));
      const denMin = Math.min(...shiftedDenominator.map(term => term.shiftedPower));
      if (numMin < denMin) {
        const term = shiftedNumerator.find(item => item.shiftedPower === numMin);
        return `\\text{As }x\\to-\\infty\\text{, the most negative remaining exponent grows fastest; in the numerator this is }${exponentialDividedTermBody(term, divisorPower, baseTex)}.`;
      }
      if (numMin === denMin) {
        return `\\text{As }x\\to-\\infty\\text{, the most negative remaining exponent is the same in numerator and denominator, so their coefficients determine the limit.}`;
      }
      const term = shiftedDenominator.find(item => item.shiftedPower === denMin);
      return `\\text{As }x\\to-\\infty\\text{, the most negative remaining exponent grows fastest; in the denominator this is }${exponentialDividedTermBody(term, divisorPower, baseTex)}.`;
    }

    function exponentialDegreeDescriptionTex(power) {
      if (power === 0) return '\\text{constant}';
      return power === 1 ? 'x' : `${power}x`;
    }

    function type5Hints(baseTex, numerator, denominator, numDegree, denDegree, answers) {
      const divisorPower = Math.min(numDegree, denDegree);
      const hints = [];
      if (numDegree === denDegree) {
        hints.push(`\\text{The numerator and denominator have the same exponential degree }${numDegree}\\text{, so we divide every term by }${exponentialPowerTex(baseTex, divisorPower)}.`);
      } else {
        hints.push(`\\text{The lowest exponential degree of the numerator/denominator is }${divisorPower}\\text{, so we divide every term by }${exponentialPowerTex(baseTex, divisorPower)}.`);
      }
      hints.push(exponentialDivideEquationTex(numerator, denominator, divisorPower, baseTex));

      const shiftedNumDegree = numDegree - divisorPower;
      const shiftedDenDegree = denDegree - divisorPower;
      const numLead = exponentialLeadTermByPower(numerator, numDegree).coefficient;
      const denLead = exponentialLeadTermByPower(denominator, denDegree).coefficient;

      if (shiftedNumDegree > shiftedDenDegree) {
        hints.push(`\\text{For }x\\to\\infty\\text{, the term of exponential degree }${exponentialDegreeDescriptionTex(shiftedNumDegree)}\\text{ in the numerator dominates the constant term in the denominator.}`);
        hints.push(`\\text{The sign is determined by }\\frac{${numLead}}{${denLead}}\\text{, so }\\lim_{x\\to\\infty}f(x)=${answerObjectToTexExtended(answers[1].answer)}.`);
      } else if (shiftedNumDegree === shiftedDenDegree) {
        hints.push(`\\text{For }x\\to\\infty\\text{, the dominant remaining exponential degree is the same in the numerator and denominator.}`);
        hints.push(`\\lim_{x\\to\\infty}f(x)=\\frac{${numLead}}{${denLead}}=${fractionToTex(exactFraction(numLead, denLead))}.`);
      } else {
        hints.push(`\\text{For }x\\to\\infty\\text{, the denominator has the growing exponential term of degree }${exponentialDegreeDescriptionTex(shiftedDenDegree)}\\text{, while the numerator is lower order.}`);
        hints.push(`\\lim_{x\\to\\infty}f(x)=0.`);
      }

      hints.push(exponentialDirectionComparisonHint(baseTex, numerator, denominator, divisorPower, 'negative'));
      hints.push(`\\lim_{x\\to-\\infty}f(x)=${answerObjectToTexExtended(answers[0].answer)}.`);
      hints.push(`${answerListTexExtended(answers)}`);
      return hints;
    }

    function generateType1LimitProblem() {
      const n = randomInteger(-10, 10);
      const denominatorDegree = randomChoice([1, 2]);
      let numeratorDegree = randomInteger(0, 2);
      let numerator;
      if (numeratorDegree === 0) {
        numerator = polynomialFromConstant(randomNonzeroInteger(-10, 10));
      } else if (numeratorDegree === 1) {
        let r;
        do { r = randomInteger(-10, 10); } while (r === n);
        numerator = polynomialFromRoot(r);
      } else {
        let r, s;
        do { r = randomInteger(-10, 10); } while (r === n);
        do { s = randomInteger(-10, 10); } while (s === n);
        numerator = multiplyPolynomials(polynomialFromRoot(r), polynomialFromRoot(s));
      }

      let denominator;
      let otherRoot = null;
      if (denominatorDegree === 1) {
        denominator = polynomialFromRoot(n);
      } else {
        do { otherRoot = randomInteger(-10, 10); } while (otherRoot === n);
        denominator = multiplyPolynomials(polynomialFromRoot(n), polynomialFromRoot(otherRoot));
      }

      const numeratorAtN = evaluatePolynomial(numerator, n);
      const otherFactorAtN = denominatorDegree === 1 ? 1 : n - otherRoot;
      const signMultiplier = Math.sign(numeratorAtN / otherFactorAtN);
      const right = signMultiplier > 0 ? { kind: 'infinity' } : { kind: 'negativeInfinity' };
      const left = signMultiplier > 0 ? { kind: 'negativeInfinity' } : { kind: 'infinity' };
      const twoSided = right.kind === left.kind ? right : { kind: 'dne' };
      const answers = [
        { labelTex: `\\lim_{x \\to ${numberTex(n)}^+}f(x)`, answer: right },
        { labelTex: `\\lim_{x \\to ${numberTex(n)}^-}f(x)`, answer: left },
        { labelTex: `\\lim_{x \\to ${numberTex(n)}}f(x)`, answer: twoSided }
      ];

      return {
        type: 1,
        questionTex: `f(x)=${rationalFunctionTex(numerator, denominator)}.\\quad \\text{Evaluate }\\lim_{x \\to ${numberTex(n)}^+}f(x),\\; \\lim_{x \\to ${numberTex(n)}^-}f(x),\\; \\text{and }\\lim_{x \\to ${numberTex(n)}}f(x).`,
        answers,
        hints: type1Hints(n, numerator, denominatorDegree, otherRoot, numeratorAtN, otherFactorAtN, answers)
      };
    }

    function generateType2LimitProblem() {
      const poly = randomPolynomialType2();
      const answers = [
        { labelTex: '\\lim_{x \\to -\\infty}f(x)', answer: { kind: polynomialEndBehaviour(poly, 'negative') } },
        { labelTex: '\\lim_{x \\to \\infty}f(x)', answer: { kind: polynomialEndBehaviour(poly, 'positive') } }
      ];
      return {
        type: 2,
        questionTex: `f(x)=${polynomialToTex(poly)}.\\quad \\text{Evaluate }\\lim_{x \\to -\\infty}f(x)\\;\\text{and}\\;\\lim_{x \\to \\infty}f(x).`,
        answers,
        hints: type2Hints(poly, answers)
      };
    }

    function generateType3LimitProblem() {
      const rational = generateDegreeMatchedRational();
      const { numerator, denominator } = rational;
      const answers = [
        { labelTex: '\\lim_{x \\to -\\infty}f(x)', answer: rationalEndBehaviour(numerator, denominator, 'negative') },
        { labelTex: '\\lim_{x \\to \\infty}f(x)', answer: rationalEndBehaviour(numerator, denominator, 'positive') }
      ];
      return {
        type: 3,
        questionTex: `f(x)=${rationalFunctionTex(numerator, denominator)}.\\quad \\text{Evaluate }\\lim_{x \\to -\\infty}f(x)\\;\\text{and}\\;\\lim_{x \\to \\infty}f(x).`,
        answers,
        hints: type3Hints(numerator, denominator, answers)
      };
    }

    function generatePiRatio() {
      const options = [
        { num: 2, den: 1 },
        { num: 1, den: 1 },
        { num: randomNonzeroInteger(-6, 6), den: 2 },
        { num: randomNonzeroInteger(-6, 6), den: 3 },
        { num: randomNonzeroInteger(-6, 6), den: 4 },
        { num: randomNonzeroInteger(-6, 6), den: 6 }
      ];
      return exactFraction(...Object.values(randomChoice(options)));
    }

    function generateTrigRational() {
      const relation = randomChoice(['greater', 'equal', 'less']);
      let numDegree, denDegree, numerator, denominator, piScale = null;
      if (relation === 'greater') {
        denDegree = randomInteger(1, 8);
        numDegree = randomInteger(denDegree + 1, 10);
        numerator = randomPolynomialForDegreeComparison(numDegree);
        denominator = randomPolynomialForDegreeComparison(denDegree);
      } else if (relation === 'less') {
        numDegree = randomInteger(1, 8);
        denDegree = randomInteger(numDegree + 1, 10);
        numerator = randomPolynomialForDegreeComparison(numDegree);
        denominator = randomPolynomialForDegreeComparison(denDegree);
      } else {
        numDegree = denDegree = randomInteger(1, 10);
        denominator = randomPolynomialForDegreeComparison(denDegree);
        const denLead = leadingCoefficient(denominator);
        piScale = generatePiRatio();
        numerator = randomPolynomialForDegreeComparison(numDegree);
        const currentLead = leadingCoefficient(numerator);
        numerator = combineLikeTerms(numerator.map(term => term.power === numDegree ? makeTerm(denLead, term.power) : term));
      }
      return { relation, numerator, denominator, piScale };
    }

    function generateType4LimitProblem() {
      const trigName = randomChoice(['sin', 'cos', 'tan']);
      const rational = generateTrigRational();
      const { numerator, denominator, piScale } = rational;
      const numeratorTex = polynomialToTexWithPi(numerator, piScale);
      const innerTex = `\\frac{${numeratorTex}}{${polynomialToTex(denominator)}}`;
      let leftInner = rationalEndBehaviour(numerator, denominator, 'negative');
      let rightInner = rationalEndBehaviour(numerator, denominator, 'positive');
      if (piScale) {
        leftInner = rightInner = { kind: 'piMultiple', multiple: piScale, tex: piMultipleToTex(piScale) };
      }

      function outerAnswer(inner) {
        if (inner.kind === 'finite' && inner.value && inner.value.num === 0) return trigExactAnswer(trigName, { num: 0, den: 1 });
        if (inner.kind === 'piMultiple') return trigExactAnswer(trigName, inner.multiple);
        return { kind: 'oscillates', tex: '\\text{DNE}' };
      }

      const answers = [
        { labelTex: '\\lim_{x \\to -\\infty}f(x)', answer: outerAnswer(leftInner) },
        { labelTex: '\\lim_{x \\to \\infty}f(x)', answer: outerAnswer(rightInner) }
      ];

      return {
        type: 4,
        questionTex: `f(x)=\\${trigName}\\left(${innerTex}\\right).\\quad \\text{Evaluate }\\lim_{x \\to -\\infty}f(x)\\;\\text{and}\\;\\lim_{x \\to \\infty}f(x).`,
        answers,
        hints: type4Hints(trigName, numerator, denominator, piScale, leftInner, rightInner, answers)
      };
    }

    function exponentialTermToTex(term, baseTex) {
      const coefficientTex = term.coefficient === 1 ? '' : term.coefficient === -1 ? '-' : `${term.coefficient}\\cdot `;
      return `${coefficientTex}${baseTex}^{${term.power === 1 ? 'x' : `${term.power}x`}}`;
    }

    function exponentialExpressionToTex(terms, baseTex) {
      const sorted = [...terms].sort((a, b) => b.power - a.power);
      return sorted.map((term, index) => {
        const absTerm = { ...term, coefficient: Math.abs(term.coefficient) };
        const body = exponentialTermToTex(absTerm, baseTex);
        if (term.coefficient < 0) return index === 0 ? `-${body}` : `- ${body}`;
        return index === 0 ? body : `+ ${body}`;
      }).join(' ');
    }

    function randomExponentialExpressionExactDegree(degree) {
      const possiblePowers = [];
      for (let k = -10; k < degree; k++) if (k !== 0) possiblePowers.push(k);
      const termCount = randomInteger(1, Math.min(5, possiblePowers.length + 1));
      const chosen = [degree];
      while (chosen.length < termCount && possiblePowers.length) {
        const index = randomInteger(0, possiblePowers.length - 1);
        chosen.push(possiblePowers.splice(index, 1)[0]);
      }
      return chosen.map(power => ({ coefficient: randomNonzeroInteger(-10, 10), power }));
    }

    function exponentialEndBehaviour(numTerms, denTerms, direction) {
      const transformPower = term => direction === 'positive' ? term.power : -term.power;
      const numLead = numTerms.reduce((best, term) => transformPower(term) > transformPower(best) ? term : best, numTerms[0]);
      const denLead = denTerms.reduce((best, term) => transformPower(term) > transformPower(best) ? term : best, denTerms[0]);
      const numDegree = transformPower(numLead);
      const denDegree = transformPower(denLead);
      if (numDegree < denDegree) return { kind: 'finite', value: exactFraction(0, 1), tex: '0' };
      if (numDegree === denDegree) {
        const value = exactFraction(numLead.coefficient, denLead.coefficient);
        return { kind: 'finite', value, tex: fractionToTex(value) };
      }
      const sign = Math.sign(numLead.coefficient / denLead.coefficient);
      return { kind: sign > 0 ? 'infinity' : 'negativeInfinity' };
    }

    function generateType5LimitProblem() {
      const baseTex = Math.random() < 0.6 ? `${randomInteger(2, 10)}` : 'e';
      const relation = randomChoice(['greater', 'equal', 'less']);
      let numDegree, denDegree;
      const possibleDegrees = [];
      for (let k = -10; k <= 10; k++) if (k !== 0) possibleDegrees.push(k);
      if (relation === 'greater') {
        const pairs = [];
        possibleDegrees.forEach(a => possibleDegrees.forEach(b => { if (a > b) pairs.push([a, b]); }));
        [numDegree, denDegree] = randomChoice(pairs);
      } else if (relation === 'less') {
        const pairs = [];
        possibleDegrees.forEach(a => possibleDegrees.forEach(b => { if (a < b) pairs.push([a, b]); }));
        [numDegree, denDegree] = randomChoice(pairs);
      } else {
        numDegree = denDegree = randomChoice(possibleDegrees);
      }
      const numerator = randomExponentialExpressionExactDegree(numDegree);
      const denominator = randomExponentialExpressionExactDegree(denDegree);
      const answers = [
        { labelTex: '\\lim_{x \\to -\\infty}f(x)', answer: exponentialEndBehaviour(numerator, denominator, 'negative') },
        { labelTex: '\\lim_{x \\to \\infty}f(x)', answer: exponentialEndBehaviour(numerator, denominator, 'positive') }
      ];
      return {
        type: 5,
        questionTex: `f(x)=\\frac{${exponentialExpressionToTex(numerator, baseTex)}}{${exponentialExpressionToTex(denominator, baseTex)}}.\\quad \\text{Evaluate }\\lim_{x \\to -\\infty}f(x)\\;\\text{and}\\;\\lim_{x \\to \\infty}f(x).`,
        answers,
        hints: type5Hints(baseTex, numerator, denominator, numDegree, denDegree, answers)
      };
    }


    function polynomialFromRootsWithPower(coefficient, zeroPower, roots) {
      let poly = polynomialFromConstant(coefficient);
      for (let i = 0; i < zeroPower; i++) poly = multiplyPolynomials(poly, [makeTerm(1, 1)]);
      roots.forEach(root => { poly = multiplyPolynomials(poly, polynomialFromRoot(root)); });
      return poly;
    }

    function rootCountsFromData(zeroPower, roots) {
      const counts = new Map();
      if (zeroPower > 0) counts.set(0, zeroPower);
      roots.forEach(root => counts.set(root, (counts.get(root) || 0) + 1));
      return counts;
    }

    function subtractCancelledRootCounts(numCounts, denCounts) {
      const reducedNum = new Map(numCounts);
      const reducedDen = new Map(denCounts);
      const allRoots = new Set([...reducedNum.keys(), ...reducedDen.keys()]);
      allRoots.forEach(root => {
        const cancel = Math.min(reducedNum.get(root) || 0, reducedDen.get(root) || 0);
        if (cancel > 0) {
          reducedNum.set(root, (reducedNum.get(root) || 0) - cancel);
          reducedDen.set(root, (reducedDen.get(root) || 0) - cancel);
        }
        if ((reducedNum.get(root) || 0) === 0) reducedNum.delete(root);
        if ((reducedDen.get(root) || 0) === 0) reducedDen.delete(root);
      });
      return { reducedNum, reducedDen };
    }

    function polynomialFromRootCounts(coefficient, counts) {
      let poly = polynomialFromConstant(coefficient);
      Array.from(counts.entries()).forEach(([root, count]) => {
        for (let i = 0; i < count; i++) poly = multiplyPolynomials(poly, polynomialFromRoot(root));
      });
      return poly;
    }

    function evaluateRootCountProduct(counts, x, excludedRoot = null, excludedCount = 0) {
      let value = 1;
      counts.forEach((count, root) => {
        const power = root === excludedRoot ? Math.max(0, count - excludedCount) : count;
        value *= Math.pow(x - root, power);
      });
      return value;
    }

    function type6LimitAtPointTex(a, j, k, reducedNumCounts, reducedDenCounts) {
      const denMultiplicity = reducedDenCounts.get(a) || 0;
      if (denMultiplicity === 0) {
        const numValue = j * evaluateRootCountProduct(reducedNumCounts, a);
        const denValue = k * evaluateRootCountProduct(reducedDenCounts, a);
        const value = exactFraction(numValue, denValue);
        return {
          right: { kind: 'finite', value, tex: fractionToTex(value) },
          left: { kind: 'finite', value, tex: fractionToTex(value) },
          twoSided: { kind: 'finite', value, tex: fractionToTex(value) }
        };
      }

      const numBase = j * evaluateRootCountProduct(reducedNumCounts, a);
      const denBase = k * evaluateRootCountProduct(reducedDenCounts, a, a, denMultiplicity);
      const baseSign = Math.sign(numBase / denBase);
      const rightSign = baseSign;
      const leftSign = baseSign * (denMultiplicity % 2 === 0 ? 1 : -1);
      const right = rightSign > 0 ? { kind: 'infinity' } : { kind: 'negativeInfinity' };
      const left = leftSign > 0 ? { kind: 'infinity' } : { kind: 'negativeInfinity' };
      const twoSided = right.kind === left.kind ? right : { kind: 'dne' };
      return { right, left, twoSided };
    }

    function limitEntriesForPoint(a, j, k, reducedNumCounts, reducedDenCounts) {
      const lims = type6LimitAtPointTex(a, j, k, reducedNumCounts, reducedDenCounts);
      return [
        { labelTex: `\\lim_{x \\to ${numberTex(a)}^+}f(x)`, answer: lims.right },
        { labelTex: `\\lim_{x \\to ${numberTex(a)}^-}f(x)`, answer: lims.left },
        { labelTex: `\\lim_{x \\to ${numberTex(a)}}f(x)`, answer: lims.twoSided }
      ];
    }

    function uniqueAsymptotes(asymptotes) {
      const seen = new Set();
      return asymptotes.filter(item => {
        const key = `${item.type}:${Math.round(item.value * 1e10) / 1e10}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    function rootFactorPowerTex(root, count) {
      const base = root === 0 ? 'x' : linearFactorTex(root);
      return count === 1 ? base : `${base}^{${count}}`;
    }

    function rootCountsFactorTex(coefficient, counts) {
      const pieces = [];
      if (coefficient === -1 && counts.size > 0) pieces.push('-1');
      else if (coefficient !== 1 || counts.size === 0) pieces.push(`${coefficient}`);
      Array.from(counts.entries()).sort((a, b) => b[0] - a[0]).forEach(([root, count]) => {
        pieces.push(rootFactorPowerTex(root, count));
      });
      return pieces.join('\\cdot ');
    }

    function signedNumericFactorTex(value) {
      return value < 0 ? `(${numberTex(value)})` : numberTex(value);
    }

    function rootCountsSubstitutionTex(coefficient, counts, a, excludedRoot = null, excludedCount = 0) {
      const pieces = [`${coefficient}`];
      Array.from(counts.entries()).sort((left, right) => right[0] - left[0]).forEach(([root, count]) => {
        const visibleCount = root === excludedRoot ? Math.max(0, count - excludedCount) : count;
        for (let i = 0; i < visibleCount; i++) {
          pieces.push(signedNumericFactorTex(a - root));
        }
      });
      return pieces.join('\\cdot ');
    }

    function type6PointHints(a, entries, j, k, reducedNumCounts, reducedDenCounts) {
      const denMultiplicity = reducedDenCounts.get(a) || 0;
      const hints = [];
      if (denMultiplicity === 0) {
        hints.push(`\\text{After cancellation, the denominator is nonzero at }x=${numberTex(a)}\\text{, so substitute }x=${numberTex(a)}.`);
        hints.push(`${answerListTexExtended(entries)}`);
        return hints;
      }

      const numBase = j * evaluateRootCountProduct(reducedNumCounts, a);
      const denBase = k * evaluateRootCountProduct(reducedDenCounts, a, a, denMultiplicity);
      const reducedLocalCoefficient = exactFraction(numBase, denBase);
      const localFactor = rootFactorPowerTex(a, denMultiplicity);
      const sideFactor = linearFactorTex(a);
      const substitutedNumerator = rootCountsSubstitutionTex(j, reducedNumCounts, a);
      const substitutedDenominator = rootCountsSubstitutionTex(k, reducedDenCounts, a, a, denMultiplicity);
      hints.push(`\\text{Near }x=${numberTex(a)}\\text{,}\\quad f(x)\\sim\\frac{${substitutedNumerator}}{${substitutedDenominator}\\cdot ${localFactor}}=\\frac{${fractionToTex(reducedLocalCoefficient)}}{${localFactor}}.`);
      hints.push(`\\text{As }x\\to ${numberTex(a)}^+\\text{, }${sideFactor}\\to 0^+\\text{, so }f(x)\\to ${answerObjectToTexExtended(entries[0].answer)}.`);
      hints.push(`\\text{As }x\\to ${numberTex(a)}^-\\text{, }${sideFactor}\\to 0^-\\text{, so }f(x)\\to ${answerObjectToTexExtended(entries[1].answer)}.`);
      hints.push(`${answerListTexExtended(entries)}`);
      return hints;
    }

    function type6Hints(data) {
      const {
        targets,
        expectedAsymptotes,
        answerGroups,
        j,
        k,
        numCounts,
        denCounts,
        reducedNum,
        reducedDen,
        simplifiedNumerator,
        simplifiedDenominator
      } = data;

      const hints = [];
      hints.push(`\\text{First factor the numerator and denominator.}`);
      hints.push(`f(x)=\\frac{${rootCountsFactorTex(j, numCounts)}}{${rootCountsFactorTex(k, denCounts)}}=\\frac{${rootCountsFactorTex(j, reducedNum)}}{${rootCountsFactorTex(k, reducedDen)}}`);

      const finiteGroups = answerGroups.filter(group => group.entries.length === 3);
      finiteGroups.forEach(group => {
        const targetMatch = group.titleTex.match(/x=([^}]*)/);
      });

      targets.forEach((target, index) => {
        const group = answerGroups[index];
        hints.push(...type6PointHints(target, group.entries, j, k, reducedNum, reducedDen));
      });

      const infinityGroup = answerGroups.find(group => group.titleTex === 'x\\to\\pm\\infty');
      if (infinityGroup) {
        hints.push(...rationalDivisionHints(simplifiedNumerator, simplifiedDenominator, infinityGroup.entries, { finalAnswers: false }));
        hints.push(`${answerListTexExtended(infinityGroup.entries)}`);
      }

      const verticals = expectedAsymptotes.filter(a => a.type === 'vertical').map(a => `x=${numberTex(a.value)}`);
      const horizontals = expectedAsymptotes.filter(a => a.type === 'horizontal').map(a => `y=${numberTex(a.value)}`);
      const asymptoteParts = [];
      if (verticals.length) asymptoteParts.push(`\\text{vertical: }${verticals.join(',\\; ')}`);
      if (horizontals.length) asymptoteParts.push(`\\text{horizontal: }${horizontals.join(',\\; ')}`);
      if (!asymptoteParts.length) asymptoteParts.push(`\\text{no asymptotes}`);
      hints.push(`\\text{The asymptotes are }${asymptoteParts.join('\\quad ')}.`);
      return hints;
    }

    function generateType6LimitProblem() {
      const j = randomNonzeroInteger(-8, 8);
      const k = randomNonzeroInteger(-8, 8);

      let n, m;
      const powerRoll = Math.random();
      if (powerRoll < 0.50) {
        n = 0;
        m = 0;
      } else if (powerRoll < 0.75) {
        n = m = randomInteger(1, 7);
      } else {
        do {
          n = randomInteger(0, 7);
          m = randomInteger(0, 7);
        } while (n === m);
      }

      let f, g;
      do { f = randomInteger(-9, 9); } while (f === 0);
      do { g = randomInteger(-9, 9); } while (g === 0 || g === f);

      let b, c;
      if (Math.random() < 0.50) {
        const denominatorRootToCancel = randomChoice([f, g]);
        if (Math.random() < 0.50) {
          b = denominatorRootToCancel;
          do { c = randomInteger(-9, 9); } while (c === 0);
        } else {
          c = denominatorRootToCancel;
          do { b = randomInteger(-9, 9); } while (b === 0);
        }
      } else {
        do { b = randomInteger(-9, 9); } while (b === 0 || b === f || b === g);
        do { c = randomInteger(-9, 9); } while (c === 0 || c === f || c === g);
      }

      const numerator = polynomialFromRootsWithPower(j, n, [b, c]);
      const denominator = polynomialFromRootsWithPower(k, m, [f, g]);

      const numCounts = rootCountsFromData(n, [b, c]);
      const denCounts = rootCountsFromData(m, [f, g]);
      const { reducedNum, reducedDen } = subtractCancelledRootCounts(numCounts, denCounts);
      const simplifiedNumerator = polynomialFromRootCounts(j, reducedNum);
      const simplifiedDenominator = polynomialFromRootCounts(k, reducedDen);

      const targets = [f, g];
      if (m !== 0 && !targets.includes(0)) targets.push(0);

      const answerGroups = targets.map(target => ({
        titleTex: `x=${numberTex(target)}`,
        entries: limitEntriesForPoint(target, j, k, reducedNum, reducedDen)
      }));

      const infinityEntries = [
        { labelTex: '\\lim_{x \\to -\\infty}f(x)', answer: rationalEndBehaviour(simplifiedNumerator, simplifiedDenominator, 'negative') },
        { labelTex: '\\lim_{x \\to \\infty}f(x)', answer: rationalEndBehaviour(simplifiedNumerator, simplifiedDenominator, 'positive') }
      ];
      answerGroups.push({ titleTex: `x\\to\\pm\\infty`, entries: infinityEntries });

      const answers = answerGroups.flatMap(group => group.entries);

      const expectedAsymptotes = [];
      reducedDen.forEach((count, root) => {
        if (count > 0) expectedAsymptotes.push({ type: 'vertical', value: root });
      });
      const numDegree = degreeOfPolynomial(simplifiedNumerator);
      const denDegree = degreeOfPolynomial(simplifiedDenominator);
      if (numDegree < denDegree) {
        expectedAsymptotes.push({ type: 'horizontal', value: 0 });
      } else if (numDegree === denDegree) {
        expectedAsymptotes.push({ type: 'horizontal', value: leadingCoefficient(simplifiedNumerator) / leadingCoefficient(simplifiedDenominator) });
      }

      const expected = uniqueAsymptotes(expectedAsymptotes);
      const questionTex = `f(x)=${rationalFunctionTex(numerator, denominator)}.\\quad \\text{Evaluate the following limits and list all asymptotes.}`;

      return {
        type: 6,
        questionTex,
        answers,
        answerGroups,
        expectedAsymptotes: expected,
        hints: type6Hints({
          targets,
          expectedAsymptotes: expected,
          answerGroups,
          j,
          k,
          numCounts,
          denCounts,
          reducedNum,
          reducedDen,
          simplifiedNumerator,
          simplifiedDenominator
        })
      };
    }


    function chooseDistinctIntegers(count, min, max) {
      const values = [];
      while (values.length < count) {
        const value = randomInteger(min, max);
        if (!values.includes(value)) values.push(value);
      }
      return values;
    }

    function chooseIntegerY(excluded = []) {
      let value;
      do { value = randomInteger(-7, 7); } while (excluded.includes(value));
      return value;
    }

    function endpointFinite(y) {
      return { kind: 'finite', y };
    }

    function endpointInfinity(sign) {
      return { kind: 'infinity', sign };
    }

    function availablePieceKinds(leftEndpoint, rightEndpoint, previousKind = null) {
      const kinds = ['linear', 'quadratic', 'sqrt'];
      if (leftEndpoint.kind === 'finite' && rightEndpoint.kind === 'finite' && leftEndpoint.y === rightEndpoint.y) kinds.push('constant');
      return kinds.filter(kind => kind !== previousKind);
    }

    function makeVisualPiece(leftX, rightX, leftEndpoint, rightEndpoint, previousKind) {
      const candidates = availablePieceKinds(leftEndpoint, rightEndpoint, previousKind);
      return {
        leftX,
        rightX,
        leftEndpoint,
        rightEndpoint,
        kind: randomChoice(candidates.length ? candidates : ['linear'])
      };
    }

    function evaluateVisualPiece(piece, x) {
      const { leftX, rightX, leftEndpoint, rightEndpoint, kind } = piece;
      const width = rightX - leftX;
      const t = (x - leftX) / width;

      if (leftEndpoint.kind === 'infinity') {
        const anchorX = rightX;
        const anchorY = rightEndpoint.y;
        const scale = Math.max(1, Math.abs(width) / 2);
        return anchorY + leftEndpoint.sign * scale * (1 / (x - leftX) - 1 / (anchorX - leftX));
      }
      if (rightEndpoint.kind === 'infinity') {
        const anchorX = leftX;
        const anchorY = leftEndpoint.y;
        const scale = Math.max(1, Math.abs(width) / 2);
        return anchorY + rightEndpoint.sign * scale * (1 / (rightX - x) - 1 / (rightX - anchorX));
      }

      const y0 = leftEndpoint.y;
      const y1 = rightEndpoint.y;
      if (kind === 'constant') return y0;
      if (kind === 'sqrt') return y0 + (y1 - y0) * Math.sqrt(Math.max(0, Math.min(1, t)));
      const linear = y0 + (y1 - y0) * t;
      if (kind === 'quadratic') {
        const bump = piece.bump === undefined ? 0 : piece.bump;
        return linear + bump * t * (1 - t);
      }
      return linear;
    }

    function finiteAnswer(y) {
      return { kind: 'finite', value: exactFraction(y, 1), tex: numberTex(y) };
    }

    function infinityAnswer(sign) {
      return sign > 0 ? { kind: 'infinity' } : { kind: 'negativeInfinity' };
    }

    function makeVisualPoint(x, role) {
      if (role === 'vertical') {
        const leftSign = randomChoice([-1, 1]);
        const rightSign = randomChoice([-1, 1]);
        return {
          x, role, leftSign, rightSign, pointKind: 'none',
          leftLimit: infinityAnswer(leftSign),
          rightLimit: infinityAnswer(rightSign),
          twoSided: leftSign === rightSign ? infinityAnswer(leftSign) : { kind: 'dne' },
          continuous: false
        };
      }

      if (role === 'jump') {
        const leftY = chooseIntegerY();
        const rightY = chooseIntegerY([leftY]);
        const closedSide = randomChoice(['left', 'right']);
        return {
          x, role, leftY, rightY, closedSide, pointY: closedSide === 'left' ? leftY : rightY,
          leftLimit: finiteAnswer(leftY),
          rightLimit: finiteAnswer(rightY),
          twoSided: { kind: 'dne' },
          continuous: false
        };
      }

      if (role === 'hole') {
        const limitY = chooseIntegerY();
        const pointY = chooseIntegerY([limitY]);
        return {
          x, role, leftY: limitY, rightY: limitY, pointY,
          leftLimit: finiteAnswer(limitY),
          rightLimit: finiteAnswer(limitY),
          twoSided: finiteAnswer(limitY),
          continuous: false
        };
      }

      const y = chooseIntegerY();
      return {
        x, role, leftY: y, rightY: y, pointY: y,
        leftLimit: finiteAnswer(y),
        rightLimit: finiteAnswer(y),
        twoSided: finiteAnswer(y),
        continuous: true
      };
    }

    function endpointForRightOfPoint(point) {
      if (!point) return endpointFinite(chooseIntegerY());
      if (point.role === 'vertical') return endpointInfinity(point.rightSign);
      return endpointFinite(point.rightY);
    }

    function endpointForLeftOfPoint(point) {
      if (!point) return endpointFinite(chooseIntegerY());
      if (point.role === 'vertical') return endpointInfinity(point.leftSign);
      return endpointFinite(point.leftY);
    }

    function generateVisualLimitProblem() {
      const roles = ['vertical', 'jump', 'hole', 'continuous'];
      const xs = chooseDistinctIntegers(4, -8, 8);
      const shuffledRoles = [...roles].sort(() => Math.random() - 0.5);
      const points = xs.map((x, index) => makeVisualPoint(x, shuffledRoles[index])).sort((a, b) => a.x - b.x);

      const boundaries = [-10, ...points.map(p => p.x), 10];
      const pieces = [];
      let previousKind = null;
      for (let i = 0; i < boundaries.length - 1; i++) {
        const leftPoint = i === 0 ? null : points[i - 1];
        const rightPoint = i === points.length ? null : points[i];
        const leftEndpoint = endpointForRightOfPoint(leftPoint);
        const rightEndpoint = endpointForLeftOfPoint(rightPoint);
        const piece = makeVisualPiece(boundaries[i], boundaries[i + 1], leftEndpoint, rightEndpoint, previousKind);
        if (piece.kind === 'quadratic') piece.bump = randomChoice([-1, 1]) * randomInteger(2, 5);
        pieces.push(piece);
        previousKind = piece.kind;
      }

      const answerGroups = points.map(point => ({
        titleTex: `x=${numberTex(point.x)}`,
        point,
        continuous: point.continuous,
        entries: [
          { labelTex: `\\lim_{x \\to ${numberTex(point.x)}^-}f(x)`, answer: point.leftLimit },
          { labelTex: `\\lim_{x \\to ${numberTex(point.x)}^+}f(x)`, answer: point.rightLimit },
          { labelTex: `\\lim_{x \\to ${numberTex(point.x)}}f(x)`, answer: point.twoSided }
        ]
      }));

      const answers = answerGroups.flatMap(group => group.entries);
      const hints = [
        `\\text{For each marked }x\\text{-value, read the left-hand limit from the graph to the left and the right-hand limit from the graph to the right.}`,
        `\\text{A two-sided limit exists only when the two one-sided limits agree.}`,
        `\\text{The function is continuous at a point only when the two-sided limit exists and equals the value of the function.}`
      ];
      answerGroups.forEach(group => {
        const point = group.point;
        const continuityTex = point.continuous ? '\\text{Yes}' : '\\text{No}';
        hints.push(`${answerListTexExtended(group.entries)},\\quad \\text{Continuous? }${continuityTex}`);
      });

      return {
        type: 'visual',
        questionTex: `\\text{Use the graph of }f\\text{ to evaluate each limit and decide whether }f\\text{ is continuous at each marked }x\\text{-value.}`,
        points, pieces, answerGroups, answers, hints
      };
    }

    function generateLimitProblem() {
      return generateVisualLimitProblem();
    }

    function createHintStepBlock(extraClass = '') {
      const block = document.createElement('div');
      block.className = `hint-step-block ${extraClass}`.trim();
      block.style.textAlign = 'center';

      block.style.maxWidth = '100%';
      block.style.overflowX = 'auto';
      hintArea.appendChild(block);
      return block;
    }

    function appendMathHint(tex) {
      const block = createHintStepBlock();
      block.innerHTML = `\\[${tex}\\]`;
      return typesetElement(block);
    }

    async function advanceHint() {
      if (!currentProblem || hintIsTypesetting) return;
      const sound = document.getElementById('click-sound');
      if (sound) { sound.currentTime = 0; sound.play(); }
