    function answerToolbarHtml() {
      return `
        <div class="answer-toolbar" aria-label="Math input buttons">
          <button type="button" class="math-symbol-button" data-insert-text="/">/</button>
          <button type="button" class="math-symbol-button" data-insert-text="∞">∞</button>
          <button type="button" class="math-symbol-button" data-insert-text="DNE">DNE</button>
          <button type="button" class="math-symbol-button" data-insert-fraction="true"><span class="fraction-button-display"><span class="fraction-button-top">a</span><span class="fraction-button-bottom">b</span></span></button>
        </div>
      `;
    }

    function setupContinuityControls() {
      finalAnswerInput.querySelectorAll('.continuous-choice').forEach(box => {
        box.addEventListener('change', () => {
          if (!box.checked) return;
          const groupIndex = box.dataset.groupIndex;
          finalAnswerInput.querySelectorAll(`.continuous-choice[data-group-index="${groupIndex}"]`).forEach(other => {
            if (other !== box) other.checked = false;
          });
        });
      });
    }

    function asymptoteInputHtml() {
      return `
        <div class="asymptote-entry-panel">
          <div style="font-weight: bold; text-align: center;">Asymptotes</div>
          <div class="asymptote-control-row" style="margin-top: 0.45em;">
            <label><input type="checkbox" id="vertical-asymptote-choice" checked> Vertical asymptote</label>
            <label><input type="checkbox" id="horizontal-asymptote-choice"> Horizontal asymptote</label>
          </div>
          <div id="asymptote-entry-box" class="asymptote-entry-box"></div>
          <div class="asymptote-control-row">
            <button type="button" id="add-asymptote-btn" class="asymptote-button">+</button>
            <button type="button" id="remove-asymptote-btn" class="asymptote-button">−</button>
          </div>
        </div>
      `;
    }

    function setupAsymptoteControls() {
      const verticalChoice = document.getElementById('vertical-asymptote-choice');
      const horizontalChoice = document.getElementById('horizontal-asymptote-choice');
      const addBtn = document.getElementById('add-asymptote-btn');
      const removeBtn = document.getElementById('remove-asymptote-btn');
      const box = document.getElementById('asymptote-entry-box');
      if (!verticalChoice || !horizontalChoice || !addBtn || !removeBtn || !box) return;

      verticalChoice.addEventListener('change', () => {
        if (verticalChoice.checked) horizontalChoice.checked = false;
        if (!verticalChoice.checked && !horizontalChoice.checked) verticalChoice.checked = true;
      });
      horizontalChoice.addEventListener('change', () => {
        if (horizontalChoice.checked) verticalChoice.checked = false;
        if (!verticalChoice.checked && !horizontalChoice.checked) horizontalChoice.checked = true;
      });

      addBtn.addEventListener('click', () => {
        const type = horizontalChoice.checked ? 'horizontal' : 'vertical';
        addAsymptoteEntry(type);
      });

      removeBtn.addEventListener('click', () => {
        const selected = box.querySelector('.asymptote-entry-row.selected');
        if (selected) selected.remove();
      });
    }

    function addAsymptoteEntry(type) {
      const box = document.getElementById('asymptote-entry-box');
      if (!box) return;
      const row = document.createElement('div');
      row.className = 'asymptote-entry-row';
      row.dataset.type = type;
      const label = type === 'horizontal' ? 'Horizontal asymptote at y =' : 'Vertical asymptote at x =';
      row.innerHTML = `<span>${label}</span><input class="asymptote-value-input" type="text" inputmode="decimal" aria-label="${label} value">`;
      row.addEventListener('click', () => {
        box.querySelectorAll('.asymptote-entry-row').forEach(item => item.classList.remove('selected'));
        row.classList.add('selected');
      });
      const input = row.querySelector('input');
      input.addEventListener('input', () => {
        input.value = input.value.replace(/[^0-9+\-.\/]/g, '');
      });
      box.appendChild(row);
      row.classList.add('selected');
      input.focus();
    }

    function renderVisualLimitGraph(problem) {
      const canvas = document.getElementById('visual-limit-canvas');
      if (!canvas || !problem || problem.type !== 'visual') return;
      const ctx = canvas.getContext('2d');
      const width = canvas.width, height = canvas.height, margin = 42;
      const xMin = -10, xMax = 10, yMin = -10, yMax = 10;
      const xScale = (width - 2 * margin) / (xMax - xMin);
      const yScale = (height - 2 * margin) / (yMax - yMin);
      const toPx = x => margin + (x - xMin) * xScale;
      const toPy = y => height - margin - (y - yMin) * yScale;

      ctx.clearRect(0, 0, width, height);
      ctx.lineWidth = 1;
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle = '#e5e5e5';
      for (let v = -10; v <= 10; v++) {
        ctx.beginPath(); ctx.moveTo(toPx(v), margin); ctx.lineTo(toPx(v), height - margin); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(margin, toPy(v)); ctx.lineTo(width - margin, toPy(v)); ctx.stroke();
      }
      ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(margin, toPy(0)); ctx.lineTo(width - margin, toPy(0)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(toPx(0), margin); ctx.lineTo(toPx(0), height - margin); ctx.stroke();
      ctx.fillStyle = '#333';
      for (let v = -10; v <= 10; v += 2) {
        ctx.fillText(String(v), toPx(v), toPy(0) + 16);
        if (v !== 0) ctx.fillText(String(v), toPx(0) - 18, toPy(v));
      }

      problem.points.filter(point => point.role === 'vertical').forEach(point => {
        ctx.save(); ctx.strokeStyle = '#888'; ctx.setLineDash([7, 5]); ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(toPx(point.x), margin); ctx.lineTo(toPx(point.x), height - margin); ctx.stroke(); ctx.restore();
      });

      function clippedBoundaryPoint(prev, current) {
        if (!prev || !Number.isFinite(prev.y) || !Number.isFinite(current.y)) return null;
        let boundary = null;
        if (prev.y <= yMax && current.y > yMax) boundary = yMax;
        else if (prev.y >= yMin && current.y < yMin) boundary = yMin;
        else if (prev.y > yMax && current.y <= yMax) boundary = yMax;
        else if (prev.y < yMin && current.y >= yMin) boundary = yMin;
        if (boundary === null || Math.abs(current.y - prev.y) < 1e-12) return null;
        const ratio = (boundary - prev.y) / (current.y - prev.y);
        return { x: prev.x + (current.x - prev.x) * ratio, y: boundary };
      }

      ctx.strokeStyle = '#111'; ctx.lineWidth = 3;
      problem.pieces.forEach(piece => {
        const samples = 260;
        const leftSingular = piece.leftEndpoint.kind === 'infinity';
        const rightSingular = piece.rightEndpoint.kind === 'infinity';
        const leftT = leftSingular ? 1 / samples : 0;
        const rightT = rightSingular ? 1 - 1 / samples : 1;
        let started = false;
        let previous = null;
        ctx.beginPath();
        for (let i = 0; i <= samples; i++) {
          const rawT = i / samples;
          const t = leftT + (rightT - leftT) * rawT;
          const x = piece.leftX + (piece.rightX - piece.leftX) * t;
          const y = evaluateVisualPiece(piece, x);
          const current = { x, y };
          const inside = Number.isFinite(y) && y >= yMin && y <= yMax;

          if (inside) {
            if (!started) {
              const boundary = clippedBoundaryPoint(previous, current);
              if (boundary) ctx.moveTo(toPx(boundary.x), toPy(boundary.y));
              else ctx.moveTo(toPx(x), toPy(y));
              started = true;
            }
            ctx.lineTo(toPx(x), toPy(y));
          } else if (started) {
            const boundary = clippedBoundaryPoint(previous, current);
            if (boundary) ctx.lineTo(toPx(boundary.x), toPy(boundary.y));
            started = false;
          }

          previous = current;
        }
        ctx.stroke();
      });

      function drawOpenDot(x, y) {
        ctx.save(); ctx.fillStyle = 'white'; ctx.strokeStyle = '#111'; ctx.lineWidth = 2.5;
        ctx.beginPath(); ctx.arc(toPx(x), toPy(y), 5.5, 0, 2 * Math.PI); ctx.fill(); ctx.stroke(); ctx.restore();
      }
      function drawClosedDot(x, y) {
        ctx.save(); ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(toPx(x), toPy(y), 5.8, 0, 2 * Math.PI); ctx.fill(); ctx.restore();
      }
      problem.points.forEach(point => {
        if (point.role === 'vertical') return;
        if (point.role === 'jump') {
          if (point.closedSide === 'left') { drawClosedDot(point.x, point.leftY); drawOpenDot(point.x, point.rightY); }
          else { drawOpenDot(point.x, point.leftY); drawClosedDot(point.x, point.rightY); }
        } else if (point.role === 'hole') { drawOpenDot(point.x, point.leftY); drawClosedDot(point.x, point.pointY); }
        else drawClosedDot(point.x, point.pointY);
      });
    }

    function handleMathEditorKeydown(event) {
      activeMathEditor = event.currentTarget;
      if (event.key === 'Enter') {
        event.preventDefault();
        return;
      }
      if (event.key === 'ArrowRight') {
        const specialBox = getContainingSpecialEntry(getSelectionStartNode());
        if (specialBox) {
          event.preventDefault();
          placeCaretAfterNode(specialBox.wrapper);
        }
      }
      if (event.key === 'ArrowLeft') {
        const specialBox = getContainingSpecialEntry(getSelectionStartNode());
        if (specialBox) {
          event.preventDefault();
          placeCaretBeforeNode(specialBox.wrapper);
        }
      }
    }

    function ensureSelectionInsideEditor(editor) {
      const selection = window.getSelection();
      if (selection.rangeCount && editor.contains(selection.anchorNode)) return selection.getRangeAt(0);
      const range = document.createRange();
      range.selectNodeContents(editor);
      range.collapse(false);
      selection.removeAllRanges();
      selection.addRange(range);
      return range;
    }

    function insertTextAtSelection(text, editor) {
      const range = ensureSelectionInsideEditor(editor);
      range.deleteContents();
      const node = document.createTextNode(text);
      range.insertNode(node);
      placeCaretInTextNode(node, node.textContent.length);
    }

    function insertFractionAtSelection(editor) {
      const range = ensureSelectionInsideEditor(editor);
      range.deleteContents();
      const wrapper = document.createElement('span');
      wrapper.className = 'fraction-entry special-wrapper';
      wrapper.setAttribute('data-special-wrapper', 'fraction');
      wrapper.innerHTML = '<span class="fraction-numerator special-entry" contenteditable="true" data-special-entry="fraction-numerator"></span><span class="fraction-denominator special-entry" contenteditable="true" data-special-entry="fraction-denominator"></span>';
      range.insertNode(wrapper);
      placeCaretInside(wrapper.querySelector('.fraction-numerator'));
    }

    function getSelectionStartNode() {
      const selection = window.getSelection();
      return selection.rangeCount ? selection.getRangeAt(0).startContainer : null;
    }

    function closestMathEditor(node) {
      let current = node && (node.nodeType === Node.TEXT_NODE ? node.parentElement : node);
      while (current && current !== document) {
        if (current.classList && current.classList.contains('math-answer-editor')) return current;
        current = current.parentElement;
      }
      return null;
    }

    function getContainingSpecialEntry(node) {
      let current = node && (node.nodeType === Node.TEXT_NODE ? node.parentElement : node);
      while (current && current !== document) {
        if (current.classList && current.classList.contains('special-entry')) {
          let wrapper = current;
          while (wrapper && wrapper !== document && !(wrapper.classList && wrapper.classList.contains('special-wrapper'))) {
            wrapper = wrapper.parentElement;
          }
          return { entry: current, wrapper: wrapper || current };
        }
        current = current.parentElement;
      }
      return null;
    }

    function placeCaretInside(element) {
      const range = document.createRange();
      range.selectNodeContents(element);
      range.collapse(false);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      element.focus();
    }

    function placeCaretBeforeNode(node) {
      const parent = node.parentNode;
      let beforeNode = node.previousSibling;
      if (!beforeNode || beforeNode.nodeType !== Node.TEXT_NODE) {
        beforeNode = document.createTextNode('​');
        parent.insertBefore(beforeNode, node);
      } else if (beforeNode.textContent.length === 0) {
        beforeNode.textContent = '​';
      }
      placeCaretInTextNode(beforeNode, beforeNode.textContent.length);
      const editor = closestMathEditor(parent);
      if (editor) {
        activeMathEditor = editor;
        editor.focus();
      }
    }

    function placeCaretAfterNode(node) {
      const parent = node.parentNode;
      let afterNode = node.nextSibling;
      if (!afterNode || afterNode.nodeType !== Node.TEXT_NODE) {
        afterNode = document.createTextNode('\u200b');
        parent.insertBefore(afterNode, node.nextSibling);
      } else if (afterNode.textContent.length === 0) {
        afterNode.textContent = '\u200b';
      }
      placeCaretInTextNode(afterNode, afterNode.textContent.length);
      const editor = closestMathEditor(parent);
      if (editor) {
        activeMathEditor = editor;
        editor.focus();
      }
    }

    function placeCaretInTextNode(node, offset) {
      const range = document.createRange();
      range.setStart(node, offset);
      range.collapse(true);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function editorToPlainText(editor) {
      function walk(node) {
        if (node.nodeType === Node.TEXT_NODE) return node.textContent.replace(/\u200b/g, '');
        if (node.nodeType !== Node.ELEMENT_NODE) return '';
        if (node.matches && node.matches('.fraction-entry')) return `(${walk(node.querySelector('.fraction-numerator'))})/(${walk(node.querySelector('.fraction-denominator'))})`;
        return Array.from(node.childNodes).map(walk).join('');
      }
      return Array.from(editor.childNodes).map(walk).join('').trim();
    }

    function evaluateNumericAnswer(raw) {
      const text = raw
        .replace(/\u200b/g, '')
        .replace(/−/g, '-')
        .replace(/\s+/g, '')
        .replace(/^=/, '');
      if (!text || /[^0-9+\-*/().]/.test(text)) return NaN;
      try {
        const value = Function(`"use strict"; return (${text});`)();
        return Number.isFinite(value) ? value : NaN;
      } catch (error) {
        return NaN;
      }
    }

    function normalizeAnswerText(raw) {
      return raw
        .replace(/\u200b/g, '')
        .replace(/−/g, '-')
        .replace(/∞/g, 'infty')
        .replace(/\\infty/g, 'infty')
        .replace(/\s+/g, '')
        .replace(/^=/, '')
        .toLowerCase();
    }

    function evaluateFlexibleNumericAnswer(raw) {
      const text = normalizeAnswerText(raw)
        .replace(/sqrt/g, 'Math.sqrt')
        .replace(/pi/g, 'Math.PI');
      if (!text || /[^0-9+\-*/().MathsqrtPI]/.test(text)) return NaN;
      try {
        const value = Function(`"use strict"; return (${text});`)();
        return Number.isFinite(value) ? value : NaN;
      } catch (error) {
        return NaN;
      }
    }

    function answerMatches(userRaw, expected) {
      const text = normalizeAnswerText(userRaw);
      if (expected.kind === 'infinity') return ['infty', '+infty', 'infinity', '+infinity'].includes(text);
      if (expected.kind === 'negativeInfinity') return ['-infty', '-infinity'].includes(text);
      if (expected.kind === 'dne' || expected.kind === 'oscillates') return ['dne', 'doesnotexist', 'undefined'].includes(text);
      if (expected.kind === 'undefined') return ['undefined', 'dne', 'doesnotexist'].includes(text);
      if (expected.kind === 'finite') {
        const userValue = evaluateFlexibleNumericAnswer(userRaw);
        const expectedValue = expected.value && expected.value.decimal !== undefined
          ? expected.value.decimal
          : fractionToNumber(expected.value);
        return Number.isFinite(userValue) && Math.abs(userValue - expectedValue) < 1e-8;
      }
      const userValue = evaluateFlexibleNumericAnswer(userRaw);
      const expectedValue = fractionToNumber(expected);
      return Number.isFinite(userValue) && Math.abs(userValue - expectedValue) < 1e-8;
    }

    function collectAsymptoteEntries() {
      const rows = document.querySelectorAll('.asymptote-entry-row');
      return Array.from(rows).map(row => {
        const input = row.querySelector('.asymptote-value-input');
        return {
          type: row.dataset.type,
          value: evaluateFlexibleNumericAnswer(input ? input.value : '')
        };
      }).filter(item => Number.isFinite(item.value));
    }

    function asymptoteListsMatch(userEntries, expectedEntries) {
      if (!expectedEntries) return true;
      if (userEntries.length !== expectedEntries.length) return false;
      const used = new Array(userEntries.length).fill(false);
      return expectedEntries.every(expected => {
        const index = userEntries.findIndex((user, i) =>
          !used[i] &&
          user.type === expected.type &&
          Math.abs(user.value - expected.value) < 1e-8
        );
        if (index === -1) return false;
        used[index] = true;
        return true;
      });
    }

    function checkUserAnswer() {
      if (!currentProblem) return;
      const answers = currentProblem.answers || [{ labelTex: 'Limit', answer: currentProblem.answer }];
      const allLimitsCorrect = answers.every((entry, index) => {
        const editor = document.getElementById(`answer-editor-${index}`);
        return editor && answerMatches(editorToPlainText(editor), entry.answer);
      });
      const asymptotesCorrect = currentProblem.expectedAsymptotes
        ? asymptoteListsMatch(collectAsymptoteEntries(), currentProblem.expectedAsymptotes)
        : true;
      const continuityCorrect = currentProblem.type === 'visual'
        ? currentProblem.answerGroups.every((group, index) => {
            const yes = document.querySelector(`.continuous-choice[data-group-index="${index}"][data-value="yes"]`);
            const no = document.querySelector(`.continuous-choice[data-group-index="${index}"][data-value="no"]`);
            return group.continuous ? !!(yes && yes.checked) : !!(no && no.checked);
          })
        : true;
      const allCorrect = allLimitsCorrect && asymptotesCorrect && continuityCorrect;
      feedbackText.textContent = allCorrect ? 'Correct!' : 'Incorrect, try again.';
      feedbackText.style.color = allCorrect ? 'green' : 'red';
    }

    function clearOldActivityState() {
      feedbackText.textContent = '';
      finalAnswerInput.innerHTML = '';
      hintArea.innerHTML = '';
      hintStep = 0;
      hintBtn.disabled = true;
      checkBtn.style.display = 'none';
      hintIsTypesetting = false;
    }

    startBtn.addEventListener('click', () => {
      clearOldActivityState();

      const sound = document.getElementById('click-sound');
      if (sound) {
        sound.currentTime = 0;
        sound.play();
      }

      currentProblem = generateLimitProblem();
      if (currentProblem.type === 'visual') {
        questionText.innerHTML = `\\[${currentProblem.questionTex}\\]<div class="visual-graph-wrap"><canvas id="visual-limit-canvas" width="620" height="620" aria-label="Graph of f on the interval from -10 to 10"></canvas></div>`;
      } else {
        questionText.innerHTML = `Evaluate: \\[${currentProblem.questionTex}\\]`;
      }
      setupAnswerEditor();
      checkBtn.style.display = 'inline-block';
      hintBtn.disabled = !currentProblem.hints.length;
      typesetElement(questionText).then(() => renderVisualLimitGraph(currentProblem));
    });

    hintBtn.addEventListener('click', advanceHint);
    checkBtn.addEventListener('click', checkUserAnswer);
  </script>

  <audio id="click-sound" src="button.mp3" preload="auto"></audio>
  <audio id="set-sound" src="set2.mp3" preload="auto"></audio>
