<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="Personal website of Ben Fraser, with math education activities for students and teachers.">
  <meta charset="UTF-8" />
  <title>MATH 161 - Probability</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header>
    <h1>MATH 161 - Probability</h1>
    <div id="nav-placeholder"></div>

      <script>
fetch("/nav.html")
  .then(response => response.text())
  .then(html => {
    document.getElementById("nav-placeholder").innerHTML = html;

    const currentPath = window.location.pathname.replace(/\/index\.html$/, "/");
    const navLinks = document.querySelectorAll("#nav-placeholder a");
    navLinks.forEach(link => {
      const linkPath = new URL(link.href).pathname.replace(/\/index\.html$/, "/");
      if (linkPath === currentPath) {
        link.classList.add("active");
      }
    });

    const s = document.createElement("script");
    s.src = "/mascot.js";
    s.defer = true;
    document.body.appendChild(s);
  })
  .catch(err => {
    console.error("Failed to load nav:", err);
  });
</script>


      
  </header>
  <main>

    <p>A lesson on the basics of probability: 
      <a href="https://ben-math.github.io/courses/math161/probability/pt1.html">Probability I</a></p>

    <p>A lesson on intermediate probability: 
      <a href="https://ben-math.github.io/courses/math161/probability/pt2.html">Probability II</a></p>

    <p>A lesson on conditional probability: 
      <a href="https://ben-math.github.io/courses/math161/probability/pt3.html">Probability III</a></p>
  </main>
</body>
</html>
